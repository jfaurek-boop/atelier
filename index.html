                const priority = goalPriority(item);
                const goalMeta = [priorityLabel(priority), item.fechaVencimiento ? formatDate(item.fechaVencimiento) : ""].filter(Boolean).join(" - ");
                const goalCounts = `${itemStats.completed}/${itemStats.total} tareas logradas`;
                return `
                  <div class="project-chip goal-item ${isActive ? "is-active" : ""}">
                    <button type="button" class="goal-select-main ${priority ? "" : "has-no-priority"}" data-action="select-goal" data-project-id="${project.id}" data-section-id="${item.id || ""}">
                      ${priority ? `<span class="project-dot" title="Prioridad ${priorityLabel(priority)}" style="background:${goalPriorityColor(item)}"></span>` : ""}
                      <span><strong>${escapeHtml(item.nombre)}</strong><small>${escapeHtml(goalMeta ? `${goalMeta} - ${goalCounts}` : goalCounts)}</small></span>
                      <span>${Math.round(itemStats.progress * 100)}%</span>
                    </button>
                    <div class="goal-actions">
                      <button type="button" class="icon-btn goal-order-btn" data-action="move-goal" data-direction="up" data-section-id="${item.id}" title="Subir meta" aria-label="Subir meta" ${index === 0 ? "disabled" : ""}>&#8593;</button>
                      <button type="button" class="icon-btn goal-order-btn" data-action="move-goal" data-direction="down" data-section-id="${item.id}" title="Bajar meta" aria-label="Bajar meta" ${index === goals.length - 1 ? "disabled" : ""}>&#8595;</button>
                      <button type="button" class="icon-btn goal-edit-btn" data-action="open-section" data-section-id="${item.id}" title="Editar meta" aria-label="Editar meta">&#9998;</button>
                      <button type="button" class="icon-btn goal-delete-btn" data-action="delete-section" data-section-id="${item.id}" title="Borrar meta" aria-label="Borrar meta">&#128465;</button>
                    </div>
                  </div>
                `;
              }).join("")}
            </div>
          </div>
        </aside>
      `;
    }

    function renderProjectTreePanel(project) {
      if (!project) {
        return `<aside class="project-panel project-tree-panel"><div class="empty-state">Crea un proyecto para organizar tus metas.</div></aside>`;
      }
      const hideCompleted = Boolean(state.treeHideCompleted);
      const goals = goalsForProject(project.id).filter((goal) => !hideCompleted || !isGoalComplete(goal));
      const activeGoal = selectedGoalForPanel(project.id);
      const treeMode = state.treeMode || "all";
      const treeModes = [
        ["goals", "Metas"],
        ["tasks", "Tareas"],
        ["all", "Todo"]
      ];
      return `
        <aside class="project-panel project-tree-panel" aria-label="Arbol de metas, tareas y subtareas">
          <div class="panel-section panel-tree">
            <div class="panel-block-head">
              <div>
                <strong>Proyecto: ${escapeHtml(project.nombre)}</strong>
                <small>Seleccione un elemento para abrir su siguiente nivel; filtre la vista con los botones.</small>
              </div>
              <div class="tree-head-controls">
                <div class="tree-mode-toggle" aria-label="Mostrar niveles del proyecto">
                  ${treeModes.map(([mode, label]) => `
                    <button type="button" data-action="set-tree-mode" data-tree-mode="${mode}" class="${treeMode === mode ? "is-active" : ""}">${label}</button>
                  `).join("")}
                </div>
                <button type="button" class="tree-completed-toggle ${hideCompleted ? "is-active" : ""}" data-action="toggle-tree-completed" aria-pressed="${hideCompleted}">${hideCompleted ? "Mostrar completadas" : "Ocultar completadas"}</button>
              </div>
            </div>
            <div class="tree-list">
              <div class="tree-section-heading is-meta">Metas definidas</div>
              ${goals.length ? goals.map((goal, index) => renderTreeGoal(project, goal, index, goals.length, activeGoal, treeMode)).join("") : `<div class="tree-empty">${hideCompleted ? "No hay metas pendientes visibles." : "Este proyecto aún no tiene metas."}</div>`}
              <div class="tree-section-heading is-create is-meta">Nueva meta</div>
              <div class="tree-add is-goal">${renderQuickAddGoal(project.id)}</div>
            </div>
          </div>
        </aside>
      `;
    }

    function isGoalComplete(goal) {
      if (!goal) return false;
      const stats = statsForGoal(goal.projectId, goal.id);
      return Boolean(goal.completada) || Boolean(goal.completedAt) || (stats.total > 0 && stats.pending === 0);
    }

    function renderTreeGoal(project, goal, index, totalGoals, activeGoal, treeMode = "all") {
      const stats = statsForGoal(project.id, goal.id);
      const isActive = activeGoal && goalKey(project.id, goal.id) === goalKey(project.id, activeGoal.id);
      const priority = goalPriority(goal);
      const metaText = `${stats.completed}/${stats.total} tareas logradas`;
      const hideCompleted = Boolean(state.treeHideCompleted);
      const tasks = sortedTasks(project.id, goal.id).filter((task) => !hideCompleted || !task.completada);
      const showTasks = treeMode === "tasks" || (isActive && treeMode === "all");
      return `
        <div class="tree-row is-meta ${isActive ? "is-selected" : ""}" draggable="true" data-tree-type="goal" data-project-id="${project.id}" data-section-id="${goal.id}">
          <span class="tree-level-label is-meta">M</span>
          <button type="button" class="tree-main" data-action="select-goal" data-project-id="${project.id}" data-section-id="${goal.id || ""}">
            <span class="tree-title">${escapeHtml(goal.nombre)}</span>
            ${goal.descripcion ? `<span class="tree-description">${escapeHtml(goal.descripcion)}</span>` : ""}
            <span class="tree-meta">${escapeHtml(metaText)}</span>
          </button>
          <span class="tree-priority">${priority ? escapeHtml(priorityLabel(priority)) : ""}</span>
          <span class="tree-date">${goal.fechaVencimiento ? escapeHtml(formatDate(goal.fechaVencimiento)) : ""}</span>
          <div class="tree-actions">
            <span class="tree-percent">${Math.round(stats.progress * 100)}%</span>
            <button type="button" class="icon-btn goal-order-btn" data-action="move-goal" data-direction="up" data-section-id="${goal.id}" title="Subir meta" aria-label="Subir meta" ${index === 0 ? "disabled" : ""}>&#8593;</button>
            <button type="button" class="icon-btn goal-order-btn" data-action="move-goal" data-direction="down" data-section-id="${goal.id}" title="Bajar meta" aria-label="Bajar meta" ${index === totalGoals - 1 ? "disabled" : ""}>&#8595;</button>
            <button type="button" class="icon-btn goal-edit-btn" data-action="open-section" data-section-id="${goal.id}" title="Editar meta" aria-label="Editar meta">&#9998;</button>
            <button type="button" class="icon-btn goal-delete-btn" data-action="delete-section" data-section-id="${goal.id}" title="Borrar meta" aria-label="Borrar meta">&#128465;</button>
          </div>
        </div>
        ${showTasks ? `
          <div class="tree-section-heading is-task">Tareas de esta meta</div>
          ${tasks.length ? tasks.map((task) => renderTreeTask(project, goal, task, treeMode)).join("") : `<div class="tree-empty is-task">${hideCompleted ? "No hay tareas pendientes visibles." : "Esta meta aún no tiene tareas."}</div>`}
          ${isActive ? `
            <div class="tree-section-heading is-create is-task">Nueva tarea</div>
            <div class="tree-add is-task">${renderQuickAdd(project.id, goal.id, "Nueva tarea para esta meta")}</div>
          ` : ""}
        ` : ""}
      `;
    }

    function renderTreeTask(project, goal, task, treeMode = "all") {
      const hideCompleted = Boolean(state.treeHideCompleted);
      const subtasks = sortedSubtaskChildren(task.id, null).filter((subtask) => !hideCompleted || !subtask.completada);
      const stats = statsForTask(task.id);
      const selected = task.id === state.selectedTaskId;
      const metaText = subtasks.length ? `${stats.completed}/${stats.total} subtareas logradas` : "";
      const showSubtasks = selected && treeMode === "all";
      return `
        <div class="tree-row is-task ${task.completada ? "is-complete" : ""} ${selected ? "is-selected" : ""}" draggable="true" data-tree-type="task" data-project-id="${project.id}" data-section-id="${goal.id}" data-task-id="${task.id}">
          <button type="button" class="check-btn ${task.completada ? "is-complete" : ""}" data-action="toggle-task" data-task-id="${task.id}" aria-label="${task.completada ? "Reabrir tarea" : "Completar tarea"}">${task.completada ? "✓" : ""}</button>
          <button type="button" class="tree-main" data-action="select-task" data-task-id="${task.id}">
            <span class="tree-title">${escapeHtml(task.nombre)}</span>
            ${task.descripcion ? `<span class="tree-description">${escapeHtml(task.descripcion)}</span>` : ""}
            <span class="tree-meta">${escapeHtml(metaText)}</span>
            ${task.recurrencia ? `<span class="tree-recurrence">${escapeHtml(recurrenceLabel(task.recurrencia))}</span>` : ""}
          </button>
          <span class="tree-priority">${task.prioridad ? escapeHtml(priorityLabel(task.prioridad)) : ""}</span>
          <span class="tree-date">${task.fechaVencimiento ? escapeHtml(formatDate(task.fechaVencimiento)) : ""}</span>
          <div class="tree-actions">
            <span class="tree-percent">${percentForTask(task)}%</span>
            <button type="button" class="icon-btn" data-action="open-task" data-task-id="${task.id}" title="Editar tarea" aria-label="Editar tarea">&#9998;</button>
            <button type="button" class="icon-btn" data-action="delete-task" data-task-id="${task.id}" title="Eliminar tarea" aria-label="Eliminar tarea">&#128465;</button>
          </div>
        </div>
        ${showSubtasks ? `
          <div class="tree-section-heading is-subtask depth-1" style="--tree-indent:56px">Subtareas de esta tarea</div>
          ${subtasks.length ? subtasks.map((subtask) => renderTreeSubtask(task, subtask, 1)).join("") : `<div class="tree-empty is-subtask" style="--tree-indent:56px">${hideCompleted ? "No hay subtareas pendientes visibles." : "Esta tarea aún no tiene subtareas."}</div>`}
          <div class="tree-section-heading is-create is-subtask depth-1" style="--tree-indent:56px">Nueva subtarea</div>
          <div class="tree-add is-subtask depth-1" style="--tree-indent:56px">${renderQuickAddSubtask(task.id, null, "Nueva subtarea")}</div>
        ` : ""}
      `;
    }

    function renderTreeSubtask(task, subtask, depth = 1) {
      const selected = subtask.id === state.selectedSubtaskId;
      const hideCompleted = Boolean(state.treeHideCompleted);
      const children = sortedSubtaskChildren(task.id, subtask.id).filter((child) => !hideCompleted || !child.completada);
      const stats = statsForSubtask(subtask.id);
      const safeDepth = Math.max(1, Math.min(MAX_SUBTASK_DEPTH, depth));
      const indent = 56 + (safeDepth - 1) * 28;
      const expanded = selected || Boolean(state.selectedSubtaskId && subtaskDescendantIds(subtask.id).has(state.selectedSubtaskId));
      const showNestedCreate = expanded && safeDepth < MAX_SUBTASK_DEPTH;
      return `
        <div class="tree-row is-subtask depth-${safeDepth} ${subtask.completada ? "is-complete" : ""} ${selected ? "is-selected" : ""}" draggable="true" data-tree-type="subtask" data-task-id="${task.id}" data-parent-subtask-id="${subtask.parentSubtaskId || ""}" data-subtask-id="${subtask.id}" style="--tree-indent:${indent}px">
          <button type="button" class="check-btn ${subtask.completada ? "is-complete" : ""}" data-action="toggle-subtask" data-subtask-id="${subtask.id}" aria-label="${subtask.completada ? "Reabrir subtarea" : "Completar subtarea"}">${subtask.completada ? "✓" : ""}</button>
          <button type="button" class="tree-main" data-action="select-subtask" data-subtask-id="${subtask.id}" data-task-id="${task.id}">
            <span class="tree-title">${escapeHtml(subtask.nombre)}</span>
            ${subtask.descripcion ? `<span class="tree-description">${escapeHtml(subtask.descripcion)}</span>` : ""}
            <span class="tree-meta">${children.length ? `${stats.completed}/${stats.total} subtareas logradas` : ""}</span>
          </button>
          <span class="tree-priority">${subtask.prioridad ? escapeHtml(priorityLabel(subtask.prioridad)) : ""}</span>
          <span class="tree-date">${subtask.fechaVencimiento ? escapeHtml(formatDate(subtask.fechaVencimiento)) : ""}</span>
          <div class="tree-actions">
            <span class="tree-percent">${percentForSubtask(subtask)}%</span>
            <button type="button" class="icon-btn" data-action="open-subtask" data-subtask-id="${subtask.id}" data-task-id="${task.id}" title="Editar subtarea" aria-label="Editar subtarea">&#9998;</button>
            <button type="button" class="icon-btn" data-action="delete-subtask" data-subtask-id="${subtask.id}" title="Eliminar subtarea" aria-label="Eliminar subtarea">&#128465;</button>
          </div>
        </div>
        ${showNestedCreate ? `
          <div class="tree-section-heading is-subtask depth-${safeDepth + 1}" style="--tree-indent:${indent + 28}px">Subtareas de esta subtarea</div>
          ${children.length ? children.map((child) => renderTreeSubtask(task, child, safeDepth + 1)).join("") : `<div class="tree-empty is-subtask" style="--tree-indent:${indent + 28}px">${hideCompleted ? "No hay subtareas pendientes visibles." : "Esta subtarea aún no tiene subtareas."}</div>`}
          <div class="tree-section-heading is-create is-subtask depth-${safeDepth + 1}" style="--tree-indent:${indent + 28}px">Nueva subtarea</div>
          <div class="tree-add is-subtask depth-${safeDepth + 1}" style="--tree-indent:${indent + 28}px">${renderQuickAddSubtask(task.id, subtask.id, "Nueva subtarea")}</div>
        ` : expanded ? children.map((child) => renderTreeSubtask(task, child, safeDepth + 1)).join("") : ""}
      `;
    }

    function renderGoalTasksPanel(project) {
      const goal = selectedGoalForPanel(project.id);
      if (!goal) {
        return `<aside class="goal-tasks-panel"><div class="empty-state">Selecciona una meta para ver sus tareas.</div></aside>`;
      }
      const goalStats = statsForGoal(project.id, goal.id);
      const tasks = sortedTasks(project.id, goal.id);
      return `
        <aside class="goal-tasks-panel">
          <div class="panel-section panel-tasks">
            <div class="panel-block-head">
              <div>
                <strong>Tareas</strong>
                <small>Pertenecen a la meta seleccionada - ${goalStats.pending} pendientes</small>
              </div>
              <button type="button" class="icon-btn panel-close-btn" data-action="back-to-continent" title="Cerrar meta" aria-label="Cerrar meta">x</button>
            </div>
            <div class="panel-context-chain">
              <span>Meta</span>
              <strong>${escapeHtml(goal.nombre)}</strong>
            </div>
            <div class="progress-wrap"><div class="progress-bar" style="width:${Math.round(goalStats.progress * 100)}%"></div></div>
            ${renderQuickAdd(project.id, goal.id, "Nueva tarea para esta meta")}
            <div class="task-list">${tasks.length ? tasks.map((task) => renderTaskRow(task, true)).join("") : `<div class="empty-state">Esta meta aún no tiene tareas.</div>`}</div>
          </div>
        </aside>
      `;
    }

    function renderSubtasksPanel(task) {
      const subtasks = sortedSubtasks(task.id);
      const stats = statsForTask(task.id);
      const goal = state.sections.find((item) => item.id === task.sectionId);
      return `
        <aside class="task-detail subtasks-panel">
          <div class="panel-section panel-subtasks">
            <div class="panel-block-head">
              <div>
                <strong>Subtareas</strong>
                <small>Pertenecen a la tarea seleccionada - ${stats.pending} pendientes</small>
              </div>
              <button type="button" class="icon-btn panel-close-btn" data-action="close-subtask-panel" title="Cerrar subtareas" aria-label="Cerrar subtareas">x</button>
            </div>
            <div class="panel-context-chain">
              <span>Meta</span>
              <strong>${escapeHtml(goal?.nombre || "Sin meta")}</strong>
              <span class="context-separator">&rsaquo;</span>
              <span>Tarea</span>
              <strong>${escapeHtml(task.nombre)}</strong>
            </div>
            <div class="progress-wrap"><div class="progress-bar" style="width:${Math.round(stats.progress * 100)}%"></div></div>
            ${renderQuickAddSubtask(task.id)}
            <div class="subtask-list">
              ${subtasks.length ? subtasks.map(renderSubtaskRow).join("") : `<div class="empty-state">Esta tarea aún no tiene subtareas.</div>`}
            </div>
          </div>
        </aside>
      `;
    }

    function renderQuickAddSubtask(taskId, parentSubtaskId = null, placeholder = "+ Nueva subtarea") {
      return `
        <form class="quick-add is-subtask" data-action="quick-add-subtask" data-task-id="${taskId}" data-parent-subtask-id="${parentSubtaskId || ""}">
          <input type="text" name="nombre" placeholder="${escapeHtml(placeholder)}" autocomplete="off">
          <input type="text" name="descripcion" placeholder="+ Descripcion breve" autocomplete="off">
          <select name="prioridad" aria-label="Prioridad de subtarea">
            ${renderPriorityOptions()}
          </select>
          <input type="date" name="fechaVencimiento" aria-label="Fecha limite de la subtarea" title="Fecha limite">
          <button class="primary-btn" type="submit">Crear</button>
          <button class="ghost-btn quick-add-card-btn" type="button" data-action="quick-add-card">Crear tarjeta</button>
        </form>
      `;
    }

    function renderSubtaskRow(subtask) {
      const selected = subtask.id === state.selectedSubtaskId;
      return `
        <div class="subtask-row ${subtask.completada ? "is-complete" : ""} ${selected ? "is-selected" : ""}">
          <button type="button" class="check-btn ${subtask.completada ? "is-complete" : ""}" data-action="toggle-subtask" data-subtask-id="${subtask.id}" aria-label="${subtask.completada ? "Reabrir subtarea" : "Completar subtarea"}">${subtask.completada ? "✓" : ""}</button>
          <button type="button" class="subtask-main" data-action="open-subtask" data-subtask-id="${subtask.id}" data-task-id="${subtask.taskId}">
            <span class="subtask-name">${escapeHtml(subtask.nombre)}</span>
            ${subtask.descripcion ? `<span class="subtask-description">${escapeHtml(subtask.descripcion)}</span>` : ""}
          </button>
          ${renderPriorityChip(subtask.prioridad) || `<span class="priority-placeholder" aria-hidden="true"></span>`}
          <span class="due">${subtask.fechaVencimiento ? escapeHtml(formatDate(subtask.fechaVencimiento)) : ""}</span>
          <span class="row-actions">
            <button type="button" class="icon-btn" data-action="open-subtask" data-subtask-id="${subtask.id}" data-task-id="${subtask.taskId}" title="Editar subtarea" aria-label="Editar subtarea">&#9998;</button>
            <button type="button" class="icon-btn" data-action="delete-subtask" data-subtask-id="${subtask.id}" title="Eliminar subtarea" aria-label="Eliminar subtarea">&#128465;</button>
          </span>
        </div>
      `;
    }

    function renderQuickAddGoal(projectId) {
      return `
        <form class="quick-add is-goal" data-action="quick-add-goal" data-project-id="${projectId}">
          <input type="text" name="nombre" placeholder="+ Nueva meta" autocomplete="off">
          <input type="text" name="descripcion" placeholder="+ Descripcion breve" autocomplete="off">
          <select name="prioridad" aria-label="Prioridad de meta">
            ${renderPriorityOptions()}
          </select>
          <input type="date" name="fechaVencimiento" aria-label="Fecha limite de la meta" title="Fecha limite">
          <button class="primary-btn" type="submit">Crear</button>
          <button class="ghost-btn quick-add-card-btn" type="button" data-action="quick-add-card">Crear tarjeta</button>
        </form>
      `;
    }

    function renderSidebar() {
      const projects = sortedProjects();
      return `
        <aside class="sidebar">
          <div class="sidebar-head">
            <h2>Proyectos</h2>
            <button type="button" class="icon-btn" data-action="open-project" title="Nuevo proyecto">+</button>
          </div>
          <div class="project-list">
            ${projects.map((project, index) => {
              const stats = totalStatsForProject(project.id);
              return `
                <div class="project-chip project-item ${project.id === state.selectedProjectId ? "is-active" : ""}" data-project-id="${project.id}" draggable="true">
                  <button type="button" class="project-select" data-action="select-project" data-project-id="${project.id}">
                    <span class="project-dot" style="background:${project.color}"></span>
                    <span><strong>${escapeHtml(project.nombre)}</strong><small>${goalsForProject(project.id).length} metas - ${stats.pending} pendientes</small></span>
                  </button>
                  <div class="project-order-controls" aria-label="Reordenar ${escapeHtml(project.nombre)}">
                    <button type="button" class="project-order-btn" data-action="move-project" data-direction="up" data-project-id="${project.id}" title="Subir proyecto" ${index === 0 ? "disabled" : ""}>↑</button>
                    <button type="button" class="project-order-btn" data-action="move-project" data-direction="down" data-project-id="${project.id}" title="Bajar proyecto" ${index === projects.length - 1 ? "disabled" : ""}>↓</button>
                  </div>
                </div>
              `;
            }).join("")}
          </div>
        </aside>
      `;
    }

    function renderProjectTasks(project) {
      const sections = sortedSections(project.id);
      const looseTasks = sortedTasks(project.id, null);
      const stats = totalStatsForProject(project.id);
      return `
        <div class="content-head">
          <div>
            <h2 class="content-title-row">
              <span class="title-icon" style="color:${project.color}" aria-hidden="true">${escapeHtml(project.icono || projectIcons[0])}</span>
              <span class="title-text">${escapeHtml(project.nombre)}</span>
            </h2>
          </div>
          <div class="content-actions">
            <button type="button" class="small-btn" data-action="open-section" data-project-id="${project.id}">+ Meta</button>
            <button type="button" class="small-btn" data-action="open-project" data-project-id="${project.id}">Editar proyecto</button>
            <button type="button" class="danger-btn small-btn" data-action="delete-project" data-project-id="${project.id}">Eliminar</button>
          </div>
        </div>
        <div class="task-area">
          ${sections.map((section) => renderSectionBlock(section)).join("")}
          ${looseTasks.length ? `<section class="section-block" data-section-id=""><div class="section-title"><h3><span>Tareas por clasificar</span></h3></div><div class="task-list" data-drop-section="">${looseTasks.map((task) => renderTaskRow(task, false)).join("")}</div><div class="panel-section">${renderQuickAdd(project.id, null, "Nueva tarea por clasificar")}</div></section>` : ""}
          ${sections.length ? "" : `<div class="empty-state">Este proyecto aun no tiene metas. Crea una meta para comenzar.</div>`}
        </div>
      `;
    }

    function renderSectionBlock(section) {
      const tasks = sortedTasks(section.projectId, section.id);
      const stats = statsForGoal(section.projectId, section.id);
      return `
        <section class="section-block" data-section-id="${section.id}" draggable="true">
          <div class="section-title">
            <h3><span>${escapeHtml(section.nombre)}</span></h3>
            <div class="section-actions">
              ${renderPriorityChip(goalPriority(section))}
              ${section.fechaVencimiento ? `<span class="due">${escapeHtml(formatDate(section.fechaVencimiento))}</span>` : ""}
              <button type="button" class="icon-btn" data-action="open-section" data-section-id="${section.id}" title="Editar meta" aria-label="Editar meta">&#9998;</button>
              <button type="button" class="icon-btn" data-action="delete-section" data-section-id="${section.id}" title="Eliminar meta" aria-label="Eliminar meta">&#128465;</button>
            </div>
          </div>
          <div class="task-list" data-drop-section="${section.id}">
            ${tasks.length ? tasks.map((task) => renderTaskRow(task, false)).join("") : `<div class="empty-state">Anade tareas para construir esta meta.</div>`}
          </div>
          <div class="panel-section">${renderQuickAdd(section.projectId, section.id, "Nueva tarea para esta meta")}</div>
        </section>
      `;
    }

    function renderProjectModal(projectId) {
      const project = state.projects.find((p) => p.id === projectId);
      const isNew = !project;
      editingColor = project?.color || editingColor || palette[0];
      editingIcon = project?.icono || editingIcon || projectIcons[0];
      return `
        <div class="modal-backdrop" data-action="close-modal">
          <form class="modal" data-action="save-project">
            <div class="modal-head"><h2>${isNew ? "Nuevo proyecto" : "Editar proyecto"}</h2><button type="button" class="icon-btn" data-action="close-modal">x</button></div>
            <div class="modal-body">
              <input type="hidden" name="id" value="${project?.id || ""}">
              <input type="hidden" name="color" value="${editingColor}">
              <input type="hidden" name="icono" value="${escapeHtml(editingIcon)}">
              <div class="field"><label>Nombre del proyecto</label><input name="nombre" value="${escapeHtml(project?.nombre || "")}" placeholder="Nombre del proyecto" required autofocus></div>
              <div class="field"><label>Icono del proyecto</label><div class="icon-grid">${projectIcons.map((icon) => `<button type="button" class="icon-choice ${icon === editingIcon ? "is-active" : ""}" data-action="pick-project-icon" data-icon="${escapeHtml(icon)}" aria-label="Icono ${escapeHtml(icon)}">${escapeHtml(icon)}</button>`).join("")}</div></div>
              <div class="field"><label>Color cartografico</label><div class="color-grid">${palette.map((color) => `<button type="button" class="color-choice ${color === editingColor ? "is-active" : ""}" style="background:${color}" data-action="pick-color" data-color="${color}" aria-label="Color ${color}"></button>`).join("")}</div></div>
            </div>
            <div class="modal-foot"><button type="button" class="ghost-btn" data-action="close-modal">Cancelar</button><button type="submit" class="primary-btn">${isNew ? "Crear proyecto" : "Guardar cambios"}</button></div>
          </form>
        </div>
      `;
    }

    function renderSectionModal(sectionId, projectId) {
      const section = state.sections.find((s) => s.id === sectionId);
      const project = state.projects.find((p) => p.id === (section?.projectId || projectId || state.selectedProjectId));
      return `
        <div class="modal-backdrop" data-action="close-modal">
          <form class="modal" data-action="save-section">
            <div class="modal-head"><h2>${section ? "Editar meta" : "Nueva meta"}</h2><button type="button" class="icon-btn" data-action="close-modal">x</button></div>
            <div class="modal-body">
              <input type="hidden" name="id" value="${section?.id || ""}">
              <input type="hidden" name="projectId" value="${project?.id || ""}">
              <div class="field"><label>Proyecto</label><input value="${escapeHtml(project?.nombre || "")}" disabled></div>
              <div class="field">
                <label>Proyecto asociado</label>
                <select name="secondaryProjectId">
                  <option value="">Sin proyecto asociado</option>
                  ${sortedProjects().filter((item) => item.id !== project?.id).map((item) => `<option value="${item.id}" ${item.id === section?.secondaryProjectId ? "selected" : ""}>${escapeHtml(item.nombre)}</option>`).join("")}
                </select>
              </div>
              <div class="field"><label>Nombre de la meta</label><input name="nombre" value="${escapeHtml(section?.nombre || "")}" placeholder="Nombre de la meta" required autofocus></div>
              <div class="field"><label>Descripcion</label><textarea name="descripcion" placeholder="Descripcion de la meta">${escapeHtml(section?.descripcion || "")}</textarea></div>
              <div class="field">
                <label>Prioridad de la meta</label>
                <select name="prioridad">
                  ${renderPriorityOptions(goalPriority(section))}
                </select>
              </div>
              <div class="field"><label>Fecha limite</label><input type="date" name="fechaVencimiento" value="${section?.fechaVencimiento || ""}"></div>
              ${renderTagCheckboxField(section?.tags || [])}
              ${renderGoalLinkField(section, project)}
              ${section?.id ? renderBitacora(section, "goal", section.id) : ""}
            </div>
            <div class="modal-foot"><button type="button" class="ghost-btn" data-action="close-modal">Cancelar</button><button type="submit" class="primary-btn">Guardar</button></div>
          </form>
        </div>
      `;
    }

    function renderGoalLinkField(section, project) {
      if (!project) return "";
      const goals = sortedSections(project.id).filter((goal) => goal.id !== section?.id);
      if (!goals.length) {
        return `<div class="field"><label>Caminos con otras metas</label><p class="muted">Aún no hay otras metas para vincular.</p></div>`;
      }
      const linked = new Set(section ? [
        ...(Array.isArray(section.linkedGoalIds) ? section.linkedGoalIds : []),
        ...goals.filter((goal) => Array.isArray(goal.linkedGoalIds) && goal.linkedGoalIds.includes(section.id)).map((goal) => goal.id)
      ] : []);
      return `
        <div class="field">
          <label>Caminos con otras metas</label>
          <div class="goal-link-list">
            ${goals.map((goal) => `
              <label class="goal-link-option">
                <input type="checkbox" name="linkedGoalIds" value="${goal.id}" ${linked.has(goal.id) ? "checked" : ""}>
                <span>${escapeHtml(goal.nombre)}</span>
              </label>
            `).join("")}
          </div>
        </div>
      `;
    }

    function renderTagCheckboxField(selectedTags = []) {
      const selected = new Set(selectedTags || []);
      const tags = state.tags || [];
      return `
        <div class="field">
          <label>Etiquetas</label>
          ${tags.length ? `
            <div class="tag-field">
              ${tags.map((tag) => `
                <label class="tag-option" style="--tag-color:${tag.color}">
                  <input type="checkbox" name="tags" value="${tag.id}" ${selected.has(tag.id) ? "checked" : ""}>
                  <span class="tag-dot"></span>
                  <span>${escapeHtml(tag.nombre)}</span>
                </label>
              `).join("")}
            </div>
          ` : `<p class="muted">Crea etiquetas en la vista Etiquetas.</p>`}
        </div>
      `;
    }

    function renderTagPills(tagIds = []) {
      const tags = (tagIds || []).map((id) => tagById(id)).filter(Boolean);
      if (!tags.length) return "";
      return `<div class="tag-field is-compact">${tags.map((tag) => `<span class="tag-pill" style="--tag-color:${tag.color}"><span class="tag-dot"></span>${escapeHtml(tag.nombre)}</span>`).join("")}</div>`;
    }

    function renderTaskEditorTopbar(task, project, goal) {
      const crumb = goal?.nombre || project?.nombre || "Tareas por clasificar";
      return `
        <div class="task-editor-topbar">
          <div class="task-editor-crumb" title="${escapeHtml(crumb)}">
            <span class="task-editor-crumb-dot" aria-hidden="true"></span>
            <span>${escapeHtml(crumb)}</span>
          </div>
          <div class="task-editor-tools">
            <span aria-hidden="true">^</span>
            <span aria-hidden="true">v</span>
            <span aria-hidden="true">...</span>
            <button type="button" class="icon-btn" data-action="close-modal" aria-label="Cerrar">x</button>
          </div>
        </div>
      `;
    }

    function renderTaskEditorMain(task) {
      return `
        <section class="task-editor-main">
          <input type="hidden" name="completada" value="${task.completada ? "true" : "false"}">
          <div class="task-title-row">
            <button type="button" class="task-complete-toggle ${task.completada ? "is-done" : ""}" data-action="set-task-status" data-completed="${task.completada ? "false" : "true"}" aria-label="${task.completada ? "Marcar pendiente" : "Marcar completada"}">${task.completada ? "&#10003;" : ""}</button>
            <input class="task-title-input" name="nombre" value="${escapeHtml(task.nombre)}" required autofocus aria-label="Nombre de la tarea">
          </div>
          <textarea class="task-description-input" name="descripcion" placeholder="Descripcion">${escapeHtml(task.descripcion)}</textarea>
          <div class="task-editor-divider"></div>
          ${renderBitacora(task, "task", task.id)}
        </section>
      `;
    }

    function renderTaskComments(task) {
      return renderBitacora(task, "task", task.id);
    }

    function renderBitacora(item, type, itemId) {
      const comments = Array.isArray(item?.comentarios) ? item.comentarios.slice() : [];
      return `
        <div class="bitacora-panel" aria-label="Bitácora">
          <div class="bitacora-head">
            <h3>Bitácora</h3>
            <span>${comments.length} registro${comments.length === 1 ? "" : "s"}</span>
          </div>
          <div class="task-comment-row bitacora-composer">
            ${renderCommentAvatar()}
            <input class="task-comment-input" data-comment-type="${type}" data-comment-input="${itemId}" placeholder="Registrar avance" aria-label="Registrar avance">
            <button type="button" class="task-comment-submit" data-action="add-comment" data-item-type="${type}" data-item-id="${itemId}">Publicar</button>
          </div>
          ${renderCommentGroups(comments)}
        </div>
      `;
    }

    function renderCommentGroups(comments) {
      if (!comments.length) return `<div class="bitacora-empty">Aún no hay registros en la bitácora.</div>`;
      const groups = new Map();
      comments
        .slice()
        .sort((a, b) => new Date(b.createdAt || 0) - new Date(a.createdAt || 0))
        .forEach((comment) => {
          const key = formatLogDate(comment.createdAt);
          if (!groups.has(key)) groups.set(key, []);
          groups.get(key).push(comment);
        });
      return `
        <div class="bitacora-groups">
          ${Array.from(groups.entries()).map(([date, entries]) => `
            <section class="bitacora-day">
              <div class="bitacora-date">${escapeHtml(date)}</div>
              ${entries.map((comment) => `
                <article class="bitacora-entry">
                  ${renderCommentAvatar(comment.author)}
                  <div class="bitacora-bubble">
                    <div class="bitacora-meta">
                      <strong>${escapeHtml(comment.author || state.userName || "Usuario")}</strong>
                      <span>${escapeHtml(formatLogTime(comment.createdAt))}</span>
                    </div>
                    <div class="bitacora-text">${escapeHtml(comment.text || "")}</div>
                  </div>
                </article>
              `).join("")}
            </section>
          `).join("")}
        </div>
      `;
    }

    function formatLogDate(value) {
      const date = value ? new Date(value) : new Date();
      if (Number.isNaN(date.getTime())) return "Sin fecha";
      return new Intl.DateTimeFormat("es-CL", { weekday: "long", day: "2-digit", month: "long", year: "numeric" }).format(date);
    }

    function formatLogTime(value) {
      const date = value ? new Date(value) : new Date();
      if (Number.isNaN(date.getTime())) return "";
      return new Intl.DateTimeFormat("es-CL", { hour: "2-digit", minute: "2-digit" }).format(date);
    }

    function renderTaskMetaField(label, controlHtml, icon) {
      return `
        <div class="task-meta-field">
          <label>${label}</label>
          ${controlHtml}
          ${icon ? `<span class="task-meta-icon" aria-hidden="true">${icon}</span>` : ""}
        </div>
      `;
    }

    function renderTaskStaticMeta(name, value, text) {
      return `
        <input type="hidden" name="${name}" value="${escapeHtml(value || "")}">
        <div class="task-static-value" title="${escapeHtml(text || "Sin definir")}">${escapeHtml(text || "Sin definir")}</div>
      `;
    }

    function renderTaskSelectControl(tone, name, selectedValue, selectedLabel, options) {
      return `
        <div class="task-combo ${tone}" data-combo-name="${name}">
          <input type="hidden" name="${name}" value="${escapeHtml(selectedValue || "")}">
          <button type="button" class="task-combo-button" data-action="toggle-combo">
            <span class="task-combo-label">${escapeHtml(selectedLabel || "Seleccionar")}</span>
            <span class="task-combo-circle" aria-hidden="true"></span>
          </button>
          <div class="task-combo-menu">
            ${options.map((option) => `
              <button type="button" class="task-combo-option ${option.value === selectedValue ? "is-selected" : ""}" data-action="choose-combo" data-combo-name="${name}" data-value="${escapeHtml(option.value || "")}" data-label="${escapeHtml(option.label)}">${escapeHtml(option.label)}</button>
            `).join("")}
          </div>
        </div>
      `;
    }

    function renderTaskDateControl(task) {
      return `
        <div class="task-select-shell is-date">
          <input class="task-meta-control" type="date" name="fechaVencimiento" value="${task.fechaVencimiento || ""}">
          <button type="button" class="task-select-caret" data-action="open-date-picker" aria-label="Abrir calendario"></button>
        </div>
      `;
    }

    function renderRecurrenceControl(task) {
      const recurrence = normalizeRecurrence(task.recurrencia, task);
      const frequency = recurrence?.frecuencia || "";
      const interval = recurrence?.intervalo || 1;
      const endDate = recurrence?.fechaFin || "";
      return `
        <div class="recurrence-control">
          <div class="task-select-shell is-recurrence">
            <select class="task-meta-control" name="recurrenceFrequency" aria-label="Frecuencia de repeticion">
              <option value="" ${!frequency ? "selected" : ""}>No repetir</option>
              <option value="daily" ${frequency === "daily" ? "selected" : ""}>Cada dia</option>
              <option value="weekly" ${frequency === "weekly" ? "selected" : ""}>Cada semana</option>
              <option value="monthly" ${frequency === "monthly" ? "selected" : ""}>Cada mes</option>
            </select>
            <span class="task-select-caret" aria-hidden="true">v</span>
          </div>
          <div class="recurrence-grid">
            <label class="recurrence-mini-field">Cada
              <input type="number" name="recurrenceInterval" min="1" max="99" value="${interval}">
            </label>
            <label class="recurrence-mini-field">Hasta
              <input type="date" name="recurrenceEndDate" value="${endDate}">
            </label>
          </div>
          <span class="recurrence-note">${recurrence ? "Al completarla se creara la siguiente tarea pendiente." : "Sin repeticion automatica."}</span>
        </div>
      `;
    }

    function recurrenceFromTaskForm(form, task) {
      const frequency = form.elements.recurrenceFrequency?.value || "";
      if (!frequency) return null;
      return normalizeRecurrence({
        activa: true,
        frecuencia: frequency,
        intervalo: form.elements.recurrenceInterval?.value || 1,
        fechaFin: form.elements.recurrenceEndDate?.value || null,
        serieId: task?.recurrencia?.serieId || task?.recurrenceSeriesId || task?.id || uid("recurrence")
      }, task);
    }

    function renderPriorityPicker(task) {
      const current = normalizePriority(task.prioridad);
      return `
        <div class="priority-picker">
          <input type="hidden" name="prioridad" value="${current}">
          <button type="button" class="priority-button priority-empty ${current === "" ? "is-active" : ""}" data-action="set-priority" data-priority="" title="Quitar prioridad" aria-label="Quitar prioridad"></button>
          ${priorities.map((priority) => `
            <button type="button" class="priority-button ${priority === current ? "is-active" : ""}" data-action="set-priority" data-priority="${priority}">${priorityLabels[priority]}</button>
          `).join("")}
        </div>
      `;
    }

    function renderStatusPicker(task) {
      return `
        <div class="task-status-picker">
          <button type="button" class="task-status-option ${!task.completada ? "is-active" : ""}" data-action="set-task-status" data-completed="false">Pendiente</button>
          <button type="button" class="task-status-option ${task.completada ? "is-active" : ""}" data-action="set-task-status" data-completed="true">Completada</button>
        </div>
      `;
    }

    function renderTaskEditorSidebar(task, projectOptions, sectionOptions) {
      const project = state.projects.find((item) => item.id === task.projectId);
      const goal = state.sections.find((section) => section.id === task.sectionId);
      const secondaryProjectControl = `
        <select name="secondaryProjectId" class="task-meta-control">
          <option value="">Sin proyecto asociado</option>
          ${sortedProjects().filter((item) => item.id !== task.projectId).map((item) => `<option value="${item.id}" ${item.id === task.secondaryProjectId ? "selected" : ""}>${escapeHtml(item.nombre)}</option>`).join("")}
        </select>
      `;
      return `
        <aside class="task-editor-sidebar">
          ${renderTaskMetaField("Proyecto", renderTaskStaticMeta("projectId", task.projectId, project?.nombre || "Sin proyecto"), "")}
          ${renderTaskMetaField("Proyecto asociado", secondaryProjectControl, "")}
          ${renderTaskMetaField("Meta", renderTaskStaticMeta("sectionId", task.sectionId || "", goal?.nombre || "Tareas por clasificar"), "")}
          ${renderTaskMetaField("Fecha", renderTaskDateControl(task), "")}
          ${renderTaskMetaField("Repetir", renderRecurrenceControl(task), "")}
          ${renderTaskMetaField("Prioridad", renderPriorityPicker(task), "")}
          ${renderTagCheckboxField(task.tags || [])}
          ${renderTaskMetaField("Estado", renderStatusPicker(task), "")}
        </aside>
      `;
    }

    function renderInlineTaskEditor(task) {
      const project = state.projects.find((p) => p.id === task.projectId);
      const goal = state.sections.find((section) => section.id === task.sectionId);
      const crumb = goal?.nombre || project?.nombre || "Tareas por clasificar";
      const projectOptions = sortedProjects().map((project) => `<option value="${project.id}" ${project.id === task.projectId ? "selected" : ""}>${escapeHtml(project.nombre)}</option>`).join("");
      const sectionOptions = state.sections.filter((section) => section.projectId === task.projectId).sort((a, b) => a.orden - b.orden).map((section) => `<option value="${section.id}" ${section.id === task.sectionId ? "selected" : ""}>${escapeHtml(section.nombre)}</option>`).join("");
      return `
        <form class="inline-task-editor" data-action="save-task">
          <input type="hidden" name="id" value="${task.id}">
          <div class="task-editor-crumb" title="${escapeHtml(crumb)}">
            <span class="task-editor-crumb-dot" aria-hidden="true"></span>
            <span>${escapeHtml(crumb)}</span>
          </div>
          ${renderTaskEditorMain(task)}
          ${renderTaskEditorSidebar(task, projectOptions, sectionOptions)}
          <div class="inline-task-footer">
            <button type="button" class="danger-btn" data-action="delete-task" data-task-id="${task.id}">Eliminar</button>
            <div class="inline-task-footer-actions">
              <button type="submit" class="primary-btn">Guardar tarea</button>
            </div>
          </div>
        </form>
      `;
    }

    function renderTaskModal(taskId) {
      const task = state.tasks.find((t) => t.id === taskId);
      if (!task) return "";
      const project = state.projects.find((p) => p.id === task.projectId);
      const goal = state.sections.find((section) => section.id === task.sectionId);
      const projectOptions = sortedProjects().map((project) => `<option value="${project.id}" ${project.id === task.projectId ? "selected" : ""}>${escapeHtml(project.nombre)}</option>`).join("");
      const sectionOptions = state.sections.filter((section) => section.projectId === task.projectId).sort((a, b) => a.orden - b.orden).map((section) => `<option value="${section.id}" ${section.id === task.sectionId ? "selected" : ""}>${escapeHtml(section.nombre)}</option>`).join("");
      return `
        <div class="modal-backdrop task-editor-backdrop" data-action="close-modal">
          <form class="modal task-editor-modal" data-action="save-task">
            ${renderTaskEditorTopbar(task, project, goal)}
            <input type="hidden" name="id" value="${task.id}">
            <div class="task-editor-grid">
              ${renderTaskEditorMain(task)}
              ${renderTaskEditorSidebar(task, projectOptions, sectionOptions)}
            </div>
            <div class="task-editor-footer">
              <button type="button" class="danger-btn" data-action="delete-task" data-task-id="${task.id}">Eliminar</button>
              <div class="task-editor-footer-actions">
                <button type="button" class="ghost-btn" data-action="close-modal">Cancelar</button>
                <button type="submit" class="primary-btn">Guardar tarea</button>
              </div>
            </div>
          </form>
        </div>
      `;
    }

    function renderSubtaskModal(subtaskId, taskId) {
      const parentTask = state.tasks.find((task) => task.id === taskId) || state.tasks.find((task) => task.id === state.selectedTaskId);
      if (!parentTask) return "";
      const modalParentSubtaskId = state.modal?.parentSubtaskId || null;
      const subtask = state.subtasks.find((item) => item.id === subtaskId) || {
        id: "",
        taskId: parentTask.id,
        parentSubtaskId: modalParentSubtaskId,
        nombre: "",
        descripcion: "",
        prioridad: "",
        completada: false,
        fechaVencimiento: "",
        tags: [],
        comentarios: []
      };
      const goal = state.sections.find((section) => section.id === parentTask.sectionId);
      return `
        <div class="modal-backdrop task-editor-backdrop" data-action="close-modal">
          <form class="modal task-editor-modal subtask-editor-modal" data-action="save-subtask">
            <div class="modal-head">
              <h2>${subtask.id ? "Editar subtarea" : "Nueva subtarea"}</h2>
              <button type="button" class="icon-btn" data-action="close-modal">x</button>
            </div>
            <input type="hidden" name="id" value="${subtask.id}">
            <input type="hidden" name="taskId" value="${parentTask.id}">
            <input type="hidden" name="parentSubtaskId" value="${subtask.parentSubtaskId || ""}">
            <input type="hidden" name="completada" value="${subtask.completada ? "true" : "false"}">
            <div class="task-editor-grid">
              <section class="task-editor-main">
                <div class="task-editor-crumb" title="${escapeHtml(parentTask.nombre)}">
                  <span class="task-editor-crumb-dot" aria-hidden="true"></span>
                  <span>${escapeHtml(parentTask.nombre)}</span>
                </div>
                <div class="task-title-row">
                  <button type="button" class="task-complete-toggle ${subtask.completada ? "is-done" : ""}" data-action="set-task-status" data-completed="${subtask.completada ? "false" : "true"}" aria-label="${subtask.completada ? "Reabrir subtarea" : "Completar subtarea"}">${subtask.completada ? "✓" : ""}</button>
                  <input class="task-title-input" name="nombre" value="${escapeHtml(subtask.nombre)}" placeholder="Nombre de la subtarea" required autofocus>
                </div>
                <textarea class="task-description-input" name="descripcion" placeholder="Descripcion">${escapeHtml(subtask.descripcion || "")}</textarea>
                ${subtask.id ? renderBitacora(subtask, "subtask", subtask.id) : ""}
              </section>
              <aside class="task-editor-sidebar">
                ${renderTaskMetaField("Tarea", renderTaskStaticMeta("parentTask", parentTask.id, parentTask.nombre), "")}
                ${renderTaskMetaField("Meta", renderTaskStaticMeta("parentGoal", parentTask.sectionId || "", goal?.nombre || "Tareas por clasificar"), "")}
                ${renderTaskMetaField("Fecha", `<div class="task-select-shell is-date"><input class="task-meta-control" type="date" name="fechaVencimiento" value="${subtask.fechaVencimiento || ""}"><button type="button" class="task-select-caret" data-action="open-date-picker" aria-label="Abrir calendario"></button></div>`, "")}
                ${renderTaskMetaField("Prioridad", renderPriorityPicker(subtask), "")}
                ${renderTagCheckboxField(subtask.tags || [])}
                ${renderTaskMetaField("Estado", renderStatusPicker(subtask), "")}
              </aside>
            </div>
            <div class="task-editor-footer">
              ${subtask.id ? `<button type="button" class="danger-btn" data-action="delete-subtask" data-subtask-id="${subtask.id}">Eliminar</button>` : `<span></span>`}
              <div class="task-editor-footer-actions">
                <button type="button" class="ghost-btn" data-action="close-modal">Cancelar</button>
                <button type="submit" class="primary-btn">Guardar subtarea</button>
              </div>
            </div>
          </form>
        </div>
      `;
    }

    function renderSupabaseWorkspaceControls() {
      const workspaces = supabaseConfig.workspaces || [];
      return `
        <div class="workspace-sync-box">
          <div class="settings-card-head">
            <strong>Espacio de trabajo</strong>
            <span class="muted">${workspaces.length ? `${workspaces.length} disponible${workspaces.length === 1 ? "" : "s"}` : "Conecta tu cuenta para verlos"}</span>
          </div>
          <div class="settings-grid">
            <div class="field">
              <label>Trabajar en</label>
              <select name="supabaseWorkspaceId">
                ${workspaces.length
                  ? workspaces.map((workspace) => `<option value="${workspace.id}" ${workspace.id === supabaseConfig.activeWorkspaceId ? "selected" : ""}>${escapeHtml(workspace.name)}</option>`).join("")
                  : `<option value="">Sin espacios todavia</option>`}
              </select>
            </div>
            <div class="field workspace-inline-action">
              <label>&nbsp;</label>
              <button type="button" class="small-btn" data-action="supabase-workspace-switch">Cambiar / cargar</button>
            </div>
            <div class="field">
              <label>Nuevo espacio</label>
              <input name="supabaseWorkspaceName" placeholder="Nombre del espacio compartido">
            </div>
            <div class="field workspace-inline-action">
              <label>&nbsp;</label>
              <button type="button" class="small-btn" data-action="supabase-workspace-create">Crear espacio</button>
            </div>
            <div class="field">
              <label>Invitar por correo</label>
              <input type="email" name="supabaseInviteEmail" placeholder="persona@email.cl">
            </div>
            <div class="field workspace-invite-row">
              <label>Permiso</label>
              <div class="workspace-invite-actions">
                <select name="supabaseInviteRole">
                  <option value="editor">Puede editar</option>
                  <option value="viewer">Solo lectura</option>
                </select>
                <button type="button" class="primary-btn small-btn" data-action="supabase-invite">Invitar</button>
              </div>
            </div>
          </div>
          <p class="muted workspace-help">La otra persona debe entrar a Atelier con el mismo correo invitado. Si aun no tiene cuenta, puede crearla desde esta misma pantalla.</p>
        </div>
      `;
    }

    function renderSupabaseSettingsCard() {
      const statusText = supabaseStatus.updatedAt
        ? `${supabaseStatus.message} Ultima sincronizacion: ${formatDate(supabaseStatus.updatedAt)}.`
        : supabaseStatus.message;
      return `
        <div class="detail-card supabase-settings-card">
          <div class="settings-card-head">
            <strong>Supabase</strong>
            <span class="sync-status ${supabaseStatusClass()}">${escapeHtml(statusText)}</span>
          </div>
          <p class="muted">Sincroniza esta app en una tabla segura de Supabase. La contrasena solo se usa para iniciar sesion y no se guarda.</p>
          <label class="check-row">
            <input type="checkbox" name="supabaseEnabled" ${supabaseConfig.enabled ? "checked" : ""}>
            <span>Activar sincronizacion con Supabase</span>
          </label>
          <div class="settings-grid">
            <div class="field"><label>Email</label><input type="email" name="supabaseEmail" value="${escapeHtml(supabaseConfig.email || "")}" placeholder="tu@email.cl"></div>
            <div class="field"><label>Contrasena</label><input type="password" name="supabasePassword" placeholder="Solo para conectar esta vez"></div>
          </div>
          <details class="advanced-sync">
            <summary>Opciones avanzadas de Supabase</summary>
            <div class="settings-grid">
              <div class="field"><label>URL del proyecto</label><input name="supabaseUrl" value="${escapeHtml(supabaseConfig.url || DEFAULT_SUPABASE_URL)}" placeholder="https://xxxxx.supabase.co"></div>
              <div class="field"><label>Clave anon / publishable</label><input name="supabaseAnonKey" value="${escapeHtml(supabaseConfig.anonKey || DEFAULT_SUPABASE_PUBLISHABLE_KEY)}" placeholder="sb_publishable..."></div>
            </div>
          </details>
          <div class="settings-actions">
            <button type="button" class="small-btn" data-action="supabase-pull">Entrar / actualizar</button>
            <button type="button" class="ghost-btn small-btn" data-action="supabase-signup">Crear cuenta</button>
            <button type="button" class="primary-btn small-btn" data-action="supabase-push">Subir datos actuales</button>
            <button type="button" class="ghost-btn small-btn" data-action="supabase-signout">Cerrar sesion</button>
          </div>
          ${renderSupabaseWorkspaceControls()}
        </div>
      `;
    }

    function renderSettingsModal() {
      return `
        <div class="modal-backdrop" data-action="close-modal">
          <form class="modal" data-action="save-settings">
            <div class="modal-head"><h2>Configuracion</h2><button type="button" class="icon-btn" data-action="close-modal">x</button></div>
            <div class="modal-body">
              <div class="field"><label>Nombre de la app</label><input name="kingdomName" value="${escapeHtml(state.kingdomName)}" required autofocus></div>
              <div class="field"><label>Nombre de usuario</label><input name="userName" value="${escapeHtml(state.userName || "Usuario")}" required></div>
              <div class="field">
                <label>Fotografia de usuario</label>
                <div class="settings-avatar">
                  ${state.userPhoto ? `<span class="user-avatar"><img src="${escapeHtml(state.userPhoto)}" alt=""></span>` : `<span class="user-avatar" aria-hidden="true">${escapeHtml(userInitials())}</span>`}
                  <input type="file" name="userPhoto" accept="image/*">
                </div>
              </div>
              ${renderSupabaseSettingsCard()}
              <div class="detail-card"><strong>Persistencia local</strong><p class="muted">Tus proyectos, metas y tareas se guardan tambien en este navegador con localStorage como respaldo.</p><button type="button" class="danger-btn small-btn" data-action="clear-all">Limpiar todo</button></div>
            </div>
            <div class="modal-foot"><button type="button" class="ghost-btn" data-action="close-modal">Cancelar</button><button type="submit" class="primary-btn">Guardar</button></div>
          </form>
        </div>
      `;
    }

    function updateContinentCoast(projectId) {
      const project = state.projects.find((item) => item.id === projectId);
      if (!project) return;
      const mapIndex = projectMapIndex(projectId);
      const coast = continentPathForProject(project, mapIndex);
      document.querySelectorAll("[data-coast-project-id]").forEach((path) => {
        if (path.dataset.coastProjectId === projectId) path.setAttribute("d", coast);
      });
    }

    function handleCastlePointerDown(event) {
      const group = event.currentTarget;
      const projectId = group.dataset.projectId;
      const sectionId = group.dataset.sectionId || null;
      const project = state.projects.find((p) => p.id === projectId);
      const goal = sectionId ? state.sections.find((section) => section.id === sectionId) : selectedGoalForProject(projectId);
      if (!project || !goal) return;
      event.preventDefault();
      const svg = group.closest("svg");
      const point = svgPoint(svg, event.clientX, event.clientY);
      const pos = goalPosition(goal, project, 0);
      dragCastle = {
        projectId,
        sectionId,
        svg,
        offsetX: point.x - pos.x,
        offsetY: point.y - pos.y,
        moved: false
      };
      state.selectedProjectId = projectId;
      state.selectedTaskId = null;
    }

    function handleCastlePointerMove(event) {
      if (!dragCastle) return;
      const target = dragCastle.sectionId
        ? state.sections.find((section) => section.id === dragCastle.sectionId)
        : state.projects.find((project) => project.id === dragCastle.projectId);
      if (!target) return;
      const point = svgPoint(dragCastle.svg, event.clientX, event.clientY);
      target.posicion = {
        x: Math.max(35, Math.min(865, point.x - dragCastle.offsetX)),
        y: Math.max(85, Math.min(710, point.y - dragCastle.offsetY))
      };
      dragCastle.moved = true;
      saveState();
      updateContinentCoast(dragCastle.projectId);
      const key = goalKey(dragCastle.projectId, dragCastle.sectionId);
      const node = document.querySelector(`.castle-node[data-goal-key="${key}"]`);
      const label = document.querySelector(`.castle-label[data-goal-key="${key}"]`);
      if (node) {
        const stats = statsForGoal(dragCastle.projectId, dragCastle.sectionId);
        node.setAttribute("transform", `translate(${target.posicion.x} ${target.posicion.y}) scale(${cityScaleForGoal(stats)})`);
      }
      if (label) label.style.display = "none";
    }

    function handleCastlePointerUp() {
      if (!dragCastle) return;
      const moved = dragCastle.moved;
      const projectId = dragCastle.projectId;
      const sectionId = dragCastle.sectionId;
      dragCastle = null;
      if (!moved) {
        return;
      }
      setState({
        selectedTaskId: null,
        mapGoalPopupId: null,
        mapTaskPopupId: null,
        continentPopupId: null
      }, false);
      if (moved) showToast("Meta actualizada; el proyecto crecio si hacia falta");
    }

    function toggleTask(taskId) {
      const task = state.tasks.find((item) => item.id === taskId);
      if (!task) return;
      mutate(() => {
        const wasComplete = task.completada;
        task.completada = !task.completada;
        task.completedAt = task.completada ? nowISO() : null;
        state.selectedProjectId = task.projectId;
        state.selectedGoalId = goalKey(task.projectId, task.sectionId);
        state.selectedTaskId = task.id;
        state.recentlyCompletedTaskId = task.completada ? task.id : null;
        const statsAfter = statsForGoal(task.projectId, task.sectionId);
        state.celebratingGoalId = task.completada && !wasComplete && statsAfter.total > 0 && statsAfter.pending === 0 ? goalKey(task.projectId, task.sectionId) : null;
      });
      showToast(task.completada ? "Tarea completada" : "Tarea reabierta");
      setTimeout(() => {
        if (state.recentlyCompletedTaskId === taskId || state.celebratingGoalId === goalKey(task.projectId, task.sectionId)) {
          mutate(() => {
            if (state.recentlyCompletedTaskId === taskId) state.recentlyCompletedTaskId = null;
            if (state.celebratingGoalId === goalKey(task.projectId, task.sectionId)) state.celebratingGoalId = null;
          }, { persist: false });
        }
      }, 1900);
    }

    ensureRecurringInstances();
    syncCompletionState();
    repairAllDistantGoalPositions();
    if (state.view === "overview") {
      state = normalizeState({ ...state, ...overviewOpenAllPatch() });
    }
    render();
    initSupabaseFromConfig({ mode: "pull", silent: true });
  </script>
</body>
</html>
