<!doctype html>
<html lang="es-CL">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Atelier</title>
  <style>
    :root {
      --bg: #0b0f14;
      --bg-soft: #121821;
      --panel: rgba(18, 24, 33, 0.96);
      --panel-strong: #192231;
      --line: rgba(193, 202, 214, 0.16);
      --text: #edf1f5;
      --muted: #9ba8b7;
      --gold: #c5a46d;
      --green: #5ba878;
      --red: #b64a4a;
      --blue: #5e85aa;
      --orange: #b98652;
      --shadow: 0 20px 70px rgba(0, 0, 0, 0.46);
      --font-main: "Cambria Math", Cambria, Georgia, serif;
      color-scheme: dark;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      height: 100vh;
      min-height: 100vh;
      font-family: var(--font-main);
      font-size: 14px;
      background:
        radial-gradient(circle at 16% -8%, rgba(63, 84, 105, 0.28), transparent 34rem),
        radial-gradient(circle at 88% 8%, rgba(72, 91, 70, 0.18), transparent 28rem),
        linear-gradient(135deg, #070a0f 0%, #0d131a 48%, #121821 100%);
      color: var(--text);
    }

    button,
    input,
    textarea,
    select {
      font: inherit;
    }

    button {
      border: 0;
      color: inherit;
      cursor: pointer;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.45;
    }

    input,
    textarea,
    select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(7, 10, 18, 0.52);
      color: var(--text);
      outline: none;
    }

    input,
    select {
      min-height: 40px;
      padding: 0 12px;
    }

    textarea {
      min-height: 92px;
      padding: 10px 12px;
      resize: vertical;
    }

    input:focus,
    textarea:focus,
    select:focus {
      border-color: rgba(212, 165, 116, 0.72);
      box-shadow: 0 0 0 3px rgba(212, 165, 116, 0.16);
    }

    .app {
      height: 100vh;
      min-height: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      display: grid;
      grid-template-columns: minmax(360px, 1fr) auto minmax(300px, 1fr);
      align-items: center;
      gap: clamp(10px, 1.2vw, 18px);
      padding: 16px 22px;
      border-bottom: 1px solid var(--line);
      background: rgba(12, 10, 18, 0.88);
      backdrop-filter: blur(18px);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      min-width: 0;
    }

    .brand-copy {
      flex: 1 1 auto;
      min-width: 0;
    }

    .brand h1 {
      margin: 0;
      font-family: var(--font-main);
      font-size: clamp(1.2rem, 1.55vw, 1.55rem);
      letter-spacing: 0;
      line-height: 1.05;
    }

    .brand small {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 0.82rem;
      font-style: italic;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .user-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-width: max-content;
      padding-left: 12px;
      border-left: 1px solid rgba(193, 202, 214, 0.18);
      color: var(--text);
      font-size: 0.78rem;
      font-weight: 800;
    }

    .user-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex: 0 0 auto;
      overflow: hidden;
      border: 1px solid rgba(193, 202, 214, 0.38);
      background: linear-gradient(135deg, #64748b, #1f2937);
      color: #f8fafc;
      font-size: 0.68rem;
      font-weight: 900;
    }

    .user-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .settings-avatar {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .settings-avatar .user-avatar {
      width: 42px;
      height: 42px;
      font-size: 0.82rem;
    }

    .user-name {
      max-width: none;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .view-toggle {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 4px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.055);
    }

    .view-toggle button {
      display: flex;
      align-items: center;
      gap: 8px;
      min-height: 34px;
      padding: 0 11px;
      border-radius: 999px;
      background: transparent;
      color: var(--muted);
      font-size: 0.78rem;
      white-space: nowrap;
    }

    .view-toggle button.is-active {
      color: #071014;
      background: linear-gradient(135deg, #c8d2dc, #8da2b5);
      box-shadow: 0 8px 24px rgba(94, 133, 170, 0.22);
    }

    .global-actions {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 6px;
      min-width: 0;
      justify-self: end;
      width: 100%;
      max-width: 100%;
      overflow: visible;
    }

    .counter {
      display: flex;
      flex-wrap: nowrap;
      justify-content: flex-end;
      gap: 6px;
    }

    .pending-breakdown {
      flex: 0 1 auto;
      min-width: 150px;
      max-width: min(40vw, 560px);
      overflow-x: hidden;
      overflow-y: hidden;
      justify-content: flex-start;
      padding-bottom: 1px;
      scrollbar-width: thin;
    }

    .counter > span,
    .counter > button,
    .settings-btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      min-height: 26px;
      padding: 0 7px;
      border: 1px solid var(--line);
      border-radius: 2px;
      background: rgba(255, 255, 255, 0.045);
      color: var(--muted);
      font-size: 0.74rem;
      white-space: nowrap;
      flex: 0 0 auto;
    }

    .counter > button {
      cursor: pointer;
    }

    .pending-label {
      flex: 0 0 auto;
      color: var(--muted);
      font-size: 0.78rem;
      white-space: nowrap;
      align-self: center;
    }

    .pending-chip strong {
      color: var(--text);
      font-weight: 800;
    }

    .pending-chip {
      position: relative;
      justify-content: center;
      flex: 0 0 34px;
      min-width: 34px;
      width: 34px;
      padding: 0;
      border-color: rgba(193, 202, 214, 0.22);
    }

    .pending-chip::before {
      content: "";
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 4px;
      background: var(--project-color, var(--gold));
    }

    .pending-chip .pending-name {
      display: none;
    }

    .pending-chip .pending-count {
      color: var(--text);
      font-size: 0.78rem;
      font-weight: 800;
    }

    .pending-chip:hover {
      border-color: rgba(212, 165, 116, 0.58);
      background: rgba(212, 165, 116, 0.1);
    }

    .settings-btn {
      flex: 0 0 auto;
      min-width: 92px;
      justify-content: center;
      color: var(--text);
    }

    .full-map-btn {
      width: 30px;
      min-width: 30px;
      height: 30px;
      min-height: 30px;
      padding: 0;
      border-radius: 50%;
      color: #dbe5ee;
    }

    .icon-btn,
    .small-btn,
    .primary-btn,
    .danger-btn,
    .ghost-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 38px;
      padding: 0 12px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.055);
      color: var(--text);
    }

    .icon-btn {
      width: 38px;
      padding: 0;
      font-size: 1rem;
    }

    .small-btn {
      min-height: 32px;
      padding: 0 10px;
      font-size: 0.82rem;
    }

    .primary-btn {
      border-color: rgba(141, 162, 181, 0.58);
      background: linear-gradient(135deg, #9fb0bf, #c7d1da);
      color: #071014;
      font-weight: 800;
    }

    .danger-btn {
      border-color: rgba(220, 38, 38, 0.4);
      background: rgba(220, 38, 38, 0.16);
      color: #fecaca;
    }

    .ghost-btn {
      background: transparent;
      color: var(--muted);
    }

    .main {
      flex: 1;
      min-height: 0;
      overflow: hidden;
    }

    .map-view {
      position: relative;
      height: 100%;
      min-height: 0;
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 8px;
      padding: 16px;
      overflow: hidden;
    }

    .map-view.has-project {
      align-items: start;
      overflow-x: hidden;
      overflow-y: hidden;
    }

    .map-view.has-project.no-goal,
    .map-view.has-project.has-goal.no-task,
    .map-view.has-task {
      grid-template-columns: minmax(260px, 360px) minmax(0, 1fr);
      align-items: start;
      gap: 6px;
      padding: 10px;
      overflow-x: hidden;
      overflow-y: hidden;
    }

    .map-column {
      min-height: 0;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto;
      gap: 8px;
      align-self: stretch;
    }

    .map-view.no-project .map-column {
      width: min(100%, calc((100vh - 150px) * 1.125));
      height: 100%;
      min-height: 100%;
      justify-self: center;
      align-self: stretch;
    }

    .map-view.no-project .map-shell {
      width: 100%;
      height: 100%;
      min-height: 100%;
    }

    .map-view.has-project .map-column,
    .map-view.has-task .map-column {
      align-self: stretch;
      grid-template-rows: auto minmax(220px, 32vh) minmax(0, 1fr);
    }

    .map-view.has-project .map-shell,
    .map-view.has-task .map-shell {
      height: min(32vh, 280px);
      min-height: 220px;
      align-self: start;
    }

    .map-view.has-project .project-panel,
    .map-view.has-project .goal-tasks-panel,
    .map-view.has-project .project-tree-panel,
    .map-view.has-task .project-panel,
    .map-view.has-task .goal-tasks-panel,
    .map-view.has-task .project-tree-panel,
    .map-view.has-task .task-detail {
      height: 100%;
      max-height: 100%;
    }

    .map-view.has-task .task-detail,
    .goal-tasks-panel {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(18, 14, 25, 0.9);
      box-shadow: var(--shadow);
    }

    .map-view .inline-task-editor {
      height: 100%;
    }

    .map-shell {
      position: relative;
      height: 100%;
      min-height: 0;
      border: 1px solid rgba(231, 219, 191, 0.16);
      border-radius: 8px;
      overflow: hidden;
      background: #0b1020;
      box-shadow: var(--shadow);
    }

    .map-context-card {
      min-height: 0;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(18, 14, 25, 0.9);
      box-shadow: var(--shadow);
    }

    .map-view.has-project .map-context-card,
    .map-view.has-task .map-context-card {
      display: flex;
      min-height: 0;
      flex-direction: column;
      overflow: hidden;
    }

    .map-context-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
    }

    .map-context-head .panel-title {
      max-width: 100%;
    }

    .map-context-actions {
      display: flex;
      flex: 0 0 auto;
      gap: 8px;
      align-items: center;
      justify-content: flex-end;
      flex-wrap: wrap;
    }

    .map-new-project-btn {
      border-color: rgba(212, 165, 116, 0.5);
      background: rgba(212, 165, 116, 0.12);
      color: #f4d6a7;
    }

    .map-delete-project-btn {
      border-color: rgba(185, 74, 74, 0.42);
      background: rgba(185, 74, 74, 0.14);
      color: #f4c7bd;
    }

    .map-project-select {
      width: 100%;
      margin-top: 10px;
      min-height: 36px;
      padding: 0 10px;
      border-radius: 7px;
      border: 1px solid rgba(141, 162, 181, 0.34);
      background: #111620;
      color: var(--text);
      font: inherit;
    }

    .map-project-list {
      display: grid;
      gap: 6px;
      max-height: 170px;
      margin-top: 10px;
      overflow: auto;
      padding-right: 2px;
    }

    .map-view.has-project .map-project-list,
    .map-view.has-task .map-project-list {
      flex: 1;
      max-height: none;
      min-height: 0;
      align-content: start;
    }

    .map-project-row {
      min-height: 34px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: center;
      gap: 8px;
      padding: 0 10px;
      border: 1px solid rgba(193, 202, 214, 0.16);
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.04);
    }

    .map-project-name-btn {
      min-width: 0;
      min-height: 34px;
      display: grid;
      grid-template-columns: 12px minmax(0, 1fr);
      align-items: center;
      gap: 8px;
      padding: 0;
      border: 0;
      background: transparent;
      color: var(--text);
      text-align: left;
    }

    .map-project-row.is-active {
      border-color: rgba(212, 165, 116, 0.48);
      background: rgba(212, 165, 116, 0.12);
    }

    .map-project-name-btn span:last-child {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .map-project-order {
      display: flex;
      gap: 4px;
    }

    .map-project-order .project-order-btn {
      width: 28px;
      min-width: 28px;
      height: 28px;
      min-height: 28px;
      padding: 0;
    }

    .map-focus-project-btn {
      position: absolute;
      right: 12px;
      bottom: 12px;
      z-index: 6;
      box-shadow: 0 10px 22px rgba(0, 0, 0, 0.28);
    }

    .map-panel-resizer {
      position: relative;
      align-self: stretch;
      min-width: 10px;
      border: 0;
      border-radius: 2px;
      background: transparent;
      cursor: col-resize;
    }

    .map-panel-resizer::before {
      content: "";
      position: absolute;
      top: 12px;
      bottom: 12px;
      left: 4px;
      width: 2px;
      border-radius: 999px;
      background: rgba(193, 202, 214, 0.18);
    }

    .map-panel-resizer:hover::before,
    body.is-resizing-map-panel .map-panel-resizer::before {
      background: rgba(212, 165, 116, 0.72);
    }

    .map-toolbar {
      position: relative;
      z-index: 5;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-self: start;
      gap: 6px;
      max-width: 100%;
      width: fit-content;
      padding: 6px;
      border: 1px solid rgba(231, 219, 191, 0.18);
      border-radius: 8px;
      background: rgba(7, 11, 16, 0.76);
      backdrop-filter: blur(10px);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.28);
    }

    .map-toolbar button {
      min-width: 32px;
      min-height: 32px;
      padding: 0 10px;
      border-radius: 6px;
      border: 1px solid rgba(193, 202, 214, 0.16);
      background: rgba(255, 255, 255, 0.06);
      color: #d7e2eb;
      font-size: 0.76rem;
      font-weight: 700;
    }

    .map-toolbar button.is-active {
      background: #d8c99f;
      color: #172027;
      border-color: rgba(255, 255, 255, 0.35);
    }

    .empty-atlas-create-btn {
      position: absolute;
      left: 50%;
      top: 50%;
      z-index: 4;
      transform: translate(-50%, -50%);
      min-height: 48px;
      padding: 0 24px;
      border-radius: 6px;
      border: 1px solid rgba(231, 219, 191, 0.42);
      background: linear-gradient(135deg, #d8c18e, #b99055);
      color: #17120c;
      font-weight: 900;
      box-shadow: 0 18px 38px rgba(0, 0, 0, 0.34);
    }

    .empty-atlas-create-btn:hover {
      filter: brightness(1.05);
    }

    .kingdom-map {
      display: block;
      width: 100%;
      height: 100%;
      min-height: 0;
      touch-action: none;
      cursor: grab;
      user-select: none;
    }

    .kingdom-map text {
      font-family: var(--font-main);
    }

    .kingdom-map.is-panning {
      cursor: grabbing;
    }

    .castle-node,
    .castle-label,
    .task-construction,
    .continent-title-group,
    .continent {
      cursor: pointer;
    }

    .castle-node:active,
    .castle-label:active {
      cursor: grabbing;
    }

    .castle-label-box {
      filter: drop-shadow(0 5px 10px rgba(0, 0, 0, 0.32));
    }

    .continent-title-group {
      cursor: pointer;
    }

    .continent-title-plate {
      fill: rgba(248, 237, 207, 0.82);
      stroke: rgba(78, 58, 34, 0.24);
      stroke-width: 1px;
      filter: drop-shadow(0 5px 8px rgba(23, 19, 13, 0.24));
    }

    .continent-title-text {
      fill: #322719;
      font-size: 22px;
      font-weight: 900;
      paint-order: stroke;
      stroke: rgba(255, 248, 225, 0.86);
      stroke-width: 1.7px;
      stroke-linejoin: round;
    }

    .castle-node,
    .task-construction {
      shape-rendering: geometricPrecision;
    }

    .city-title-label {
      filter: drop-shadow(0 3px 6px rgba(18, 14, 9, 0.24));
    }

    .city-title-plate {
      fill: rgba(248, 237, 207, 0.78);
      stroke: var(--map-goal-accent, #8f7550);
      stroke-opacity: 0.62;
      stroke-width: 1px;
    }

    .city-title-cap {
      fill: var(--map-goal-accent, #8f7550);
      opacity: 0.82;
    }

    .city-title-text {
      fill: #2f281e;
      font-size: 13.2px;
      font-weight: 850;
      letter-spacing: 0;
      paint-order: stroke;
      stroke: rgba(255, 248, 225, 0.9);
      stroke-width: 1.45px;
      stroke-linejoin: round;
      pointer-events: none;
    }

    .city-progress-track {
      fill: rgba(71, 55, 34, 0.16);
    }

    .city-progress-fill {
      fill: var(--map-goal-accent, #8f7550);
      opacity: 0.78;
    }

    .task-title-plate {
      fill: transparent;
      stroke: none;
      filter: none;
    }

    .task-title-layer {
      pointer-events: none;
    }

    .task-title-text {
      fill: #e8ffe9;
      font-size: 11.2px;
      font-weight: 850;
      letter-spacing: 0;
      paint-order: stroke;
      stroke: var(--map-label-stroke, #2e6f4a);
      stroke-width: 2.7px;
      stroke-linejoin: round;
    }

    .task-title-label.is-complete .task-title-text {
      fill: #d8e9d3;
      opacity: 0.82;
    }

    .subtask-title-layer {
      pointer-events: none;
    }

    .subtask-title-text {
      fill: #ffe0dc;
      font-size: 8.6px;
      font-weight: 850;
      letter-spacing: 0;
      paint-order: stroke;
      stroke: var(--map-label-stroke, #963c36);
      stroke-width: 2px;
      stroke-linejoin: round;
    }

    .continent-title-popup,
    .castle-detail-popup {
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.16s ease;
    }

    .continent-title-group.is-open .continent-title-popup,
    .castle-detail-popup.is-open {
      opacity: 1;
      pointer-events: auto;
    }

    .map-hover-popup {
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.12s ease;
    }

    .goal-hover-hit,
    .task-hover-hit {
      cursor: pointer;
    }

    .map-hover-zone {
      fill: transparent;
      pointer-events: all;
    }

    .goal-hover-hit:hover > .map-hover-popup,
    .task-hover-hit:hover > .map-hover-popup {
      opacity: 1;
    }

    .map-popup-close {
      cursor: pointer;
    }

    .map-popup-close rect {
      fill: rgba(255, 255, 255, 0.08);
      stroke: rgba(248, 250, 252, 0.28);
      stroke-width: 0.8;
    }

    .map-popup-close:hover rect {
      fill: rgba(255, 255, 255, 0.18);
      stroke: rgba(248, 250, 252, 0.48);
    }

    .project-panel {
      min-height: 0;
      overflow-y: auto;
      overflow-x: hidden;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    .goal-tasks-panel {
      min-height: 0;
      overflow-y: auto;
      overflow-x: hidden;
      background:
        linear-gradient(90deg, rgba(58, 84, 108, 0.22), rgba(18, 24, 33, 0.92));
    }

    .panel-section {
      padding: 16px;
      border-bottom: 1px solid var(--line);
    }

    .panel-section:last-child {
      border-bottom: 0;
    }

    .panel-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }

    .panel-title {
      margin: 0;
      font-size: 1.1rem;
      line-height: 1.2;
    }

    .panel-title-row,
    .content-title-row {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .title-icon {
      flex: 0 0 auto;
      color: var(--gold);
      font-size: 1.05rem;
      line-height: 1;
    }

    .title-text {
      min-width: 0;
      overflow: hidden;

        color-mix(in srgb, var(--entry-accent, #8da2b5) 32%, rgba(17, 24, 39, 0.72)),
        color-mix(in srgb, var(--entry-accent-2, #8da2b5) 28%, rgba(17, 24, 39, 0.72)));
      border-color: color-mix(in srgb, var(--entry-accent, #8da2b5) 48%, var(--entry-accent-2, #8da2b5));
    }

    .due {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 92px;
      min-height: 26px;
      color: var(--muted);
      font-size: 0.82rem;
      white-space: nowrap;
      justify-self: center;
    }

    .due.is-undefined {
      color: rgba(203, 213, 225, 0.62);
      font-style: italic;
    }

    .row-actions {
      display: flex;
      gap: 6px;
      opacity: 0.35;
      transition: opacity 0.14s ease;
      justify-self: end;
    }

    .task-row:hover .row-actions,
    .task-row.is-selected .row-actions {
      opacity: 1;
    }

    .empty-state {
      padding: 30px 18px;
      color: var(--muted);
      text-align: center;
    }

    .detail-body {
      padding: 16px;
    }

    .task-detail .detail-body {
      padding: 0;
    }

    .detail-card {
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.045);
    }

    .settings-card-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 6px;
    }

    .settings-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px 12px;
      margin-top: 12px;
    }

    .settings-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 8px;
    }

    .advanced-sync {
      margin-top: 8px;
      border-top: 1px solid rgba(193, 202, 214, 0.12);
      padding-top: 8px;
    }

    .advanced-sync summary {
      cursor: pointer;
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 700;
    }

    .workspace-sync-box {
      margin-top: 14px;
      padding-top: 12px;
      border-top: 1px solid rgba(193, 202, 214, 0.14);
    }

    .workspace-inline-action,
    .workspace-invite-row {
      align-self: end;
    }

    .workspace-inline-action .small-btn {
      width: 100%;
      min-height: 38px;
    }

    .workspace-invite-actions {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
    }

    .workspace-help {
      margin-top: 8px;
      font-size: 0.76rem;
    }

    .check-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 10px;
      color: var(--text);
      font-weight: 700;
    }

    .check-row input {
      width: 16px;
      height: 16px;
      accent-color: #9fc5d7;
    }

    .sync-status {
      max-width: 260px;
      padding: 4px 8px;
      border: 1px solid var(--line);
      border-radius: 4px;
      color: var(--muted);
      font-size: 0.72rem;
      line-height: 1.25;
      text-align: right;
      background: rgba(255, 255, 255, 0.04);
    }

    .sync-status.is-connected {
      border-color: rgba(91, 168, 120, 0.45);
      color: #bfe8ca;
      background: rgba(91, 168, 120, 0.12);
    }

    .sync-status.is-error {
      border-color: rgba(182, 74, 74, 0.5);
      color: #f3b5b5;
      background: rgba(182, 74, 74, 0.12);
    }

    .field {
      display: grid;
      gap: 6px;
      margin: 0 0 12px;
    }

    .field label {
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 700;
    }

    .goal-link-list {
      display: grid;
      gap: 8px;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.035);
    }

    .goal-link-option {
      display: grid;
      grid-template-columns: 18px minmax(0, 1fr);
      align-items: center;
      gap: 8px;
      color: var(--text);
      font-size: 0.88rem;
    }

    .goal-link-option input {
      width: 16px;
      min-height: 16px;
      padding: 0;
      accent-color: var(--gold);
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      z-index: 40;
      display: grid;
      place-items: center;
      padding: 18px;
      background: rgba(3, 5, 12, 0.68);
      backdrop-filter: blur(12px);
    }

    .modal {
      width: min(560px, 100%);
      max-height: min(740px, calc(100vh - 36px));
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #191522;
      box-shadow: var(--shadow);
    }

    .modal-head,
    .modal-foot {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 16px;
      border-bottom: 1px solid var(--line);
    }

    .modal-foot {
      border-top: 1px solid var(--line);
      border-bottom: 0;
      justify-content: flex-end;
    }

    .modal-head h2 {
      margin: 0;
      font-size: 1.1rem;
    }

    .modal-body {
      padding: 16px;
    }

    .task-editor-backdrop {
      padding: 0;
      place-items: stretch;
    }

    .task-editor-modal {
      width: 100vw;
      height: 100vh;
      max-height: none;
      display: grid;
      grid-template-rows: 64px minmax(0, 1fr) 72px;
      overflow: hidden;
      background: #1f1f1f;
      border: 0;
      border-radius: 0;
    }

    .task-editor-topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      min-width: 0;
      padding: 0 18px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      color: #d8d8d8;
    }

    .task-editor-crumb {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
      max-width: min(520px, 52vw);
      padding: 7px 10px;
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.055);
      font-size: 0.88rem;
      font-weight: 700;
    }

    .task-editor-crumb span:last-child {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .task-editor-crumb-dot {
      width: 16px;
      height: 16px;
      border: 1px solid rgba(255, 255, 255, 0.58);
      border-radius: 4px;
      box-shadow: inset 0 -4px 0 rgba(255, 255, 255, 0.12);
      flex: 0 0 auto;
    }

    .task-editor-tools {
      display: flex;
      align-items: center;
      gap: 10px;
      color: #b8b8b8;
    }

    .task-editor-tools .icon-btn {
      width: 34px;
      min-height: 34px;
      border: 0;
      background: transparent;
      color: #d8d8d8;
      font-size: 1.45rem;
    }

    .task-editor-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 350px;
      min-height: 0;
    }

    .task-editor-main {
      min-width: 0;
      overflow: auto;
      padding: 28px 34px;
    }

    .task-title-row {
      display: grid;
      grid-template-columns: 32px minmax(0, 1fr);
      align-items: start;
      gap: 12px;
    }

    .task-complete-toggle {
      width: 24px;
      min-height: 24px;
      margin-top: 5px;
      padding: 0;
      border: 1.6px solid rgba(230, 230, 230, 0.72);
      border-radius: 999px;
      background: transparent;
      color: transparent;
    }

    .task-complete-toggle.is-done {
      border-color: rgba(91, 168, 120, 0.9);
      background: rgba(91, 168, 120, 0.18);
      color: #d9f1df;
    }

    .task-title-input {
      min-width: 0;
      max-width: 100%;
      min-height: 42px;
      padding: 0;
      border: 0;
      border-radius: 0;
      background: transparent;
      color: #f2f2f2;
      font-size: clamp(1.35rem, 2.2vw, 1.9rem);
      font-weight: 800;
      line-height: 1.18;
      text-overflow: ellipsis;
    }

    .task-title-input:focus,
    .task-description-input:focus,
    .task-comment-input:focus,
    .task-meta-control:focus {
      box-shadow: none;
      border-color: transparent;
    }

    .task-description-input {
      min-height: 84px;
      margin-top: 12px;
      padding: 0 0 0 44px;
      border: 0;
      border-radius: 0;
      background: transparent;
      color: #c9c9c9;
      resize: vertical;
      line-height: 1.5;
    }

    .task-editor-action {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin: 18px 0 28px 44px;
      padding: 0;
      min-height: 34px;
      border: 0;
      background: transparent;
      color: #c7c7c7;
      font-weight: 700;
    }

    .task-editor-divider {
      height: 1px;
      margin-left: 44px;
      background: rgba(255, 255, 255, 0.08);
    }

    .task-comment-row {
      display: grid;
      grid-template-columns: 34px minmax(0, 1fr) auto;
      align-items: center;
      gap: 12px;
      margin: 24px 0 0;
    }

    .task-comment-avatar {
      width: 34px;
      height: 34px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, #6f7f8f, #2c333c);
      color: #f1f5f9;
      font-size: 0.82rem;
      font-weight: 800;
      overflow: hidden;
    }

    .task-comment-avatar img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
    }

    .task-comment-input {
      min-width: 0;
      min-height: 42px;
      padding: 0 14px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.035);
      border-color: rgba(255, 255, 255, 0.13);
      color: #d8d8d8;
    }

    .task-editor-sidebar {
      min-width: 0;
      overflow: auto;
      padding: 28px 30px;
      border-left: 1px solid rgba(255, 255, 255, 0.1);
      background: #262626;
    }

    .task-meta-field {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px 12px;
      padding: 0 0 18px;
      margin: 0 0 18px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .task-meta-field label {
      grid-column: 1 / -1;
      color: #c4c4c4;
      font-size: 0.9rem;
      font-weight: 800;
    }

    .task-meta-control {
      min-height: 34px;
      padding: 0;
      border: 0;
      border-radius: 0;
      background: transparent;
      color: #f1f1f1;
    }

    .task-static-value {
      grid-column: 1 / -1;
      min-height: 28px;
      display: flex;
      align-items: center;
      color: #f1f1f1;
      font-size: 0.96rem;
      line-height: 1.28;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .task-select-shell {
      position: relative;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 38px;
      align-items: center;
      min-height: 38px;
      border: 1px solid rgba(141, 162, 181, 0.42);
      border-radius: 8px;
      background: linear-gradient(135deg, rgba(66, 82, 96, 0.92), rgba(40, 48, 58, 0.94));
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.08);
    }

    .task-select-shell select,
    .task-select-shell input {
      grid-column: 1 / -1;
      grid-row: 1;
      width: 100%;
      min-height: 38px;
      padding: 0 46px 0 12px;
      border: 0;
      background: transparent;
      color: #f5f7fa;
      appearance: none;
    }

    .task-select-shell input::-webkit-calendar-picker-indicator {
      filter: invert(1);
      opacity: 0.82;
    }

    .task-select-shell.is-project {
      border-color: rgba(94, 133, 170, 0.58);
      background: linear-gradient(135deg, rgba(53, 83, 108, 0.95), rgba(31, 45, 58, 0.96));
    }

    .task-select-shell.is-goal {
      border-color: rgba(197, 164, 109, 0.58);
      background: linear-gradient(135deg, rgba(99, 78, 46, 0.92), rgba(48, 42, 33, 0.96));
    }

    .task-select-shell.is-priority {
      border-color: rgba(185, 134, 82, 0.58);
      background: linear-gradient(135deg, rgba(95, 57, 35, 0.94), rgba(45, 36, 31, 0.96));
    }

    .task-select-shell.is-date {
      border-color: rgba(91, 168, 120, 0.5);
      background: linear-gradient(135deg, rgba(47, 83, 61, 0.94), rgba(34, 48, 39, 0.96));
    }

    .task-select-shell.is-recurrence {
      border-color: rgba(141, 162, 181, 0.5);
      background: linear-gradient(135deg, rgba(44, 56, 68, 0.94), rgba(28, 36, 45, 0.96));
    }

    .task-select-caret {
      grid-column: 2;
      grid-row: 1;
      z-index: 1;
      width: 30px;
      height: 30px;
      margin-right: 4px;
      display: grid;
      place-items: center;
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.13);
      color: #ffffff;
      font-size: 1rem;
      font-weight: 900;
      cursor: pointer;
    }

    .task-meta-control option {
      color: #111827;
    }

    .task-meta-control.task-status-button {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      min-height: 38px;
      padding: 0 12px;
      border: 1px solid rgba(91, 168, 120, 0.48);
      border-radius: 8px;
      background: linear-gradient(135deg, rgba(46, 92, 64, 0.85), rgba(33, 49, 39, 0.94));
      text-align: left;
      cursor: pointer;
    }

    .recurrence-control {
      grid-column: 1 / -1;
      display: grid;
      gap: 8px;
    }

    .recurrence-grid {
      display: grid;
      grid-template-columns: 88px minmax(0, 1fr);
      gap: 8px;
    }

    .recurrence-mini-field {
      display: grid;
      gap: 4px;
      color: var(--muted);
      font-size: 0.68rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .recurrence-mini-field input {
      width: 100%;
      min-height: 34px;
      padding: 0 10px;
      border: 1px solid rgba(141, 162, 181, 0.36);
      border-radius: 8px;
      background: #111820;
      color: #f5f7fa;
      font: inherit;
      text-transform: none;
      letter-spacing: 0;
    }

    .recurrence-note,
    .tree-recurrence {
      color: var(--muted);
      font-size: 0.72rem;
      font-style: italic;
    }

    .tree-recurrence {
      display: block;
      margin-top: 2px;
    }

    .task-meta-icon {
      color: #9a9a9a;
      align-self: center;
    }

    .task-combo {
      position: relative;
      min-width: 0;
    }

    .task-combo input[type="hidden"] {
      display: none;
    }

    .task-combo-button {
      width: 100%;
      min-height: 38px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 30px;
      align-items: center;
      gap: 8px;
      padding: 0 6px 0 12px;
      border: 1px solid rgba(141, 162, 181, 0.42);
      border-radius: 8px;
      background: linear-gradient(135deg, rgba(66, 82, 96, 0.92), rgba(40, 48, 58, 0.94));
      color: #f5f7fa;
      text-align: left;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.08);
    }

    .task-combo-label {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .task-combo-circle,
    .task-select-caret {
      width: 28px;
      height: 28px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      background: rgba(255, 255, 255, 0.16);
      border: 1px solid rgba(255, 255, 255, 0.16);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.12);
      color: transparent;
      font-size: 0;
    }

    .task-combo-circle::after,
    .task-select-caret::after {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: #ffffff;
      opacity: 0.92;
    }

    .task-combo.is-open .task-combo-circle::after {
      width: 12px;
      height: 3px;
      border-radius: 999px;
    }

    .task-combo.is-project .task-combo-button {
      border-color: rgba(94, 133, 170, 0.58);
      background: linear-gradient(135deg, rgba(53, 83, 108, 0.95), rgba(31, 45, 58, 0.96));
    }

    .task-combo.is-goal .task-combo-button {
      border-color: rgba(197, 164, 109, 0.58);
      background: linear-gradient(135deg, rgba(99, 78, 46, 0.92), rgba(48, 42, 33, 0.96));
    }

    .task-combo.is-priority .task-combo-button {
      border-color: rgba(185, 134, 82, 0.58);
      background: linear-gradient(135deg, rgba(95, 57, 35, 0.94), rgba(45, 36, 31, 0.96));
    }

    .task-combo-menu {
      position: fixed;
      left: var(--combo-menu-left, 0);
      top: var(--combo-menu-top, 0);
      z-index: 120;
      display: none;
      width: var(--combo-menu-width, 220px);
      max-height: 180px;
      overflow: auto;
      padding: 6px;
      border: 1px solid rgba(141, 162, 181, 0.34);
      border-radius: 8px;
      background: #232323;
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.46);
    }

    .task-combo.is-open .task-combo-menu {
      display: grid;
      gap: 4px;
    }

    .task-combo-option {
      min-height: 32px;
      justify-content: flex-start;
      padding: 0 9px;
      border-radius: 6px;
      background: transparent;
      color: #f1f1f1;
      text-align: left;
    }

    .task-combo-option:hover,
    .task-combo-option.is-selected {
      background: rgba(255, 255, 255, 0.1);
    }

    .priority-picker,
    .task-status-picker {
      display: grid;
      gap: 6px;
    }

    .priority-picker {
      grid-template-columns: 32px repeat(4, minmax(0, 1fr));
    }

    .priority-picker input[type="hidden"] {
      display: none;
    }

    .priority-button,
    .task-status-option {
      min-height: 34px;
      padding: 0 8px;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      background: rgba(255, 255, 255, 0.055);
      color: #e8edf4;
      font-weight: 800;
    }

    .priority-button[data-priority="p1"] {
      border-color: rgba(182, 74, 74, 0.62);
      background: rgba(182, 74, 74, 0.22);
      color: #ffcaca;
    }

    .priority-button[data-priority="p2"] {
      border-color: rgba(185, 134, 82, 0.68);
      background: rgba(185, 134, 82, 0.22);
      color: #ffd9ae;
    }

    .priority-button[data-priority="p3"] {
      border-color: rgba(94, 133, 170, 0.68);
      background: rgba(94, 133, 170, 0.22);
      color: #cfe5ff;
    }

    .priority-button[data-priority="p4"] {
      border-color: rgba(148, 163, 184, 0.48);
      background: rgba(148, 163, 184, 0.14);
      color: #d7dde6;
    }

    .priority-button.priority-empty {
      min-width: 32px;
      padding: 0;
      border-color: rgba(193, 202, 214, 0.24);
      background: rgba(255, 255, 255, 0.04);
    }

    .priority-button.priority-empty::after {
      content: "";
      width: 10px;
      height: 10px;
      border-radius: 999px;
      border: 1px solid rgba(232, 237, 244, 0.42);
    }

    .priority-button.is-active,
    .task-status-option.is-active {
      box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.18);
    }

    .task-status-picker {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .task-status-picker input[type="hidden"] {
      display: none;
    }

    .task-status-option.is-active {
      border-color: rgba(91, 168, 120, 0.62);
      background: rgba(91, 168, 120, 0.22);
    }

    .task-comments {
      margin-top: 10px;
      padding-left: 34px;
      display: grid;
      gap: 8px;
    }

    .task-comment-published {
      display: grid;
      grid-template-columns: 28px minmax(0, 1fr);
      gap: 8px;
      align-items: start;
    }

    .task-comment-bubble {
      padding: 7px 9px;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.07);
      color: #d8d8d8;
      font-size: 0.82rem;
      line-height: 1.35;
    }

    .task-comment-bubble strong {
      display: block;
      margin-bottom: 2px;
      color: #f1f1f1;
      font-size: 0.78rem;
    }

    .task-comment-submit {
      min-width: 94px;
      min-height: 42px;
      padding: 0 16px;
      border-radius: 999px;
      border: 1px solid rgba(141, 162, 181, 0.4);
      background: rgba(141, 162, 181, 0.18);
      color: #edf4fb;
      font-weight: 800;
      white-space: nowrap;
      justify-self: end;
    }

    .task-editor-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 18px;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      background: #1f1f1f;
    }

    .task-editor-footer-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
    }

    .inline-task-editor {
      display: flex;
      flex-direction: column;
      height: calc(100vh - 135px);
      min-height: 0;
      overflow: hidden;
      background: #1f1f1f;
      font-size: 0.9rem;

    function taskPlotLayout(total = 0) {
      const densityScale = total > 18 ? 0.76 : total > 12 ? 0.84 : total > 8 ? 0.92 : 1;
      const layout = taskPlotBasePositions.slice(0, Math.max(0, total)).map((plot) => ({

          dx: Math.cos(angle) * rx,
          dy: 138 + Math.max(0, Math.sin(angle) * ry) + ring * 6,
          scale: Math.max(0.24, 0.36 - ring * 0.025),
          mirror: Math.cos(angle) > 0

      return layout;

    function orientTaskPlot(plot, angle) {
      const side = plot.dx;
      const depth = plot.dy;
      const forwardX = Math.cos(angle);
      const forwardY = Math.sin(angle);
      const sideX = -forwardY;
      const sideY = forwardX;
      return {
        ...plot,
        localSide: side,
        localDepth: depth,
        dx: side * sideX + depth * forwardX,
        dy: side * sideY + depth * forwardY,
        mirror: side > 0
      };
    }

    function taskPlotAvoidsCastle(plot) {
      if (Number.isFinite(plot.localDepth) && Number.isFinite(plot.localSide)) {
        const protectedEllipse = (plot.localSide * plot.localSide) / (58 * 58) + ((plot.localDepth - 18) * (plot.localDepth - 18)) / (48 * 48);
        const protectedBox = Math.abs(plot.localSide) < 42 && plot.localDepth > -42 && plot.localDepth < 64;
        return protectedEllipse > 1.02 && !protectedBox;
      }
      const protectedEllipse = (plot.dx * plot.dx) / (62 * 62) + ((plot.dy - 18) * (plot.dy - 18)) / (52 * 52);
      const protectedBox = Math.abs(plot.dx) < 46 && plot.dy > -42 && plot.dy < 68;
      return protectedEllipse > 1.08 && !protectedBox;
    }

        const dy = plot.dy - other.dy;

        const minY = 24 * (plot.scale + other.scale) + 5;
        return (dx * dx) / (minX * minX) + (dy * dy) / (minY * minY) >= 1;

    }

    function taskPlotFitsLand(points, cityPos, plot, cityScale) {

      const margin = Math.max(9, 42 * plot.scale * cityScale);
      return [

        { x: point.x - margin, y: point.y },
        { x: point.x + margin, y: point.y },
        { x: point.x, y: point.y - margin },
        { x: point.x, y: point.y + margin }

    function taskPlotCandidates(plot) {
