    function handleCastlePointerDown(event) {
      const group = event.currentTarget;
      const projectId = group.dataset.projectId;
      const sectionId = group.dataset.sectionId || null;
      const project = state.projects.find((p) => p.id === projectId);
      if (!project) return;
      event.preventDefault();
      const svg = group.closest("svg");
      const point = svgPoint(svg, event.clientX, event.clientY);
      const goal = state.sections.find((section) => section.id === sectionId);
      const goalIndex = Math.max(0, goalsForProject(projectId).findIndex((section) => section.id === sectionId));
      const basePosition = goal ? goalPosition(goal, project, goalIndex) : project.posicion;
      dragCastle = {
        projectId,
        sectionId,
        svg,
        offsetX: point.x - basePosition.x,
        offsetY: point.y - basePosition.y,
        moved: false
      };
      state.selectedTaskId = null;
    }

    function handleCastlePointerMove(event) {
      if (!dragCastle) return;
      const project = state.projects.find((p) => p.id === dragCastle.projectId);
      if (!project) return;
      const point = svgPoint(dragCastle.svg, event.clientX, event.clientY);
      const nextPosition = {
        x: Math.max(110, Math.min(790, point.x - dragCastle.offsetX)),
        y: Math.max(320, Math.min(650, point.y - dragCastle.offsetY))
      };
      const goal = state.sections.find((section) => section.id === dragCastle.sectionId);
      if (goal) goal.posicion = nextPosition;
      else project.posicion = nextPosition;
      dragCastle.moved = true;
      saveState();
      const node = document.querySelector(`.castle-node[data-project-id="${dragCastle.projectId}"][data-section-id="${dragCastle.sectionId || ""}"]`);
      const label = document.querySelector(`.castle-label[data-project-id="${dragCastle.projectId}"][data-section-id="${dragCastle.sectionId || ""}"]`);
      if (node) {
        const stats = goal ? statsForGoal(project.id, goal.id) : projectStats(project.id);
        const nextScale = goal ? cityScaleForGoal(stats) : 0.4 + stats.progress * 0.8;
        node.setAttribute("transform", `translate(${nextPosition.x} ${nextPosition.y}) scale(${nextScale})`);
      }
      if (label) label.setAttribute("transform", `translate(${nextPosition.x - 80} ${nextPosition.y + 85})`);
    }

    function handleCastlePointerUp() {
      if (!dragCastle) return;
      const moved = dragCastle.moved;
      const projectId = dragCastle.projectId;
      const sectionId = dragCastle.sectionId;
      dragCastle = null;
      if (!moved) setState({
        selectedProjectId: projectId,
        selectedGoalId: goalKey(projectId, sectionId),
        selectedTaskId: null,
        mapTaskPopupId: null,
        continentPopupId: null
      }, false);
      else render();
    }

    function svgPoint(svg, clientX, clientY) {
      if (typeof svg.createSVGPoint === "function" && svg.getScreenCTM()) {
        const pt = svg.createSVGPoint();
        pt.x = clientX;
        pt.y = clientY;
        return pt.matrixTransform(svg.getScreenCTM().inverse());
      }
      const rect = svg.getBoundingClientRect();
      const [x = 0, y = 0, w = 900, h = 800] = (svg.getAttribute("viewBox") || "0 0 900 800")
        .split(/\s+/)
        .map(Number);
      const scale = Math.min(rect.width / w, rect.height / h);
      const offsetX = (rect.width - w * scale) / 2;
      const offsetY = (rect.height - h * scale) / 2;
      return {
        x: x + (clientX - rect.left - offsetX) / scale,
        y: y + (clientY - rect.top - offsetY) / scale
      };
    }

    function handleTaskDragStart(event) {
      draggedTaskId = event.currentTarget.dataset.taskId;
      event.dataTransfer.effectAllowed = "move";
      event.dataTransfer.setData("text/task-id", draggedTaskId);
    }

    function handleTaskDrop(event) {
      event.preventDefault();
      event.currentTarget.classList.remove("drag-over");
      const targetId = event.currentTarget.dataset.taskId;
      if (!draggedTaskId || draggedTaskId === targetId) return;
      reorderTask(draggedTaskId, targetId);
      draggedTaskId = null;
    }

    function handleSectionTaskDrop(event) {
      event.preventDefault();
      event.currentTarget.classList.remove("drag-over");
      if (!draggedTaskId) return;
      const task = state.tasks.find((item) => item.id === draggedTaskId);
      if (!task) return;
      const sectionId = event.currentTarget.dataset.dropSection || null;
      const project = getSelectedProject();
      mutate(() => {
        task.projectId = project.id;
        task.sectionId = sectionId;
        task.orden = state.tasks.filter((item) => item.projectId === project.id && item.sectionId === sectionId).length;
        state.selectedProjectId = project.id;
      });
      draggedTaskId = null;
    }

    function reorderTask(sourceId, targetId) {
      mutate(() => {
        const source = state.tasks.find((task) => task.id === sourceId);
        const target = state.tasks.find((task) => task.id === targetId);
        if (!source || !target) return;
        source.projectId = target.projectId;
        source.sectionId = target.sectionId;
        const siblings = sortedTasks(target.projectId, target.sectionId).filter((task) => task.id !== sourceId);
        const targetIndex = siblings.findIndex((task) => task.id === targetId);
        siblings.splice(targetIndex, 0, source);
        siblings.forEach((task, index) => task.orden = index);
        state.selectedProjectId = target.projectId;
      });
    }

    function handleProjectDragStart(event) {
      if (event.target.closest("[data-action]")) return;
      draggedProjectId = event.currentTarget.dataset.projectId;
      event.dataTransfer.effectAllowed = "move";
      event.dataTransfer.setData("text/project-id", draggedProjectId);
    }

    function moveProject(projectId, direction) {
      mutate(() => {
        const ordered = sortedProjects();
        const currentIndex = ordered.findIndex((project) => project.id === projectId);
        const nextIndex = currentIndex + (direction === "up" ? -1 : 1);
        if (currentIndex < 0 || nextIndex < 0 || nextIndex >= ordered.length) return;
        const [project] = ordered.splice(currentIndex, 1);
        ordered.splice(nextIndex, 0, project);
        ordered.forEach((item, index) => item.orden = index);
        repairDistantGoalPositions(projectId);
        state.selectedProjectId = projectId;
        state.mapViewBox = mapBoxForContinent(projectId);
        state.selectedTaskId = null;
      });
      showToast("Proyectos reordenados");
    }

    function moveGoal(sectionId, direction) {
      const section = state.sections.find((item) => item.id === sectionId);
      if (!section) return;
      mutate(() => {
        const ordered = sortedSections(section.projectId);
        const currentIndex = ordered.findIndex((item) => item.id === sectionId);
        const nextIndex = currentIndex + (direction === "up" ? -1 : 1);
        if (currentIndex < 0 || nextIndex < 0 || nextIndex >= ordered.length) return;
        const [goal] = ordered.splice(currentIndex, 1);
        ordered.splice(nextIndex, 0, goal);
        ordered.forEach((item, index) => item.orden = index);
        state.selectedProjectId = section.projectId;
        state.selectedGoalId = goalKey(section.projectId, sectionId);
      });
      showToast("Metas reordenadas");
    }

    function handleProjectDrop(event) {
      event.preventDefault();
      event.currentTarget.classList.remove("drag-over");
      const targetProjectId = event.currentTarget.dataset.projectId;
      if (!draggedProjectId || draggedProjectId === targetProjectId) return;
      mutate(() => {
        const ordered = sortedProjects().filter((project) => project.id !== draggedProjectId);
        const source = state.projects.find((project) => project.id === draggedProjectId);
        const targetIndex = ordered.findIndex((project) => project.id === targetProjectId);
        ordered.splice(targetIndex, 0, source);
        ordered.forEach((project, index) => project.orden = index);
        repairDistantGoalPositions(draggedProjectId);
        state.selectedProjectId = draggedProjectId;
        state.selectedGoalId = null;
        state.selectedTaskId = null;
        state.selectedSubtaskId = null;
        state.mapGoalPopupId = null;
        state.mapTaskPopupId = null;
        state.continentPopupId = null;
        state.mapViewBox = mapBoxForContinent(draggedProjectId);
      });
      draggedProjectId = null;
      showToast("Proyectos reordenados");
    }

    function handleSectionDragStart(event) {
      if (event.target.closest("[data-action]")) return;
      draggedSectionId = event.currentTarget.dataset.sectionId;
      event.dataTransfer.effectAllowed = "move";
      event.dataTransfer.setData("text/section-id", draggedSectionId);
    }

    function handleSectionDrop(event) {
      event.preventDefault();
      event.currentTarget.classList.remove("drag-over");
      const targetSectionId = event.currentTarget.dataset.sectionId;
      if (!draggedSectionId || draggedSectionId === targetSectionId) return;
      mutate(() => {
        const source = state.sections.find((section) => section.id === draggedSectionId);
        const target = state.sections.find((section) => section.id === targetSectionId);
        if (!source || !target || source.projectId !== target.projectId) return;
        const ordered = sortedSections(target.projectId).filter((section) => section.id !== draggedSectionId);
        const targetIndex = ordered.findIndex((section) => section.id === targetSectionId);
        ordered.splice(targetIndex, 0, source);
        ordered.forEach((section, index) => section.orden = index);
      });
      draggedSectionId = null;
    }

    function treeItemFromRow(row) {
      if (!row?.dataset?.treeType) return null;
      const type = row.dataset.treeType;
      return {
        type,
        projectId: row.dataset.projectId || "",
        sectionId: row.dataset.sectionId || "",
        taskId: row.dataset.taskId || "",
        subtaskId: row.dataset.subtaskId || "",
        parentSubtaskId: row.dataset.parentSubtaskId || ""
      };
    }

    function treeItemId(item) {
      if (!item) return "";
      if (item.type === "goal") return item.sectionId;
      if (item.type === "task") return item.taskId;
      if (item.type === "subtask") return item.subtaskId;
      return "";
    }

    function treeItemsShareParent(source, target) {
      if (!source || !target || source.type !== target.type) return false;
      if (treeItemId(source) === treeItemId(target)) return false;
      if (source.type === "goal") {
        return source.projectId && source.projectId === target.projectId;
      }
      if (source.type === "task") {
        return source.projectId === target.projectId && source.sectionId === target.sectionId;
      }
      if (source.type === "subtask") {
        return source.taskId === target.taskId && source.parentSubtaskId === target.parentSubtaskId;
      }
      return false;
    }

    function handleTreeDragStart(event) {
      if (event.target.closest(".tree-actions, .check-btn, .icon-btn, input, select, textarea")) {
        event.preventDefault();
        return;
      }
      draggedTreeItem = treeItemFromRow(event.currentTarget);
      if (!draggedTreeItem) return;
      event.currentTarget.classList.add("is-dragging");
      event.dataTransfer.effectAllowed = "move";
      event.dataTransfer.setData("text/tree-item", JSON.stringify(draggedTreeItem));
    }

    function handleTreeDragOver(event) {
      const targetItem = treeItemFromRow(event.currentTarget);
      if (!treeItemsShareParent(draggedTreeItem, targetItem)) return;
      event.preventDefault();
      event.dataTransfer.dropEffect = "move";
      event.currentTarget.classList.add("drag-over");
    }

    function handleTreeDragLeave(event) {
      event.currentTarget.classList.remove("drag-over");
    }

    function handleTreeDragEnd(event) {
      event.currentTarget.classList.remove("is-dragging", "drag-over");
      document.querySelectorAll(".tree-row.drag-over").forEach((row) => row.classList.remove("drag-over"));
      draggedTreeItem = null;
    }

    function handleTreeDrop(event) {
      const targetItem = treeItemFromRow(event.currentTarget);
      if (!treeItemsShareParent(draggedTreeItem, targetItem)) return;
      event.preventDefault();
      event.stopPropagation();
      event.currentTarget.classList.remove("drag-over");
      reorderTreeItem(draggedTreeItem, targetItem);
      draggedTreeItem = null;
    }

    function reorderTreeItem(source, target) {
      if (!treeItemsShareParent(source, target)) return;
      if (source.type === "goal") {
        reorderGoalByDrop(source.sectionId, target.sectionId);
      } else if (source.type === "task") {
        reorderTaskByDrop(source.taskId, target.taskId);
      } else if (source.type === "subtask") {
        reorderSubtaskByDrop(source.subtaskId, target.subtaskId);
      }
    }

    function reorderGoalByDrop(sourceId, targetId) {
      let changed = false;
      mutate(() => {
        const source = state.sections.find((section) => section.id === sourceId);
        const target = state.sections.find((section) => section.id === targetId);
        if (!source || !target || source.projectId !== target.projectId) return;
        const ordered = sortedSections(target.projectId).filter((section) => section.id !== sourceId);
        const targetIndex = ordered.findIndex((section) => section.id === targetId);
        if (targetIndex < 0) return;
        ordered.splice(targetIndex, 0, source);
        ordered.forEach((section, index) => section.orden = index);
        state.selectedProjectId = target.projectId;
        state.selectedGoalId = goalKey(target.projectId, sourceId);
        changed = true;
      });
      if (changed) showToast("Metas reordenadas");
    }

    function reorderTaskByDrop(sourceId, targetId) {
      let changed = false;
      mutate(() => {
        const source = state.tasks.find((task) => task.id === sourceId);
        const target = state.tasks.find((task) => task.id === targetId);
        if (!source || !target || source.projectId !== target.projectId || source.sectionId !== target.sectionId) return;
        const ordered = sortedTasks(target.projectId, target.sectionId).filter((task) => task.id !== sourceId);
        const targetIndex = ordered.findIndex((task) => task.id === targetId);
        if (targetIndex < 0) return;
        ordered.splice(targetIndex, 0, source);
        ordered.forEach((task, index) => task.orden = index);
        state.selectedProjectId = target.projectId;
        state.selectedGoalId = target.sectionId ? goalKey(target.projectId, target.sectionId) : null;
        state.selectedTaskId = sourceId;
        changed = true;
      });
      if (changed) showToast("Tareas reordenadas");
    }

    function reorderSubtaskByDrop(sourceId, targetId) {
      let changed = false;
      mutate(() => {
        const source = state.subtasks.find((subtask) => subtask.id === sourceId);
        const target = state.subtasks.find((subtask) => subtask.id === targetId);
        if (!source || !target || source.taskId !== target.taskId || (source.parentSubtaskId || "") !== (target.parentSubtaskId || "")) return;
        const ordered = sortedSubtaskChildren(target.taskId, target.parentSubtaskId || null).filter((subtask) => subtask.id !== sourceId);
        const targetIndex = ordered.findIndex((subtask) => subtask.id === targetId);
        if (targetIndex < 0) return;
        ordered.splice(targetIndex, 0, source);
        ordered.forEach((subtask, index) => subtask.orden = index);
        state.selectedTaskId = target.taskId;
        state.selectedSubtaskId = sourceId;
        changed = true;
      });
      if (changed) showToast("Subtareas reordenadas");
    }

    function handleDragOver(event) {
      event.preventDefault();
      event.currentTarget.classList.add("drag-over");
    }

    function handleDragLeave(event) {
      event.currentTarget.classList.remove("drag-over");
    }

    document.addEventListener("keydown", (event) => {
      if (event.target.matches("input, textarea, select")) return;
      if (event.key === "n" || event.key === "+") {
        event.preventDefault();
        const input = document.querySelector(".quick-add input[name='nombre']");
        if (input) input.focus();
      }
      if (event.key === "Delete" && state.selectedTaskId) {
        event.preventDefault();
        deleteTask(state.selectedTaskId);
      }
      if (["1", "2", "3", "4"].includes(event.key) && state.selectedTaskId) {
        event.preventDefault();
        const task = state.tasks.find((item) => item.id === state.selectedTaskId);
        if (!task) return;
        mutate(() => {
          task.prioridad = `p${event.key}`;
        });
        showToast(`Prioridad cambiada a P${event.key}`);
      }
    });

    document.addEventListener("change", (event) => {
      const calendarFilter = event.target.closest("[data-action='calendar-filter']");
      if (calendarFilter) {
        setState({
          calendarFilters: {
            ...(state.calendarFilters || {}),
            [calendarFilter.name]: calendarFilter.value
          }
        });
        return;
      }
      const overviewFilter = event.target.closest("[data-action='overview-filter']");
      if (overviewFilter) {
        const nextFilters = {
          ...(state.overviewFilters || {}),
          [overviewFilter.dataset.filter]: overviewFilter.value
        };
        setState({
          overviewFilters: nextFilters,
          ...overviewOpenAllPatch()
        });
        return;
      }
      const mapProjectSelect = event.target.closest("select[data-action='map-project-select']");
      if (mapProjectSelect) {
        const projectId = mapProjectSelect.value;
        setState({
          view: "list",
        selectedProjectId: projectId,
        selectedGoalId: null,
        selectedTaskId: null,
        selectedSubtaskId: null,
        continentPopupId: null,
          listProjectOpen: true,
          mapViewBox: mapBoxForContinent(projectId)
        });
        return;
      }
      const select = event.target.closest("select[data-action='task-project-select']");
      if (!select) return;
      const form = select.closest("form");
      const sectionSelect = form.elements.sectionId;
      const sections = sortedSections(select.value);
      sectionSelect.innerHTML = `<option value="">Tareas por clasificar</option>${sections.map((section) => `<option value="${section.id}">${escapeHtml(section.nombre)}</option>`).join("")}`;
    });

    function render() {
      const stats = globalStats();
      document.getElementById("app").innerHTML = `
        <div class="app">
          <header class="topbar">
            <div class="brand">
              <div class="brand-copy">
                <h1>${escapeHtml(state.kingdomName)}</h1>
                <small><em>&quot;Narau yori narero&quot; (&quot;La pr&aacute;ctica hace al maestro&quot;)</em></small>
              </div>
              ${renderUserBadge()}
            </div>
            <nav class="view-toggle" aria-label="Alternar vista">
              <button type="button" data-action="set-view" data-view="list" class="${state.view === "list" ? "is-active" : ""}">Atlas</button>
              <button type="button" data-action="set-view" data-view="overview" class="${state.view === "overview" ? "is-active" : ""}">General</button>
              <button type="button" data-action="set-view" data-view="calendar" class="${state.view === "calendar" ? "is-active" : ""}">Calendario</button>
              <button type="button" data-action="set-view" data-view="built" class="${state.view === "built" ? "is-active" : ""}">Construido</button>
              <button type="button" data-action="set-view" data-view="tags" class="${state.view === "tags" ? "is-active" : ""}">Etiquetas</button>
            </nav>
            <div class="global-actions">
              ${renderPendingBreakdown()}
              <button type="button" class="settings-btn full-map-btn" data-action="map-full" title="Ver mapa completo" aria-label="Ver mapa completo">○</button>
              <button type="button" class="settings-btn" data-action="open-settings" title="Configuración" aria-label="Configuración">Configuración</button>
            </div>
          </header>
          <main class="main">${renderMainView()}</main>
          ${renderModal()}
        </div>
      `;
      bindEvents();
    }

    function renderUserBadge() {
      const name = state.userName || "Usuario";
      const avatar = state.userPhoto
        ? `<span class="user-avatar"><img src="${escapeHtml(state.userPhoto)}" alt=""></span>`
        : `<span class="user-avatar" aria-hidden="true">${escapeHtml(userInitials(name))}</span>`;
      return `<div class="user-badge" title="${escapeHtml(name)}">${avatar}<span class="user-name">${escapeHtml(name)}</span></div>`;
    }

    function renderCommentAvatar(author = state.userName) {
      const isCurrentUser = !author || author === state.userName;
      if (isCurrentUser && state.userPhoto) {
        return `<div class="task-comment-avatar" title="${escapeHtml(state.userName || "Usuario")}"><img src="${escapeHtml(state.userPhoto)}" alt=""></div>`;
      }
      return `<div class="task-comment-avatar" title="${escapeHtml(author || state.userName || "Usuario")}" aria-hidden="true">${escapeHtml(userInitials(author || state.userName))}</div>`;
    }

    function renderMainView() {
      if (state.view === "list" || state.view === "map") return renderMapView();
      if (state.view === "overview") return renderOverviewView();
      if (state.view === "calendar") return renderCalendarView();
      if (state.view === "built") return renderBuiltView();
      if (state.view === "tags") return renderTagsView();
      return renderMapView();
    }

    function renderPendingBreakdown() {
      const projects = sortedProjects();
      if (!projects.length) return `<div class="counter pending-breakdown" aria-label="Pendientes por proyecto"><span class="pending-label">Tareas pendientes:</span><span>Sin proyectos</span></div>`;
      return `
        <div class="counter pending-breakdown" aria-label="Pendientes por proyecto">
          <span class="pending-label">Tareas pendientes:</span>
          ${projects.map((project) => {
            const pending = totalStatsForProject(project.id).pending;
            return `<button type="button" class="pending-chip" data-action="open-project-pending" data-project-id="${project.id}" style="--project-color:${project.color}" title="${escapeHtml(project.nombre)}: ${pending} ${pending === 1 ? "pendiente" : "pendientes"}" aria-label="Abrir ${escapeHtml(project.nombre)} en lista: ${pending} ${pending === 1 ? "pendiente" : "pendientes"}"><strong class="pending-name">${escapeHtml(project.nombre)}</strong><span class="pending-count">${pending}</span></button>`;
          }).join("")}
        </div>
      `;
    }

    function renderOverviewView() {
      const filters = state.overviewFilters || {};
      const projects = sortedProjects().filter((project) => filters.projectId === "all" || project.id === filters.projectId);
      const counts = overviewCounts(filters);
      const projectOptions = sortedProjects().map((project) => `<option value="${project.id}" ${filters.projectId === project.id ? "selected" : ""}>${escapeHtml(project.nombre)}</option>`).join("");
      const tagOptions = (state.tags || []).map((tag) => `<option value="${tag.id}" ${filters.tagId === tag.id ? "selected" : ""}>${escapeHtml(tag.nombre)}</option>`).join("");
      const content = projects
        .map((project) => renderOverviewProject(project, filters))
        .filter(Boolean)
        .join("");

      return `
        <section class="workspace-view overview-view">
          <div class="workspace-inner">
            <div class="workspace-head overview-head">
              <div>
                <h2>Vista general</h2>
                <p>Revise pendientes de todos los proyectos, filtre por nivel y ordene sin perder la jerarquía.</p>
              </div>
              <div class="overview-summary">
                <span><strong>${counts.goals}</strong> metas</span>
                <span><strong>${counts.tasks}</strong> tareas</span>
                <span><strong>${counts.subtasks}</strong> subtareas</span>
              </div>
            </div>
            <div class="overview-filters" aria-label="Filtros de vista general">
              <label>Proyecto
                <select data-action="overview-filter" data-filter="projectId">
                  <option value="all" ${filters.projectId === "all" ? "selected" : ""}>Todos</option>
                  ${projectOptions}
                </select>
              </label>
              <label>Nivel
                <select data-action="overview-filter" data-filter="type">
                  <option value="all" ${filters.type === "all" ? "selected" : ""}>Todo</option>
                  <option value="goals" ${filters.type === "goals" ? "selected" : ""}>Metas</option>
                  <option value="tasks" ${filters.type === "tasks" ? "selected" : ""}>Tareas</option>
                  <option value="subtasks" ${filters.type === "subtasks" ? "selected" : ""}>Subtareas</option>
                </select>
              </label>
              <label>Estado
                <select data-action="overview-filter" data-filter="status">
                  <option value="pending" ${filters.status === "pending" ? "selected" : ""}>Pendientes</option>
                  <option value="completed" ${filters.status === "completed" ? "selected" : ""}>Completados</option>
                  <option value="all" ${filters.status === "all" ? "selected" : ""}>Todos</option>
                </select>
              </label>
              <label>Prioridad
                <select data-action="overview-filter" data-filter="priority">
                  <option value="all" ${filters.priority === "all" ? "selected" : ""}>Todas</option>
                  <option value="none" ${filters.priority === "none" ? "selected" : ""}>-</option>
                  ${priorities.map((priority) => `<option value="${priority}" ${filters.priority === priority ? "selected" : ""}>${priorityLabels[priority]}</option>`).join("")}
                </select>
              </label>
              <label>Etiqueta
                <select data-action="overview-filter" data-filter="tagId">
                  <option value="all" ${filters.tagId === "all" ? "selected" : ""}>Todas</option>
                  ${tagOptions}
                </select>
              </label>
              <label>Orden
                <select data-action="overview-filter" data-filter="sortBy">
                  <option value="project" ${filters.sortBy === "project" ? "selected" : ""}>Proyecto</option>
                  <option value="date" ${filters.sortBy === "date" ? "selected" : ""}>Fecha</option>
                  <option value="priority" ${filters.sortBy === "priority" ? "selected" : ""}>Prioridad</option>
                  <option value="name" ${filters.sortBy === "name" ? "selected" : ""}>Nombre</option>
                  <option value="type" ${filters.sortBy === "type" ? "selected" : ""}>Nivel</option>
                </select>
              </label>
              <button type="button" class="small-btn" data-action="overview-clear-filters">Limpiar</button>
            </div>
            <div class="overview-tree">
              ${content || `<div class="overview-empty">No hay elementos que coincidan con los filtros actuales.</div>`}
            </div>
          </div>
        </section>
      `;
    }

    function overviewCounts(filters) {
      return sortedProjects().reduce((acc, project) => {
        if (filters.projectId !== "all" && filters.projectId !== project.id) return acc;
        goalsForProject(project.id).forEach((goal) => {
          if (overviewMatchesItem("goal", goal, { project }, filters)) acc.goals += 1;
          sortedTasks(project.id, goal.id).forEach((task) => {
            if (overviewMatchesItem("task", task, { project, goal }, filters)) acc.tasks += 1;
            visitOverviewSubtasks(task, null, (subtask, depth) => {
              if (overviewMatchesItem("subtask", subtask, { project, goal, task, depth }, filters)) acc.subtasks += 1;
            });
          });
        });
        return acc;
      }, { goals: 0, tasks: 0, subtasks: 0 });
    }

    function overviewIsOpen(key, id) {
      return Boolean(id) && Array.isArray(state[key]) && state[key].includes(id);
    }

    function overviewOpenAllPatch() {
      return {
        overviewOpenProjectIds: state.projects.map((project) => project.id),
        overviewOpenGoalIds: state.sections.map((section) => section.id),
        overviewOpenTaskIds: state.tasks.map((task) => task.id),
        overviewOpenSubtaskIds: state.subtasks.map((subtask) => subtask.id)
      };
    }

    function toggleOverviewOpen(key, id) {
      if (!id) return;
      const current = new Set(Array.isArray(state[key]) ? state[key] : []);
      if (current.has(id)) current.delete(id);
      else current.add(id);
      setState({ [key]: Array.from(current) });
    }

    function overviewForceOpen(type, filters = state.overviewFilters || {}) {
      if (filters.type === "all") return false;
      if (type === "project") return filters.type !== "goals";
      if (type === "goal") return filters.type === "tasks" || filters.type === "subtasks";
      if (type === "task") return filters.type === "subtasks";
      return false;
    }

    function openOverviewTarget(element) {
      const type = element.dataset.overviewDbl;
      let projectId = element.dataset.projectId || null;
      let selectedGoalId = null;
      let selectedTaskId = null;
      let selectedSubtaskId = null;

      if (type === "goal") {
        const sectionId = element.dataset.sectionId || null;
        selectedGoalId = goalKey(projectId, sectionId);
        setState({
          selectedProjectId: projectId,
          selectedGoalId,
          selectedTaskId: null,
          selectedSubtaskId: null,
          modal: { type: "section", id: sectionId, projectId },
          mapGoalPopupId: null,
          mapTaskPopupId: null,
          continentPopupId: null
        }, false);
        return;
      }

      if (type === "task") {
        const task = state.tasks.find((item) => item.id === element.dataset.taskId);
        if (!task) return;
        projectId = task.projectId;
        selectedGoalId = goalKey(task.projectId, task.sectionId);
        selectedTaskId = task.id;
        setState({
          selectedProjectId: projectId,
          selectedGoalId,
          selectedTaskId,
          selectedSubtaskId: null,
          modal: { type: "task", id: task.id },
          mapGoalPopupId: null,
          mapTaskPopupId: null,
          continentPopupId: null
        }, false);
        return;
      }

      if (type === "subtask") {
        const subtask = state.subtasks.find((item) => item.id === element.dataset.subtaskId);
        const task = subtask ? state.tasks.find((item) => item.id === subtask.taskId) : null;
        if (!subtask || !task) return;
        projectId = task.projectId;
        selectedGoalId = goalKey(task.projectId, task.sectionId);
        selectedTaskId = task.id;
        selectedSubtaskId = subtask.id;
        setState({
          selectedProjectId: projectId,
          selectedGoalId,
          selectedTaskId,
          selectedSubtaskId,
          modal: { type: "subtask", id: subtask.id, taskId: task.id },
          mapGoalPopupId: null,
          mapTaskPopupId: null,
          continentPopupId: null
        }, false);
        return;
      }

      if (!projectId) return;
      setState({
        view: "list",
        selectedProjectId: projectId,
        selectedGoalId,
        selectedTaskId,
        selectedSubtaskId,
        listProjectOpen: true,
        mapGoalPopupId: null,
        mapTaskPopupId: null,
        continentPopupId: null,
        mapViewBox: mapBoxForContinent(projectId)
      });
    }

    function renderOverviewProject(project, filters) {
      const goals = overviewSortItems(goalsForProject(project.id), "goal", filters)
        .map((goal, index) => renderOverviewGoal(project, goal, index, goalsForProject(project.id).length, filters))
        .filter(Boolean)
        .join("");
      if (!goals) return "";
      const stats = totalStatsForProject(project.id);
      const isOpen = overviewIsOpen("overviewOpenProjectIds", project.id) || overviewForceOpen("project", filters);
      return `
        <section class="overview-project" style="--project-color:${project.color}">
          <header class="overview-project-head" data-action="toggle-overview-project" data-overview-dbl="project" data-project-id="${project.id}">
            <button type="button" class="overview-project-main" data-action="toggle-overview-project" data-project-id="${project.id}" aria-expanded="${isOpen}">
              <span class="overview-caret">${isOpen ? "-" : "+"}</span>
              <span class="project-icon" style="color:${project.color}">${escapeHtml(project.icono || "◆")}</span>
              <strong>${escapeHtml(project.nombre)}</strong>
            </button>
            <span>${stats.pending} ${stats.pending === 1 ? "pendiente" : "pendientes"}</span>
          </header>
          ${isOpen ? `<div class="overview-project-body">${goals}</div>` : ""}
        </section>
      `;
    }

    function renderOverviewGoal(project, goal, index, totalGoals, filters) {
      const tasks = overviewSortItems(sortedTasks(project.id, goal.id), "task", filters)
        .map((task) => renderOverviewTask(project, goal, task, filters))
        .filter(Boolean)
        .join("");
      const isOpen = overviewIsOpen("overviewOpenGoalIds", goal.id) || overviewForceOpen("goal", filters);
      const isDirect = overviewMatchesItem("goal", goal, { project }, filters);
      if (!isDirect && !tasks) return "";
      const stats = statsForGoal(project.id, goal.id);
      const priority = goalPriority(goal);
      const selected = goalKey(project.id, goal.id) === state.selectedGoalId;
      const goalDone = overviewItemCompleted("goal", goal, { project });
      return `
        <div class="overview-group ${isDirect ? "" : "is-context"}">
          <div class="tree-row is-meta ${goalDone ? "is-complete" : ""} ${selected ? "is-selected" : ""}" data-action="toggle-overview-goal" data-overview-dbl="goal" data-project-id="${project.id}" data-section-id="${goal.id || ""}">
            <button type="button" class="check-btn ${goalDone ? "is-complete" : ""}" data-action="toggle-goal" data-section-id="${goal.id}" aria-label="${goalDone ? "Reabrir meta" : "Completar meta"}">${goalDone ? "✓" : ""}</button>
            <button type="button" class="tree-main" data-action="toggle-overview-goal" data-section-id="${goal.id}" aria-expanded="${isOpen}">
              <span class="tree-title"><span class="tree-caret">${isOpen ? "-" : "+"}</span>${escapeHtml(goal.nombre)}</span>
              ${goal.descripcion ? `<span class="tree-description">${escapeHtml(goal.descripcion)}</span>` : ""}
              <span class="tree-meta">${stats.completed}/${stats.total} tareas logradas</span>
            </button>
            <span class="tree-priority">${priority ? escapeHtml(priorityLabel(priority)) : ""}</span>
            <span class="tree-date">${goal.fechaVencimiento ? escapeHtml(formatDate(goal.fechaVencimiento)) : ""}</span>
            <div class="tree-actions">
              <span class="tree-percent">${goalDone ? 100 : Math.round(stats.progress * 100)}%</span>
              <button type="button" class="icon-btn goal-order-btn" data-action="move-goal" data-direction="up" data-section-id="${goal.id}" title="Subir meta" aria-label="Subir meta" ${index === 0 ? "disabled" : ""}>&#8593;</button>
              <button type="button" class="icon-btn goal-order-btn" data-action="move-goal" data-direction="down" data-section-id="${goal.id}" title="Bajar meta" aria-label="Bajar meta" ${index === totalGoals - 1 ? "disabled" : ""}>&#8595;</button>
              <button type="button" class="icon-btn goal-edit-btn" data-action="open-section" data-project-id="${project.id}" data-section-id="${goal.id}" title="Editar meta" aria-label="Editar meta">&#9998;</button>
              <button type="button" class="icon-btn goal-delete-btn" data-action="delete-section" data-section-id="${goal.id}" title="Borrar meta" aria-label="Borrar meta">&#128465;</button>
            </div>
          </div>
          ${isOpen ? tasks : ""}
        </div>
      `;
    }

    function renderOverviewTask(project, goal, task, filters) {
      const children = overviewSortItems(sortedSubtaskChildren(task.id, null), "subtask", filters)
        .map((subtask) => renderOverviewSubtask(project, goal, task, subtask, 1, filters))
        .filter(Boolean)
        .join("");
      const isOpen = overviewIsOpen("overviewOpenTaskIds", task.id) || overviewForceOpen("task", filters);
      const isDirect = overviewMatchesItem("task", task, { project, goal }, filters);
      if (!isDirect && !children) return "";
      const selected = task.id === state.selectedTaskId;
      const stats = statsForTask(task.id);
      return `
        <div class="tree-row is-task ${task.completada ? "is-complete" : ""} ${selected ? "is-selected" : ""}" data-action="toggle-overview-task" data-overview-dbl="task" data-task-id="${task.id}">
          <button type="button" class="check-btn ${task.completada ? "is-complete" : ""}" data-action="toggle-task" data-task-id="${task.id}" aria-label="${task.completada ? "Reabrir tarea" : "Completar tarea"}">${task.completada ? "✓" : ""}</button>
          <button type="button" class="tree-main" data-action="toggle-overview-task" data-task-id="${task.id}" aria-expanded="${isOpen}">
            <span class="tree-title"><span class="tree-caret">${isOpen ? "-" : "+"}</span>${escapeHtml(task.nombre)}</span>
            ${task.descripcion ? `<span class="tree-description">${escapeHtml(task.descripcion)}</span>` : ""}
            <span class="tree-meta">${escapeHtml(goal.nombre)}${stats.total ? ` - ${stats.completed}/${stats.total} subtareas logradas` : ""}</span>
          </button>
          <span class="tree-priority">${task.prioridad ? escapeHtml(priorityLabel(task.prioridad)) : ""}</span>
          <span class="tree-date">${task.fechaVencimiento ? escapeHtml(formatDate(task.fechaVencimiento)) : ""}</span>
          <div class="tree-actions">
            <span class="tree-percent">${percentForTask(task)}%</span>
            <button type="button" class="icon-btn" data-action="open-task" data-task-id="${task.id}" title="Editar tarea" aria-label="Editar tarea">&#9998;</button>
            <button type="button" class="icon-btn" data-action="delete-task" data-task-id="${task.id}" title="Eliminar tarea" aria-label="Eliminar tarea">&#128465;</button>
          </div>
        </div>
        ${isOpen ? children : ""}
      `;
    }

    function renderOverviewSubtask(project, goal, task, subtask, depth, filters) {
      const safeDepth = Math.max(1, Math.min(MAX_SUBTASK_DEPTH, depth));
      const children = overviewSortItems(sortedSubtaskChildren(task.id, subtask.id), "subtask", filters)
        .map((child) => renderOverviewSubtask(project, goal, task, child, safeDepth + 1, filters))
        .filter(Boolean)
        .join("");
      const isOpen = overviewIsOpen("overviewOpenSubtaskIds", subtask.id) || filters.type === "subtasks";
      const isDirect = overviewMatchesItem("subtask", subtask, { project, goal, task, depth: safeDepth }, filters);
      if (!isDirect && !children) return "";
      const selected = subtask.id === state.selectedSubtaskId;
      const indent = 56 + (safeDepth - 1) * 28;
      const stats = statsForSubtask(subtask.id);
      return `
        <div class="tree-row is-subtask depth-${safeDepth} ${subtask.completada ? "is-complete" : ""} ${selected ? "is-selected" : ""}" style="--tree-indent:${indent}px" data-action="toggle-overview-subtask" data-overview-dbl="subtask" data-subtask-id="${subtask.id}">
          <button type="button" class="check-btn ${subtask.completada ? "is-complete" : ""}" data-action="toggle-subtask" data-subtask-id="${subtask.id}" aria-label="${subtask.completada ? "Reabrir subtarea" : "Completar subtarea"}">${subtask.completada ? "✓" : ""}</button>
          <button type="button" class="tree-main" data-action="toggle-overview-subtask" data-subtask-id="${subtask.id}" aria-expanded="${isOpen}">
            <span class="tree-title"><span class="tree-caret">${isOpen ? "-" : "+"}</span>${escapeHtml(subtask.nombre)}</span>
            ${subtask.descripcion ? `<span class="tree-description">${escapeHtml(subtask.descripcion)}</span>` : ""}
            <span class="tree-meta">${escapeHtml(task.nombre)}${stats.total ? ` - ${stats.completed}/${stats.total} subtareas logradas` : ""}</span>
          </button>
          <span class="tree-priority">${subtask.prioridad ? escapeHtml(priorityLabel(subtask.prioridad)) : ""}</span>
          <span class="tree-date">${subtask.fechaVencimiento ? escapeHtml(formatDate(subtask.fechaVencimiento)) : ""}</span>
          <div class="tree-actions">
            <span class="tree-percent">${percentForSubtask(subtask)}%</span>
            <button type="button" class="icon-btn" data-action="open-subtask" data-subtask-id="${subtask.id}" data-task-id="${task.id}" title="Editar subtarea" aria-label="Editar subtarea">&#9998;</button>
            <button type="button" class="icon-btn" data-action="delete-subtask" data-subtask-id="${subtask.id}" title="Eliminar subtarea" aria-label="Eliminar subtarea">&#128465;</button>
          </div>
        </div>
        ${isOpen ? children : ""}
      `;
    }

    function overviewMatchesItem(type, item, context, filters = state.overviewFilters || {}) {
      if (filters.type !== "all" && filters.type !== `${type}s`) return false;
      const completed = overviewItemCompleted(type, item, context);
      if (filters.status === "pending" && completed) return false;
      if (filters.status === "completed" && !completed) return false;
      const priority = type === "goal" ? goalPriority(item) : normalizePriority(item.prioridad);
      if (filters.priority === "none" && priority) return false;
      if (filters.priority !== "all" && filters.priority !== "none" && filters.priority !== priority) return false;
      if (filters.tagId !== "all" && !(Array.isArray(item.tags) && item.tags.includes(filters.tagId))) return false;
      return true;
    }

    function overviewItemCompleted(type, item, context) {
      if (type === "goal") {
        const stats = statsForGoal(context.project.id, item.id);
        return Boolean(item.completada) || Boolean(item.completedAt) || (stats.total > 0 && stats.pending === 0);
      }
      return Boolean(item.completada);
    }

    function overviewSortItems(items, type, filters = state.overviewFilters || {}) {
      const sortBy = filters.sortBy || "project";
      if (sortBy === "project") return [...items];
      return [...items].sort((a, b) => {
        if (sortBy === "date") return overviewDateValue(a).localeCompare(overviewDateValue(b)) || overviewNameValue(a).localeCompare(overviewNameValue(b));
        if (sortBy === "priority") return priorityRank(type === "goal" ? goalPriority(a) : normalizePriority(a.prioridad)) - priorityRank(type === "goal" ? goalPriority(b) : normalizePriority(b.prioridad)) || overviewNameValue(a).localeCompare(overviewNameValue(b));
        if (sortBy === "name") return overviewNameValue(a).localeCompare(overviewNameValue(b));
        if (sortBy === "type") return overviewTypeRank(type) || overviewNameValue(a).localeCompare(overviewNameValue(b));
        return 0;
      });
    }

    function overviewDateValue(item) {
      return item.fechaVencimiento || "9999-12-31";
    }

    function overviewNameValue(item) {
      return (item.nombre || "").toLocaleLowerCase("es-CL");
    }

    function overviewTypeRank(type) {
      return { goal: 0, task: 1, subtask: 2 }[type] || 9;
    }

    function visitOverviewSubtasks(task, parentSubtaskId, visitor, depth = 1) {
      sortedSubtaskChildren(task.id, parentSubtaskId).forEach((subtask) => {
        visitor(subtask, depth);
        visitOverviewSubtasks(task, subtask.id, visitor, depth + 1);
      });
    }

    function renderBuiltView() {
      syncCompletionState();
      const records = builtRecords({ includeReopened: true });
      const active = records.filter((record) => record.currentStatus !== false);
      const summary = {
        goals: active.filter((record) => record.itemType === "goal").length,
        tasks: active.filter((record) => record.itemType === "task").length,
        subtasks: active.filter((record) => record.itemType === "subtask").length,
        history: records.length
      };
      const groups = records.reduce((acc, record) => {
        const key = record.completedAt ? record.completedAt.slice(0, 10) : "sin-fecha";
        if (!acc[key]) acc[key] = [];
        acc[key].push(record);
        return acc;
      }, {});
      const groupKeys = Object.keys(groups).sort((a, b) => b.localeCompare(a));

      return `
        <section class="workspace-view">
          <div class="workspace-inner">
            <div class="workspace-head">
              <div>
                <h2>Construido</h2>
                <p>Historial de metas logradas, tareas completadas y subtareas terminadas. Lo construido queda registrado aunque luego se reabra.</p>
              </div>
            </div>
            <div class="built-summary-grid">
              ${renderBuiltSummaryCard("Metas logradas", summary.goals, "#d8b66e")}
              ${renderBuiltSummaryCard("Tareas completadas", summary.tasks, "#78ad85")}
              ${renderBuiltSummaryCard("Subtareas terminadas", summary.subtasks, "#c36b64")}
              ${renderBuiltSummaryCard("Registros historicos", summary.history, "#8da2b5")}
            </div>
            <div class="built-timeline">
              ${records.length
                ? groupKeys.map((key) => `
                    <div class="built-date-group">
                      <h3>${escapeHtml(formatBuiltGroupDate(key))}</h3>
                      ${groups[key].map(renderBuiltEntry).join("")}
                    </div>
                  `).join("")
                : `<div class="empty-state">Aún no hay elementos construidos. Completa una tarea o una subtarea para inaugurar el registro.</div>`}
            </div>
          </div>
        </section>
      `;
    }

    function renderBuiltSummaryCard(label, value, color) {
      return `
        <div class="built-summary-card" style="--built-color:${color}">
          <strong>${value}</strong>
          <span>${escapeHtml(label)}</span>
        </div>
      `;
    }

    function renderBuiltEntry(record) {
      const color = builtTypeColor(record.itemType);
      const context = builtContext(record);
      const priority = priorityLabel(record.prioridad);
      const due = formatDate(record.fechaVencimiento);
      const detail = [context, due, priority].filter(Boolean).join(" - ");
      return `
        <article class="built-entry ${record.currentStatus === false ? "is-reopened" : ""}" style="--built-color:${color}">
          <div class="built-type">${builtTypeLabel(record.itemType)}</div>
          <div class="built-main">
            <strong>${escapeHtml(record.nombre)}</strong>
            <span>${escapeHtml(detail || record.descripcion || "Sin detalle adicional")}</span>
          </div>
          <div>
            <div class="built-time">${escapeHtml(formatDateTime(record.completedAt))}</div>
            ${record.currentStatus === false ? `<span class="built-status">Reabierto</span>` : `<span class="built-status">Construido</span>`}
          </div>
        </article>
      `;
    }

    function formatBuiltGroupDate(key) {
      if (!key || key === "sin-fecha") return "Sin fecha";
      const date = new Date(`${key}T12:00:00`);
      if (Number.isNaN(date.getTime())) return key;
      return new Intl.DateTimeFormat("es-CL", {
        weekday: "short",
        day: "2-digit",
        month: "long",
        year: "numeric"
      }).format(date);
    }

    function totalStatsForProject(projectId) {
      return projectStats(projectId);
    }

    function tagById(tagId) {
      return (state.tags || []).find((tag) => tag.id === tagId);
    }

    function statsForGoal(projectId, sectionId) {
      const tasks = state.tasks.filter((task) => task.projectId === projectId && task.sectionId === sectionId);
      const completed = tasks.filter((task) => task.completada).length;
      return {
        total: tasks.length,
        completed,
        pending: tasks.length - completed,
        progress: tasks.length ? completed / tasks.length : 0
      };
    }

    function goalPosition(goal, project, index) {
      return goal.posicion || goalPositionFor(project.id, index);
    }

    function selectedGoalForProject(projectId) {
      const goals = goalsForProject(projectId);
      return goals.find((goal) => goalKey(projectId, goal.id) === state.selectedGoalId) || goals[0] || null;
    }

    function selectedGoalForPanel(projectId) {
      const goals = goalsForProject(projectId);
      return goals.find((goal) => goalKey(projectId, goal.id) === state.selectedGoalId) || null;
    }

    function renderMapView() {
      const panelWidth = Math.max(340, Math.min(900, Number(state.mapPanelWidth) || 620));
      const project = getSelectedProject();
      const hasProjects = sortedProjects().length > 0;
      const showProjectPanel = Boolean(project && state.listProjectOpen);
      const showGoalTasks = Boolean(showProjectPanel && selectedGoalForPanel(project.id));
      const selectedTask = getSelectedTask();
      const showTaskDetail = Boolean(showGoalTasks && selectedTask && selectedTask.projectId === project.id);
      return `
        <section class="map-view ${showProjectPanel ? "has-project" : "no-project"} ${showGoalTasks ? "has-goal" : "no-goal"} ${showTaskDetail ? "has-task" : "no-task"}" style="--map-panel-width:${panelWidth}px">
          <div class="map-column">
            <div class="map-toolbar" aria-label="Zoom del mapa">
              <button type="button" data-action="map-zoom-out" title="Alejar" aria-label="Alejar">−</button>
              <button type="button" data-action="map-zoom-in" title="Acercar" aria-label="Acercar">+</button>
              <button type="button" data-action="map-reset" title="Centrar atlas">Centrar</button>
              <button type="button" class="map-create-project-control" data-action="open-project" title="Crear proyecto">Crear proyecto</button>
            </div>
          <div class="map-shell">
            ${renderMapSvg()}
            ${hasProjects ? "" : `<button type="button" class="empty-atlas-create-btn" data-action="open-project">Crear proyecto</button>`}
            ${showProjectPanel ? `<button type="button" class="small-btn map-focus-project-btn" data-action="focus-project-map" data-project-id="${project.id}" title="Ver solo este proyecto">Vista proyecto</button>` : ""}
          </div>
          ${showProjectPanel ? renderMapContextPanel(project) : ""}
          </div>
          ${showProjectPanel ? renderProjectTreePanel(project) : ""}
        </section>
      `;
    }

    function pathBounds(path) {
      const nums = (path.match(/-?\d+(?:\.\d+)?/g) || []).map(Number);
      const xs = [];
      const ys = [];
      for (let i = 0; i < nums.length - 1; i += 2) {
        xs.push(nums[i]);
        ys.push(nums[i + 1]);
      }
      return {
        minX: Math.min(...xs),
        minY: Math.min(...ys),
        maxX: Math.max(...xs),
        maxY: Math.max(...ys)
      };
    }

    function expandBounds(bounds, padding) {
      return {
        minX: Math.max(0, bounds.minX - padding),
        minY: Math.max(0, bounds.minY - padding),
        maxX: Math.min(900, bounds.maxX + padding),
        maxY: Math.min(800, bounds.maxY + padding)
      };
    }

    function combineBounds(boundsList) {
      return boundsList.reduce((acc, bounds) => ({
        minX: Math.min(acc.minX, bounds.minX),
        minY: Math.min(acc.minY, bounds.minY),
        maxX: Math.max(acc.maxX, bounds.maxX),
        maxY: Math.max(acc.maxY, bounds.maxY)
      }));
    }

    function mapBoxForBounds(bounds, padding = 44) {
      const expanded = expandBounds(bounds, padding);
      const ratio = 900 / 800;
      const boundsWidth = expanded.maxX - expanded.minX;
      const boundsHeight = expanded.maxY - expanded.minY;
      const width = Math.max(170, Math.min(900, Math.max(boundsWidth, boundsHeight * ratio)));
      const height = width / ratio;
      const centerX = (expanded.minX + expanded.maxX) / 2;
      const centerY = (expanded.minY + expanded.maxY) / 2;
      return clampMapBox({
        x: centerX - width / 2,
        y: centerY - height / 2,
        w: width,
        h: height
      });
    }

    function mapBoxForContinent(projectId) {
      const project = state.projects.find((item) => item.id === projectId);
      if (!project) return { x: 0, y: 0, w: 900, h: 800 };
      const mapIndex = projectMapIndex(projectId);
      return mapBoxForBounds(pathBounds(continentPathForProject(project, mapIndex)), 42);
    }

    function focusContinent(projectId) {
      const project = state.projects.find((item) => item.id === projectId);
      if (!project) return;
      setState({
        view: "list",
        selectedProjectId: projectId,
        selectedGoalId: null,
        selectedTaskId: null,
        selectedSubtaskId: null,
        mapGoalPopupId: null,
        mapTaskPopupId: null,
        continentPopupId: null,
        listProjectOpen: true,
        mapViewBox: mapBoxForContinent(projectId)
      });
    }

    function centerProjectOnMap(projectId) {
      const project = state.projects.find((item) => item.id === projectId);
      if (!project) return;
      const mapIndex = projectMapIndex(projectId);
      const bounds = pathBounds(continentPathForProject(project, mapIndex));
      const box = clampMapBox(state.mapViewBox || { x: 0, y: 0, w: 900, h: 800 });
      const targetW = Math.min(box.w, 700);
      const targetH = targetW / (900 / 800);
      const cx = (bounds.minX + bounds.maxX) / 2;
      const cy = (bounds.minY + bounds.maxY) / 2;
      setState({
        selectedProjectId: projectId,
        selectedGoalId: null,
        selectedTaskId: null,
        selectedSubtaskId: null,
        mapGoalPopupId: null,
        mapTaskPopupId: null,
        continentPopupId: null,
        listProjectOpen: false,
        mapViewBox: clampMapBox({
          x: cx - targetW / 2,
          y: cy - targetH / 2,
          w: targetW,
          h: targetH
        })
      });
    }

    function projectIdForMapTarget(target) {
      const taskNode = taskNodeFromMapTarget(target);
      if (taskNode?.dataset.taskId) {
        return state.tasks.find((item) => item.id === taskNode.dataset.taskId)?.projectId || null;
      }
      const goalNode = goalNodeFromMapTarget(target);
      if (goalNode?.dataset.projectId) return goalNode.dataset.projectId;
      return projectIdFromMapTarget(target);
    }

    function openMapTargetInPanels(target) {
      const taskNode = taskNodeFromMapTarget(target);
      if (taskNode?.dataset.taskId) {
        const task = state.tasks.find((item) => item.id === taskNode.dataset.taskId);
        if (!task) return false;
        setState({
          view: "list",
          selectedProjectId: task.projectId,
          selectedGoalId: goalKey(task.projectId, task.sectionId),
          selectedTaskId: task.id,
          mapGoalPopupId: null,
          mapTaskPopupId: null,
          continentPopupId: null,
          listProjectOpen: true,
          mapViewBox: mapBoxForContinent(task.projectId)
        });
        return true;
      }
      const goalNode = goalNodeFromMapTarget(target);
      if (goalNode?.dataset.projectId) {
        setState({
          view: "list",
          selectedProjectId: goalNode.dataset.projectId,
          selectedGoalId: goalKey(goalNode.dataset.projectId, goalNode.dataset.sectionId || null),
          selectedTaskId: null,
          mapGoalPopupId: null,
          mapTaskPopupId: null,
          continentPopupId: null,
          listProjectOpen: true,
          mapViewBox: mapBoxForContinent(goalNode.dataset.projectId)
        });
        return true;
      }
      const projectId = projectIdFromMapTarget(target);
      if (projectId) {
        focusContinent(projectId);
        return true;
      }
      return false;
    }

    function projectIdFromMapTarget(target) {
      const title = target?.closest?.(".continent-title-group");
      if (title?.dataset.projectId) return title.dataset.projectId;
      const continent = target?.closest?.(".continent");
      if (continent?.dataset.projectId) return continent.dataset.projectId;
      return null;
    }

    function goalNodeFromMapTarget(target) {
      return target?.closest?.(".castle-node, .castle-label, .goal-hover-hit") || null;
    }

    function taskNodeFromMapTarget(target) {
      return target?.closest?.(".task-construction, .task-hover-hit") || null;
    }

    function mapViewBox(projects) {
      if (projects.length === 0) return "0 0 900 800";
      return mapBoxString(state.mapViewBox || { x: 0, y: 0, w: 900, h: 800 });
    }

    function setMapViewBox(box, options = {}) {
      const nextBox = clampMapBox(box);
      state.mapViewBox = nextBox;
      if (options.persist !== false) saveState();
      const svg = document.querySelector(".kingdom-map");
      if (svg) svg.setAttribute("viewBox", mapBoxString(nextBox));
      updateMapDetailLayers(nextBox);
    }

    function updateMapDetailLayers(box) {
      document.querySelectorAll(".castle-label").forEach((label) => {
        label.style.display = label.classList.contains("is-selected") ? "" : "none";
      });
      document.querySelectorAll(".city-title-layer").forEach((layer) => {
        layer.style.display = box.w <= CITY_LABEL_MAX_VIEWBOX_WIDTH ? "" : "none";
      });
    }

    function resetMapView() {
      setMapViewBox({ x: 0, y: 0, w: 900, h: 800 });
    }

    function handleMapPanelResizeStart(event) {
      event.preventDefault();
      const view = event.currentTarget.closest(".map-view");
      if (!view) return;
      const bounds = view.getBoundingClientRect();
      resizingMapPanel = {
        startX: event.clientX,
        startWidth: Math.max(340, Math.min(900, Number(state.mapPanelWidth) || 620)),
        maxWidth: Math.max(340, Math.min(900, bounds.width - 560))
      };
      document.body.classList.add("is-resizing-map-panel");
      event.currentTarget.setPointerCapture?.(event.pointerId);
    }

    function handleMapPanelResizeMove(event) {
      if (!resizingMapPanel) return;
      const nextWidth = Math.max(340, Math.min(resizingMapPanel.maxWidth, resizingMapPanel.startWidth + resizingMapPanel.startX - event.clientX));
      state.mapPanelWidth = nextWidth;
      const view = document.querySelector(".map-view");
      if (view) view.style.setProperty("--map-panel-width", `${Math.round(nextWidth)}px`);
    }

    function handleMapPanelResizeEnd() {
      if (!resizingMapPanel) return;
      resizingMapPanel = null;
      document.body.classList.remove("is-resizing-map-panel");
      saveState();
    }

    function zoomMapAtCenter(factor) {
      const box = clampMapBox(state.mapViewBox || { x: 0, y: 0, w: 900, h: 800 });
      zoomMapAtPoint(box.x + box.w / 2, box.y + box.h / 2, factor);
    }

    function zoomMapAtPoint(anchorX, anchorY, factor) {
      const box = clampMapBox(state.mapViewBox || { x: 0, y: 0, w: 900, h: 800 });
      const next = {
        x: anchorX - (anchorX - box.x) * factor,
        y: anchorY - (anchorY - box.y) * factor,
        w: box.w * factor,
        h: box.h * factor
      };
      setMapViewBox(next);
    }

    function handleMapPointerDown(event) {
      if (event.button !== 0) return;
      if (event.target.closest(".castle-node, .castle-label, .goal-hover-hit, .task-hover-hit, .continent-title-group, .task-construction, .map-toolbar, .continent-title-popup, .map-popup-close, .task-map-popup, .castle-detail-popup, .map-hover-popup")) return;
      const svg = event.currentTarget;
      const box = clampMapBox(state.mapViewBox || { x: 0, y: 0, w: 900, h: 800 });
      dragMap = {
        svg,
        target: resolveMapEventTarget(event),
        startClientX: event.clientX,
        startClientY: event.clientY,
        startBox: box,
        moved: false
      };
      svg.classList.add("is-panning");
      if (svg.setPointerCapture) svg.setPointerCapture(event.pointerId);
    }

    function handleMapPointerMove(event) {
      if (!dragMap || dragCastle) return;
      const rect = dragMap.svg.getBoundingClientRect();
      if (!rect.width || !rect.height) return;
      const dx = (event.clientX - dragMap.startClientX) * dragMap.startBox.w / rect.width;
      const dy = (event.clientY - dragMap.startClientY) * dragMap.startBox.h / rect.height;
      if (Math.abs(dx) + Math.abs(dy) > 1.5) dragMap.moved = true;
      setMapViewBox({
        x: dragMap.startBox.x - dx,
        y: dragMap.startBox.y - dy,
        w: dragMap.startBox.w,
        h: dragMap.startBox.h
      }, { persist: false });
    }

    function handleMapPointerUp() {
      if (!dragMap) return;
      const moved = dragMap.moved;
      const target = dragMap.target;
      dragMap.svg.classList.remove("is-panning");
      saveState();
      dragMap = null;
      if (moved) {
        suppressNextMapClick = true;
        return;
      }
      if (activateMapTarget(target)) suppressNextMapClick = true;
    }

    function handleMapClick(event) {
      if (event.target.closest(".map-toolbar, .continent-title-popup, .map-popup-close, .task-map-popup, .castle-detail-popup")) return;
      if (suppressNextMapClick) {
        suppressNextMapClick = false;
        return;
      }
      activateMapTarget(resolveMapEventTarget(event), { isDouble: event.detail >= 2 });
    }

    function resolveMapEventTarget(event) {
      const directTarget = event.target;
      if (projectIdForMapTarget(directTarget)) return directTarget;
      const pointTarget = document.elementFromPoint(event.clientX, event.clientY);
      if (pointTarget && event.currentTarget?.contains?.(pointTarget) && projectIdForMapTarget(pointTarget)) return pointTarget;
      return directTarget;
    }

    function projectIdAtMapPoint(svg, point) {
      if (!svg || !point) return null;
      const svgPoint = typeof DOMPoint === "function" ? new DOMPoint(point.x, point.y) : { x: point.x, y: point.y };
      const paths = Array.from(svg.querySelectorAll("path[data-coast-project-id]")).reverse();
      const hit = paths.find((path) => {
        if (typeof path.isPointInFill === "function" && path.isPointInFill(svgPoint)) return true;
        try {
          const box = path.getBBox();
          return point.x >= box.x && point.x <= box.x + box.width && point.y >= box.y && point.y <= box.y + box.height;
        } catch {
          return false;
        }
      });
      return hit?.dataset.coastProjectId || null;
    }

    function activateMapTarget(target, options = {}) {
      const projectId = projectIdForMapTarget(target);
      if (!projectId) return;
      const taskNode = taskNodeFromMapTarget(target);
      const goalNode = goalNodeFromMapTarget(target);
      const now = Date.now();
      const clickKey = `${projectId}:${taskNode?.dataset.taskId || goalNode?.dataset.goalKey || "project"}`;
      const isDouble = options.isDouble || (lastMapClick && lastMapClick.key === clickKey && now - lastMapClick.time < 480);
      if (isDouble) {
        window.clearTimeout(mapClickTimer);
        mapClickTimer = null;
        lastMapClick = null;
        openMapTargetInPanels(target);
        return true;
      }
      lastMapClick = { key: clickKey, time: now };
      window.clearTimeout(mapClickTimer);
      mapClickTimer = window.setTimeout(() => {
        if (lastMapClick && lastMapClick.key === clickKey) {
          if (taskNode?.dataset.taskId) {
            const task = state.tasks.find((item) => item.id === taskNode.dataset.taskId);
            if (!task) {
              lastMapClick = null;
              return;
            }
            setState({
              selectedProjectId: task.projectId,
              selectedGoalId: goalKey(task.projectId, task.sectionId),
              selectedTaskId: task.id,
              selectedSubtaskId: null,
              mapGoalPopupId: null,
              mapTaskPopupId: null,
              continentPopupId: null
            }, false);
          } else if (goalNode?.dataset.projectId) {
            setState({
              selectedProjectId: projectId,
              selectedGoalId: goalKey(projectId, goalNode.dataset.sectionId || null),
              selectedTaskId: null,
              selectedSubtaskId: null,
              mapGoalPopupId: null,
              mapTaskPopupId: null,
              continentPopupId: null
            }, false);
          } else {
            centerProjectOnMap(projectId);
          }
          lastMapClick = null;
        }
      }, 420);
      return true;
    }

    function handleMapWheel(event) {
      event.preventDefault();
      const svg = event.currentTarget;
      const point = svgPoint(svg, event.clientX, event.clientY);
      const factor = event.deltaY < 0 ? 0.86 : 1.16;
      zoomMapAtPoint(point.x, point.y, factor);
    }

    function handleMapDoubleClick(event) {
      if (event.target.closest(".map-toolbar, .continent-title-popup, .map-popup-close")) return;
      event.preventDefault();
      window.clearTimeout(mapClickTimer);
      mapClickTimer = null;
      lastMapClick = null;
      if (openMapTargetInPanels(resolveMapEventTarget(event))) return;
      const point = svgPoint(event.currentTarget, event.clientX, event.clientY);
      const projectId = projectIdAtMapPoint(event.currentTarget, point);
      if (projectId) {
        focusContinent(projectId);
        return;
      }
      zoomMapAtPoint(point.x, point.y, 0.72);
    }

    function handleMapGoalHover(event) {
      const node = event.currentTarget;
      const projectId = node.dataset.projectId;
      const sectionId = node.dataset.sectionId || null;
      if (!projectId) return;
      const nextGoalId = goalKey(projectId, sectionId);
      if (state.mapGoalPopupId === nextGoalId && !state.mapTaskPopupId) return;
      setState({
        mapGoalPopupId: nextGoalId,
        mapTaskPopupId: null,
        continentPopupId: null
      }, false);
    }

    function handleMapGoalLeave(event) {
      const node = event.currentTarget;
      const nextGoalId = goalKey(node.dataset.projectId, node.dataset.sectionId || null);
      if (state.mapGoalPopupId === nextGoalId) setState({ mapGoalPopupId: null }, false);
    }

    function handleMapTaskHover(event) {
      const taskId = event.currentTarget.dataset.taskId;
      if (!taskId || state.mapTaskPopupId === taskId) return;
      setState({
        mapTaskPopupId: taskId,
        mapGoalPopupId: null,
        continentPopupId: null
      }, false);
    }

    function handleMapTaskLeave(event) {
      const taskId = event.currentTarget.dataset.taskId;
      if (state.mapTaskPopupId === taskId) setState({ mapTaskPopupId: null }, false);
    }

    function renderMapSvg() {
      const projects = sortedProjects();
      const viewBox = mapViewBox(projects);
      const goals = projects.flatMap((project) => goalsForProject(project.id).map((goal, index) => ({ project, goal, index })));
      const castles = [...goals]
        .sort((a, b) => goalPosition(a.goal, a.project, a.index).y - goalPosition(b.goal, b.project, b.index).y)
        .map(({ project, goal, index }) => renderCastle(project, goal, index))
        .join("");
      const goalRoutes = renderGoalSequencePaths(projects);
      const workers = goals.map(({ project, goal, index }) => renderProjectWorkers(project, goal, index)).join("");
      const cityLabels = renderCityLabels(goals);
      const continentLabels = renderContinentLabels(projects);
      const hoverLayer = renderMapHoverLayer(goals);
      const footerText = projects.length
        ? "Doble click en un elemento para abrir su tarjeta"
        : "Presione en Crear proyecto para comenzar la aventura";
      const celebration = state.celebratingGoalId
        ? renderFullCelebration(goals.find(({ project, goal }) => goalKey(project.id, goal.id) === state.celebratingGoalId))
        : "";

      return `
        <svg class="kingdom-map" viewBox="${viewBox}" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Atlas de proyectos, metas y tareas">
          <defs>
            <linearGradient id="sky" x1="0" x2="0" y1="0" y2="1">
              <stop offset="0%" stop-color="#204f56"/>
              <stop offset="55%" stop-color="#245d64"/>
              <stop offset="100%" stop-color="#163f47"/>
            </linearGradient>
            <radialGradient id="moonGlow" cx="50%" cy="50%" r="50%">
              <stop offset="0%" stop-color="#d8e1e8"/>
              <stop offset="70%" stop-color="#9aa9b4"/>
              <stop offset="100%" stop-color="#53616d"/>
            </radialGradient>
            <radialGradient id="continentShade" cx="42%" cy="35%" r="68%">
              <stop offset="0%" stop-color="#f4e7bf"/>
              <stop offset="100%" stop-color="#d8bd82"/>
            </radialGradient>
            <radialGradient id="mapVignette" cx="50%" cy="48%" r="72%">
              <stop offset="0%" stop-color="rgba(255,255,255,0)"/>
              <stop offset="72%" stop-color="rgba(0,0,0,0.08)"/>
              <stop offset="100%" stop-color="rgba(0,0,0,0.34)"/>
            </radialGradient>
            <linearGradient id="stone" x1="0" x2="1">
              <stop offset="0%" stop-color="#7d8790"/>
              <stop offset="100%" stop-color="#4f5963"/>
            </linearGradient>
            <filter id="softShadow" x="-28%" y="-28%" width="156%" height="156%">
              <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#000" flood-opacity="0.24"/>
            </filter>
            <filter id="castleLift" x="-24%" y="-24%" width="148%" height="148%">
              <feDropShadow dx="0" dy="1.8" stdDeviation="1.1" flood-color="#271f16" flood-opacity="0.28"/>
            </filter>
            <pattern id="stars" width="90" height="90" patternUnits="userSpaceOnUse">
              <circle cx="12" cy="18" r="1.1" fill="#cbd6df" opacity="0.45"/>
              <circle cx="48" cy="9" r="0.7" fill="#cbd6df" opacity="0.32"/>
              <circle cx="76" cy="32" r="1.2" fill="#cbd6df" opacity="0.38"/>
              <circle cx="24" cy="68" r="0.8" fill="#cbd6df" opacity="0.28"/>
              <circle cx="62" cy="77" r="1" fill="#cbd6df" opacity="0.42"/>
            </pattern>
            <pattern id="oceanTexture" width="72" height="72" patternUnits="userSpaceOnUse">
              <path d="M8 18 C24 10 40 28 58 18" fill="none" stroke="rgba(196,221,221,0.07)" stroke-width="1.2"/>
              <path d="M4 52 C20 44 38 60 66 48" fill="none" stroke="rgba(10,37,42,0.18)" stroke-width="1.2"/>
              <circle cx="24" cy="34" r="1.1" fill="rgba(196,221,221,0.1)"/>
              <circle cx="62" cy="9" r="0.9" fill="rgba(196,221,221,0.08)"/>
            </pattern>
            <pattern id="landGrain" width="46" height="46" patternUnits="userSpaceOnUse">
              <path d="M6 12 L11 10" stroke="rgba(92,71,43,0.12)" stroke-width="1" stroke-linecap="round"/>
              <path d="M29 22 L34 21" stroke="rgba(92,71,43,0.1)" stroke-width="1" stroke-linecap="round"/>
              <path d="M4 38 C12 32 20 42 28 35" fill="none" stroke="rgba(92,71,43,0.08)" stroke-width="1"/>
            </pattern>
            <path id="flagWave" d="M0,0 C18,-8 38,8 58,0 L58,28 C38,20 18,36 0,28 Z"/>
          </defs>
          ${renderLandscape()}
          ${renderContinents(projects)}
          ${goalRoutes}
          ${castles}
          ${workers}
          ${continentLabels}
          ${cityLabels}
          ${hoverLayer}
          ${celebration}
          <g transform="translate(84 710)" opacity="0.78">
            <circle r="40" fill="rgba(7,12,16,0.44)" stroke="#8da2b5" stroke-width="1.6"/>
            <circle r="24" fill="none" stroke="#8da2b5" stroke-width="1"/>
            <path d="M0,-35 L7,-7 L35,0 L7,7 L0,35 L-7,7 L-35,0 L-7,-7 Z" fill="rgba(141,162,181,0.16)" stroke="#8da2b5"/>
            <text y="-47" text-anchor="middle" fill="#cbd6df" font-size="12" font-family="Georgia">N</text>
            <text y="58" text-anchor="middle" fill="#cbd6df" font-size="12" font-family="Georgia">S</text>
            <text x="52" y="4" text-anchor="middle" fill="#cbd6df" font-size="12" font-family="Georgia">E</text>
            <text x="-52" y="4" text-anchor="middle" fill="#cbd6df" font-size="12" font-family="Georgia">O</text>
          </g>
          <g>
            <rect x="0" y="760" width="900" height="40" fill="rgba(5,8,12,0.72)"/>
            <text class="footer-ribbon" x="450" y="786" text-anchor="middle">${footerText}</text>
          </g>
        </svg>
      `;
    }

    function renderMapHoverLayer(goals) {
      const goalHits = goals.map(({ project, goal, index }) => renderGoalHoverHit(project, goal, index)).join("");
      const taskHits = goals.map(({ project, goal, index }) => {
        const stats = statsForGoal(project.id, goal.id);
        const cityScale = cityScaleForGoal(stats);
        const cityPos = goalPosition(goal, project, index);
        const tasks = sortedTasks(project.id, goal.id);
        const layout = taskPlotLayoutForGoal(project, goal, index, tasks.length, cityScale);
        return tasks
          .map((task, taskIndex) => renderTaskHoverHit(project, goal, task, taskIndex, cityPos, cityScale, layout))
          .join("");
      }).join("");
      return `<g class="map-hover-layer">${goalHits}${taskHits}</g>`;
    }

    function renderGoalHoverHit(project, goal, index) {
      const stats = statsForGoal(project.id, goal.id);
      const cityScale = cityScaleForGoal(stats);
      const pos = goalPosition(goal, project, index);
      return `
        <g class="goal-hover-hit" data-project-id="${project.id}" data-section-id="${goal.id || ""}" data-goal-key="${goalKey(project.id, goal.id)}">
          <ellipse class="map-hover-zone" cx="${pos.x}" cy="${pos.y}" rx="${Math.max(48, 86 * cityScale)}" ry="${Math.max(42, 72 * cityScale)}"/>
        </g>
      `;
    }

    function renderTaskHoverHit(project, goal, task, taskIndex, cityPos, cityScale, layout = null) {
      const point = taskPlotPoint(cityPos, taskIndex, cityScale, layout);
      return `
        <g class="task-hover-hit" data-project-id="${project.id}" data-section-id="${goal.id || ""}" data-goal-key="${goalKey(project.id, goal.id)}" data-task-id="${task.id}">
          <rect class="map-hover-zone" x="${point.x - 23}" y="${point.y - 28}" width="46" height="58" rx="8"/>
        </g>
      `;
    }

    function renderCityLabels(goals) {
      const box = clampMapBox(state.mapViewBox || { x: 0, y: 0, w: 900, h: 800 });
      const hidden = box.w > CITY_LABEL_MAX_VIEWBOX_WIDTH ? ` style="display:none"` : "";
      return `<g class="city-title-layer" pointer-events="none"${hidden}>
        ${goals.map(({ project, goal, index }) => {
          const pos = goalPosition(goal, project, index);
          const nameLength = String(goal.nombre || "").length;
          const stats = statsForGoal(project.id, goal.id);
          const cityScale = cityScaleForGoal(stats);
          const mapIndex = projectMapIndex(project.id);
          const coast = continentPathForProject(project, mapIndex);
          const bounds = pathBounds(coast);
          const projectTitleX = (bounds.minX + bounds.maxX) / 2;
          const projectTitleY = bounds.minY + Math.min(72, Math.max(44, (bounds.maxY - bounds.minY) * 0.18));
          const centerY = (bounds.minY + bounds.maxY) / 2;
          const screenScale = clampNumber(box.w / 900, 0.42, 0.78);
          const scale = (nameLength > 54 ? 0.62 : nameLength > 34 ? 0.69 : 0.76) * screenScale;
          const lines = wrapSvgLines(goal.nombre, nameLength > 54 ? 16 : 20).slice(0, 2);
          const plateWidth = Math.min(164, Math.max(78, Math.max(...lines.map((line) => line.length)) * 6.7 + 26));
          const plateHeight = 29 + (lines.length - 1) * 11;
          const labelAbove = pos.y > centerY;
          let y = pos.y + (labelAbove ? -Math.max(34, 58 * cityScale) : Math.max(36, 62 * cityScale));
          if (Math.abs(pos.x - projectTitleX) < 160 && y < projectTitleY + 42) {
            y = pos.y + Math.max(36, 58 * cityScale);
          }
          if (y < bounds.minY + 22) y = pos.y + Math.max(36, 58 * cityScale);
          if (y > bounds.maxY - 14) y = pos.y - Math.max(34, 54 * cityScale);
          const accent = goalPriorityColor(goal) !== "transparent" ? goalPriorityColor(goal) : project.color;
          const progressWidth = Math.max(30, plateWidth - 24);
          const progressFill = roundViewBox(progressWidth * clampNumber(stats.progress, 0, 1));
          const progressX = -progressWidth / 2;
          const progressY = -18 + plateHeight - 7;
          const textStartY = lines.length > 1 ? -5 : 1;
          return `
            <g class="city-title-label" style="--map-goal-accent:${accent}" transform="translate(${roundViewBox(pos.x)} ${roundViewBox(y)}) scale(${roundViewBox(scale)})">
              <rect class="city-title-plate" x="${-plateWidth / 2}" y="-18" width="${plateWidth}" height="${plateHeight}" rx="8"/>

    function renderLandscape() {

    function renderContinents(projects) {

            <path data-coast-project-id="${project.id}" d="${coast}" fill="none" stroke="rgba(15,39,41,0.18)" stroke-width="3.4" stroke-linejoin="round"/>
