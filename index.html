      }
      const x = Math.max(0, Math.min(900 - w, Number(box.x) || 0));
      const y = Math.max(0, Math.min(800 - h, Number(box.y) || 0));
      return { x, y, w, h };
    }

    function clampNumber(value, min, max) {
      if (max < min) return (min + max) / 2;
      return Math.max(min, Math.min(max, value));
    }

    function mapBoxString(box) {
      const clamped = clampMapBox(box);
      return `${roundViewBox(clamped.x)} ${roundViewBox(clamped.y)} ${roundViewBox(clamped.w)} ${roundViewBox(clamped.h)}`;
    }

    function mapPopupScale() {
      const box = clampMapBox(state.mapViewBox || { x: 0, y: 0, w: 900, h: 800 });
      return clampNumber(box.w / 900, 0.12, 1);
    }

    function mapPopupPlacement(anchorX, anchorY, width, height, options = {}) {
      const box = clampMapBox(state.mapViewBox || { x: 0, y: 0, w: 900, h: 800 });
      const scale = mapPopupScale();
      const margin = 10 * scale;
      const offsetX = (options.offsetX ?? 20) * scale;
      const offsetY = (options.offsetY ?? 30) * scale;
      let x = anchorX + offsetX;
      let y = anchorY - (height * scale) - offsetY;
      const maxX = box.x + box.w - width * scale - margin;
      const minX = box.x + margin;
      if (x > maxX) x = anchorX - width * scale - offsetX;
      x = clampNumber(x, minX, maxX);
      y = clampNumber(y, box.y + margin, box.y + box.h - height * scale - margin);
      return { x: roundViewBox(x), y: roundViewBox(y), scale: roundViewBox(scale) };
    }

    function roundViewBox(value) {
      return Math.round(value * 100) / 100;
    }

    function loadState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (raw) {
          const saved = JSON.parse(raw);
          const normalized = normalizeState(saved);
          normalized.mapViewBox = { x: 0, y: 0, w: 900, h: 800 };
          normalized.view = "list";
          normalized.calendarMode = "agenda";
          normalized.listProjectOpen = false;
          normalized.selectedGoalId = null;
          normalized.selectedTaskId = null;
          normalized.mapGoalPopupId = null;
          normalized.mapTaskPopupId = null;
          normalized.continentPopupId = null;
          normalized.modal = null;
          return normalized;
        }
      } catch (error) {
        console.warn("No se pudieron cargar los datos guardados", error);
      }
      return normalizeState(emptyState());
    }

    function emptyState() {
      return {
        kingdomName: "Atelier",
        userName: "Usuario",
        userPhoto: "",
        view: "list",
        calendarMode: "agenda",
        selectedProjectId: null,
        selectedGoalId: null,
        selectedTaskId: null,
        selectedSubtaskId: null,
        mapGoalPopupId: null,
        mapTaskPopupId: null,
        projects: [],
        sections: [],
        tasks: [],
        subtasks: [],
        tags: [],
        completedLog: [],
        treeHideCompleted: false,
        overviewOpenProjectIds: [],
        overviewOpenGoalIds: [],
        overviewOpenTaskIds: [],
        overviewOpenSubtaskIds: []
      };
    }

    function normalizeState(input) {
      const data = input || {};
      const projects = Array.isArray(data.projects) ? data.projects : [];
      const sections = Array.isArray(data.sections) ? data.sections : [];
      const tasks = Array.isArray(data.tasks) ? data.tasks : [];
      const subtasks = Array.isArray(data.subtasks) ? data.subtasks : [];
      const tags = Array.isArray(data.tags) ? data.tags : [];
      const completedLog = Array.isArray(data.completedLog) ? data.completedLog : [];
      const projectMapSlots = resolveProjectMapSlots(projects);
      const allowedViews = ["map", "list", "overview", "calendar", "tags", "built"];
      const normalizedView = allowedViews.includes(data.view)
        ? (data.view === "map" ? "list" : data.view)
        : "list";
      const repositionGoals = !data.schemaVersion || data.schemaVersion < 13;
      const repairMapOrderDrift = true;
      const defaultBox = { x: 0, y: 0, w: 900, h: 800 };
      return {
        schemaVersion: 18,
        mapFitVersion: 2,
        kingdomName: (!data.kingdomName || data.kingdomName === "Reino en Construcción" || data.kingdomName === "Atlas de Construccion") ? "Atelier" : data.kingdomName,
        userName: data.userName || "Usuario",
        userPhoto: data.userPhoto || "",
        view: normalizedView,
        calendarMode: ["agenda", "week"].includes(data.calendarMode) ? data.calendarMode : "agenda",
        treeMode: ["goals", "tasks", "all"].includes(data.treeMode) ? data.treeMode : "all",
        treeHideCompleted: Boolean(data.treeHideCompleted),
        listProjectOpen: Boolean(data.listProjectOpen),
        mapPanelWidth: Math.max(340, Math.min(900, Number(data.mapPanelWidth) || 620)),
        calendarFilters: {
          projectId: data.calendarFilters?.projectId || "all",
          type: data.calendarFilters?.type || "all",
          tagId: data.calendarFilters?.tagId || "all"
        },
        overviewFilters: {
          projectId: data.overviewFilters?.projectId || "all",
          type: ["all", "goals", "tasks", "subtasks"].includes(data.overviewFilters?.type) ? data.overviewFilters.type : "all",
          status: ["pending", "all", "completed"].includes(data.overviewFilters?.status) ? data.overviewFilters.status : "pending",
          priority: ["all", "none", ...priorities].includes(data.overviewFilters?.priority) ? data.overviewFilters.priority : "all",
          tagId: data.overviewFilters?.tagId || "all",
          sortBy: ["project", "date", "priority", "name", "type"].includes(data.overviewFilters?.sortBy) ? data.overviewFilters.sortBy : "project"
        },
        overviewOpenProjectIds: Array.isArray(data.overviewOpenProjectIds)
          ? data.overviewOpenProjectIds.filter((id) => projects.some((project) => project.id === id))
          : projects.map((project) => project.id),
        overviewOpenGoalIds: Array.isArray(data.overviewOpenGoalIds)
          ? data.overviewOpenGoalIds.filter((id) => sections.some((section) => section.id === id))
          : sections.map((section) => section.id),
        overviewOpenTaskIds: Array.isArray(data.overviewOpenTaskIds)
          ? data.overviewOpenTaskIds.filter((id) => tasks.some((task) => task.id === id))
          : tasks.map((task) => task.id),
        overviewOpenSubtaskIds: Array.isArray(data.overviewOpenSubtaskIds)
          ? data.overviewOpenSubtaskIds.filter((id) => subtasks.some((subtask) => subtask.id === id))
          : subtasks.map((subtask) => subtask.id),
        selectedProjectId: data.selectedProjectId && projects.some((p) => p.id === data.selectedProjectId)
          ? data.selectedProjectId
          : projects[0]?.id || null,
        selectedTaskId: data.selectedTaskId && tasks.some((t) => t.id === data.selectedTaskId) ? data.selectedTaskId : null,
        selectedSubtaskId: data.selectedSubtaskId && subtasks.some((s) => s.id === data.selectedSubtaskId) ? data.selectedSubtaskId : null,
        selectedGoalId: data.selectedGoalId || null,
        mapGoalPopupId: data.mapGoalPopupId || null,
        mapTaskPopupId: data.mapTaskPopupId && tasks.some((t) => t.id === data.mapTaskPopupId) ? data.mapTaskPopupId : null,
        continentPopupId: data.continentPopupId || null,
        mapZoomMode: "free",
        mapViewBox: data.mapFitVersion === 2 && !repositionGoals && isValidMapBox(data.mapViewBox) ? clampMapBox(data.mapViewBox) : defaultBox,
        recentlyCompletedTaskId: data.recentlyCompletedTaskId || null,
        celebratingProjectId: data.celebratingProjectId || null,
        celebratingGoalId: data.celebratingGoalId || null,
        modal: data.modal || null,
        tags: tags.map((tag, index) => ({
          id: tag.id || uid("tag"),
          nombre: tag.nombre || `Etiqueta ${index + 1}`,
          color: tag.color || palette[index % palette.length],
          createdAt: tag.createdAt || nowISO()
        })),
        projects: projects.map((project, index) => ({
          ...project,
          icono: project.icono || project.icon || projectIcons[index % projectIcons.length],
          colorAccent: project.colorAccent || accentMap[project.color] || shadeColor(project.color || "#4A90E2", -30),
          orden: Number.isFinite(project.orden) ? project.orden : index,
          mapSlot: projectMapSlots.get(project.id) ?? index,
          posicion: project.posicion || autoPosition(projectMapSlots.get(project.id) ?? index)
        })),
        sections: sections.map((section, index) => {
          const projectGoals = sections
            .filter((item) => item.projectId === section.projectId)
            .sort((a, b) => (a.orden || 0) - (b.orden || 0));
          const goalIndex = projectGoals.findIndex((item) => item.id === section.id);
          const mapSlot = projectMapSlots.get(section.projectId) ?? projects.findIndex((project) => project.id === section.projectId);
          const storedPosition = section.posicion || null;
          const repairedPosition = repairMapOrderDrift && isLikelyMapOrderDrift(storedPosition, mapSlot)
            ? goalPositionForSlot(mapSlot, Math.max(0, goalIndex))
            : storedPosition;
          return {
            ...section,
            descripcion: section.descripcion || "",
            prioridad: normalizePriority(section.prioridad),
            completada: Boolean(section.completada),
            fechaVencimiento: section.fechaVencimiento || null,
            completedAt: section.completedAt || null,
            comentarios: Array.isArray(section.comentarios) ? section.comentarios : [],
            secondaryProjectId: section.secondaryProjectId && projects.some((project) => project.id === section.secondaryProjectId) && section.secondaryProjectId !== section.projectId ? section.secondaryProjectId : null,
            tags: Array.isArray(section.tags) ? section.tags.filter(Boolean) : [],
            orden: Number.isFinite(section.orden) ? section.orden : index,
            linkedGoalIds: Array.isArray(section.linkedGoalIds) ? section.linkedGoalIds.filter(Boolean) : [],
            posicion: !repositionGoals && repairedPosition
              ? repairedPosition
              : initialGoalPosition(projects, section.projectId, Math.max(0, goalIndex), projectMapSlots)
          };
        }),
        tasks: tasks.map((task, index) => {
          const recurrence = normalizeRecurrence(task.recurrencia || task.recurrence, task);
          return {
            ...task,
            descripcion: task.descripcion || "",
            prioridad: normalizePriority(task.prioridad),
            completada: Boolean(task.completada),
            fechaVencimiento: task.fechaVencimiento || null,
            secondaryProjectId: task.secondaryProjectId && projects.some((project) => project.id === task.secondaryProjectId) && task.secondaryProjectId !== task.projectId ? task.secondaryProjectId : null,
            tags: Array.isArray(task.tags) ? task.tags.filter(Boolean) : [],
            sectionId: task.sectionId || null,
            orden: Number.isFinite(task.orden) ? task.orden : index,
            comentarios: Array.isArray(task.comentarios) ? task.comentarios : [],
            recurrencia: recurrence,
            recurrenceSeriesId: recurrence?.serieId || task.recurrenceSeriesId || null,
            recurrenceGeneratedFor: task.recurrenceGeneratedFor || task.fechaVencimiento || null,
            generatedFromTaskId: task.generatedFromTaskId || null,
            completedAt: task.completada ? task.completedAt || nowISO() : null
          };
        }),
        subtasks: subtasks.map((subtask, index) => ({
          ...subtask,
          taskId: subtask.taskId || null,
          parentSubtaskId: subtask.parentSubtaskId || null,
          nombre: subtask.nombre || `Subtarea ${index + 1}`,
          descripcion: subtask.descripcion || "",
          prioridad: normalizePriority(subtask.prioridad),
          completada: Boolean(subtask.completada),
          fechaVencimiento: subtask.fechaVencimiento || null,
          tags: Array.isArray(subtask.tags) ? subtask.tags.filter(Boolean) : [],
          comentarios: Array.isArray(subtask.comentarios) ? subtask.comentarios : [],
          orden: Number.isFinite(subtask.orden) ? subtask.orden : index,
          createdAt: subtask.createdAt || nowISO(),
          completedAt: subtask.completada ? subtask.completedAt || nowISO() : null
        })),
        completedLog: completedLog.map((entry) => ({
          id: entry.id || uid("completion"),
          itemType: ["goal", "task", "subtask"].includes(entry.itemType) ? entry.itemType : "task",
          itemId: entry.itemId || "",
          projectId: entry.projectId || null,
          goalId: entry.goalId || null,
          taskId: entry.taskId || null,
          nombre: entry.nombre || "Elemento construido",
          descripcion: entry.descripcion || "",
          prioridad: normalizePriority(entry.prioridad),
          fechaVencimiento: entry.fechaVencimiento || null,
          completedAt: entry.completedAt || nowISO(),
          currentStatus: entry.currentStatus !== false,
          reopenedAt: entry.reopenedAt || null,
          snapshot: entry.snapshot || {}
        })).filter((entry) => entry.itemId)
      };
    }

    function buildPersistableState() {
      const {
        modal,
        continentPopupId,
        mapGoalPopupId,
        mapTaskPopupId,
        listProjectOpen,
        selectedGoalId,
        selectedTaskId,
        selectedSubtaskId,
        recentlyCompletedTaskId,
        celebratingProjectId,
        celebratingGoalId,
        ...persistable
      } = state;
      return persistable;
    }

    function saveState(options = {}) {
      ensureRecurringInstances();
      syncCompletionState();
      repairAllDistantGoalPositions();
      const persistable = buildPersistableState();
      localStorage.setItem(STORAGE_KEY, JSON.stringify(persistable));
      if (!options.skipRemote) queueSupabaseSave();
    }

    function loadSupabaseConfig() {
      try {
        const raw = localStorage.getItem(SUPABASE_CONFIG_KEY);
        if (!raw) return { enabled: false, url: DEFAULT_SUPABASE_URL, anonKey: DEFAULT_SUPABASE_PUBLISHABLE_KEY, email: "", activeWorkspaceId: "", workspaces: [] };
        const parsed = JSON.parse(raw);
        return {
          enabled: Boolean(parsed.enabled),
          url: parsed.url || DEFAULT_SUPABASE_URL,
          anonKey: parsed.anonKey || DEFAULT_SUPABASE_PUBLISHABLE_KEY,
          email: parsed.email || "",
          activeWorkspaceId: parsed.activeWorkspaceId || "",
          workspaces: Array.isArray(parsed.workspaces) ? parsed.workspaces : []
        };
      } catch (error) {
        console.warn("No se pudo cargar la configuracion de Supabase", error);
        return { enabled: false, url: DEFAULT_SUPABASE_URL, anonKey: DEFAULT_SUPABASE_PUBLISHABLE_KEY, email: "", activeWorkspaceId: "", workspaces: [] };
      }
    }

    function saveSupabaseConfig(config) {
      const previous = supabaseConfig || {};
      supabaseConfig = {
        enabled: Boolean(config.enabled),
        url: String(config.url || DEFAULT_SUPABASE_URL).trim(),
        anonKey: String(config.anonKey || DEFAULT_SUPABASE_PUBLISHABLE_KEY).trim(),
        email: String(config.email || "").trim(),
        activeWorkspaceId: config.activeWorkspaceId ?? previous.activeWorkspaceId ?? "",
        workspaces: Array.isArray(config.workspaces) ? config.workspaces : (previous.workspaces || [])
      };
      localStorage.setItem(SUPABASE_CONFIG_KEY, JSON.stringify(supabaseConfig));
      supabaseStatus.enabled = supabaseConfig.enabled;
      supabaseStatus.workspaces = supabaseConfig.workspaces || [];
      if (!supabaseConfig.enabled) {
        supabaseClient = null;
        supabaseSession = null;
        setSupabaseStatus({ connected: false, state: "local", message: "Modo local." });
      }
    }

    function saveSupabaseConfigFromForm(form) {
      saveSupabaseConfig({
        enabled: Boolean(form.elements.supabaseEnabled?.checked),
        url: form.elements.supabaseUrl?.value || DEFAULT_SUPABASE_URL,
        anonKey: form.elements.supabaseAnonKey?.value || DEFAULT_SUPABASE_PUBLISHABLE_KEY,
        email: form.elements.supabaseEmail?.value || "",
        activeWorkspaceId: form.elements.supabaseWorkspaceId?.value || supabaseConfig.activeWorkspaceId || "",
        workspaces: supabaseConfig.workspaces || []
      });
    }

    function setSupabaseStatus(patch, renderIfVisible = true) {
      supabaseStatus = { ...supabaseStatus, ...patch, enabled: Boolean(supabaseConfig.enabled) };
      if (patch.workspaces) supabaseConfig.workspaces = patch.workspaces;
      if (renderIfVisible && state?.modal?.type === "settings") render();
    }

    function supabaseStatusClass() {
      if (!supabaseConfig.enabled) return "is-local";
      if (supabaseStatus.connected) return "is-connected";
      if (supabaseStatus.state === "error") return "is-error";
      return "is-pending";
    }

    function loadSupabaseSdk() {
      if (window.supabase?.createClient) return Promise.resolve(window.supabase);
      if (window.__atelierSupabaseSdkPromise) return window.__atelierSupabaseSdkPromise;
      window.__atelierSupabaseSdkPromise = new Promise((resolve, reject) => {
        const script = document.createElement("script");
        script.src = SUPABASE_SDK_URL;
        script.async = true;
        script.onload = () => window.supabase?.createClient ? resolve(window.supabase) : reject(new Error("No se pudo iniciar Supabase."));
        script.onerror = () => reject(new Error("No se pudo descargar el cliente de Supabase."));
        document.head.appendChild(script);
      });
      return window.__atelierSupabaseSdkPromise;
    }

    async function getSupabaseClient(password = "") {
      if (!supabaseConfig.enabled) throw new Error("Supabase no esta activado.");
      if (!supabaseConfig.url || !supabaseConfig.anonKey) throw new Error("Faltan la URL y la clave anon/publishable de Supabase.");
      const sdk = await loadSupabaseSdk();
      if (!supabaseClient) {
        supabaseClient = sdk.createClient(supabaseConfig.url, supabaseConfig.anonKey, {
          auth: { persistSession: true, autoRefreshToken: true }
        });
      }
      const current = await supabaseClient.auth.getSession();
      supabaseSession = current.data?.session || null;
      if (!supabaseSession && password && supabaseConfig.email) {
        const { data, error } = await supabaseClient.auth.signInWithPassword({
          email: supabaseConfig.email,
          password
        });
        if (error) throw error;
        supabaseSession = data.session;
      }
      if (!supabaseSession?.user?.id) throw new Error("Inicia sesion con email y contrasena para sincronizar.");
      return supabaseClient;
    }

    function defaultWorkspaceName() {
      const user = (supabaseConfig.email || state.userName || "Atelier").split("@")[0];
      return `Atelier de ${user}`;
    }

    function activeWorkspaceName() {
      const workspace = (supabaseConfig.workspaces || []).find((item) => item.id === supabaseConfig.activeWorkspaceId);
      return workspace?.name || defaultWorkspaceName();
    }

    function persistSupabaseWorkspaceList(workspaces, activeWorkspaceId = supabaseConfig.activeWorkspaceId) {
      const nextActive = activeWorkspaceId && workspaces.some((item) => item.id === activeWorkspaceId)
        ? activeWorkspaceId
        : workspaces[0]?.id || "";
      saveSupabaseConfig({
        ...supabaseConfig,
        activeWorkspaceId: nextActive,
        workspaces
      });
      setSupabaseStatus({ workspaces }, false);
      return nextActive;
    }

    async function refreshSupabaseWorkspaces() {
      const client = await getSupabaseClient();
      const { data, error } = await client
        .from(SUPABASE_WORKSPACES_TABLE)
        .select("id, name, owner_id, updated_at")
        .order("updated_at", { ascending: false });
      if (error) throw error;
      const workspaces = (data || []).map((workspace) => ({
        id: workspace.id,
        name: workspace.name || "Espacio sin nombre",
        ownerId: workspace.owner_id,
        updatedAt: workspace.updated_at
      }));
      persistSupabaseWorkspaceList(workspaces);
      return workspaces;
    }

    async function createSupabaseWorkspace(name, initialState = buildPersistableState()) {
      const client = await getSupabaseClient();
      const workspaceName = String(name || "").trim() || defaultWorkspaceName();
      const { data, error } = await client.rpc("create_atelier_workspace", {
        workspace_name: workspaceName,
        initial_state: initialState
      });
      if (error) throw error;
      const workspaceId = Array.isArray(data) ? data[0] : data;
      const workspaces = await refreshSupabaseWorkspaces();
      persistSupabaseWorkspaceList(workspaces, workspaceId);
      return workspaceId;
    }

    async function ensureSupabaseWorkspace(options = {}) {
      const { createIfMissing = true } = options;
      let workspaces = await refreshSupabaseWorkspaces();
      if (!workspaces.length && createIfMissing) {
        const workspaceId = await createSupabaseWorkspace(defaultWorkspaceName());
        workspaces = await refreshSupabaseWorkspaces();
        persistSupabaseWorkspaceList(workspaces, workspaceId);
      }
      if (!supabaseConfig.activeWorkspaceId && workspaces[0]?.id) {
        persistSupabaseWorkspaceList(workspaces, workspaces[0].id);
      }
      return supabaseConfig.activeWorkspaceId;
    }

    async function createSupabaseWorkspaceFromForm(form) {
      saveSupabaseConfigFromForm(form);
      try {
        setSupabaseStatus({ state: "connecting", message: "Creando espacio de trabajo..." });
        await getSupabaseClient(form.elements.supabasePassword?.value || "");
        const workspaceId = await createSupabaseWorkspace(form.elements.supabaseWorkspaceName?.value || defaultWorkspaceName());
        supabaseConfig.activeWorkspaceId = workspaceId;
        await pushStateToSupabase();
        showToast("Espacio de trabajo creado");
      } catch (error) {
        console.warn("Workspace", error);
        setSupabaseStatus({ state: "error", message: error.message || "No se pudo crear el espacio." });
        showToast("No se pudo crear el espacio");
      }
    }

    async function switchSupabaseWorkspaceFromForm(form) {
      saveSupabaseConfigFromForm(form);
      if (!supabaseConfig.activeWorkspaceId) {
        showToast("Selecciona un espacio de trabajo");
        return;
      }
      await pullStateFromSupabase();
    }

    async function inviteSupabaseMemberFromForm(form) {
      saveSupabaseConfigFromForm(form);
      const email = String(form.elements.supabaseInviteEmail?.value || "").trim().toLowerCase();
      const role = form.elements.supabaseInviteRole?.value || "editor";
      if (!email) {
        showToast("Escribe el correo de la persona");
        return;
      }
      try {
        setSupabaseStatus({ state: "connecting", message: "Enviando invitacion..." });
        await getSupabaseClient(form.elements.supabasePassword?.value || "");
        await ensureSupabaseWorkspace();
        const { error } = await supabaseClient.rpc("invite_atelier_member", {
          target_workspace_id: supabaseConfig.activeWorkspaceId,
          member_email: email,
          member_role: role
        });
        if (error) throw error;
        setSupabaseStatus({ connected: true, state: "connected", message: `${email} fue invitado a ${activeWorkspaceName()}.` });
        showToast("Invitacion guardada");
      } catch (error) {
        console.warn("Invite", error);
        setSupabaseStatus({ state: "error", message: error.message || "No se pudo invitar a esa persona." });
        showToast("No se pudo invitar");
      }
    }

    async function signUpSupabaseFromForm(form) {
      saveSupabaseConfigFromForm(form);
      if (!supabaseConfig.enabled) {
        showToast("Activa Supabase antes de crear la cuenta");
        return;
      }
      try {
        setSupabaseStatus({ connected: false, state: "connecting", message: "Creando cuenta en Supabase..." });
        const sdk = await loadSupabaseSdk();
        supabaseClient = sdk.createClient(supabaseConfig.url, supabaseConfig.anonKey, {
          auth: { persistSession: true, autoRefreshToken: true }
        });
        const { data, error } = await supabaseClient.auth.signUp({
          email: supabaseConfig.email,
          password: form.elements.supabasePassword?.value || ""
        });
        if (error) throw error;
        supabaseSession = data.session || null;
        if (supabaseSession?.user?.id) {
          await pushStateToSupabase();
        } else {
          setSupabaseStatus({
            connected: false,
            state: "idle",
            message: "Cuenta creada. Revisa el correo si Supabase pide confirmacion y luego usa Entrar / actualizar."
          });
          showToast("Cuenta creada; revisa tu correo si Supabase pide confirmacion");
        }
      } catch (error) {
        console.warn("Supabase signup", error);
        setSupabaseStatus({ connected: false, state: "error", message: error.message || "No se pudo crear la cuenta." });
        showToast("No se pudo crear la cuenta");
      }
    }

    async function initSupabaseFromConfig(options = {}) {
      const { password = "", mode = "pull", silent = false } = options;
      if (!supabaseConfig.enabled) return;
      try {
        setSupabaseStatus({ connected: false, state: "connecting", message: "Conectando con Supabase..." }, !silent);
        await getSupabaseClient(password);
        if (mode === "push") await pushStateToSupabase({ silent });
        else await pullStateFromSupabase({ silent });
      } catch (error) {
        console.warn("Supabase", error);
        setSupabaseStatus({ connected: false, state: "error", message: error.message || "No se pudo conectar con Supabase." }, !silent);
        if (!silent) showToast("No se pudo sincronizar con Supabase");
      }
    }

    function queueSupabaseSave() {
      if (!supabaseConfig.enabled || !supabaseClient || !supabaseSession?.user?.id || supabaseLoadingRemote) return;
      clearTimeout(supabaseSaveTimer);
      supabaseSaveTimer = setTimeout(() => {
        pushStateToSupabase({ silent: true }).catch((error) => {
          console.warn("No se pudo guardar en Supabase", error);
          setSupabaseStatus({ connected: false, state: "error", message: error.message || "No se pudo guardar en Supabase." }, false);
        });
      }, 900);
    }

    async function pullStateFromSupabase(options = {}) {
      const { silent = false } = options;
      const client = await getSupabaseClient();
      const workspaceId = await ensureSupabaseWorkspace();
      if (!workspaceId) throw new Error("No hay espacios de trabajo disponibles.");
      supabaseLoadingRemote = true;
      const { data, error } = await client
        .from(SUPABASE_WORKSPACES_TABLE)
        .select("id, name, state, updated_at")
        .eq("id", workspaceId)
        .maybeSingle();
      if (error) {
        supabaseLoadingRemote = false;
        throw error;
      }
      if (data?.state) {
        state = normalizeState({ ...data.state, modal: state.modal });
        state.selectedGoalId = null;
        state.selectedTaskId = null;
        state.mapGoalPopupId = null;
        state.mapTaskPopupId = null;
        state.continentPopupId = null;
        state.listProjectOpen = false;
        state.modal = null;
        state.recentlyCompletedTaskId = null;
        state.celebratingProjectId = null;
        state.celebratingGoalId = null;
        saveState({ skipRemote: true });
        setSupabaseStatus({
          connected: true,
          state: "connected",
          message: `Conectado a ${data.name || activeWorkspaceName()} como ${supabaseConfig.email || supabaseSession.user.email || "usuario"}.`,
          updatedAt: data.updated_at || nowISO()
        }, !silent);
        supabaseLoadingRemote = false;
        render();
        if (!silent) showToast("Datos cargados desde Supabase");
        return;
      }
      supabaseLoadingRemote = false;
      await pushStateToSupabase({ silent });
    }

    async function pushStateToSupabase(options = {}) {
      const { silent = false } = options;
      const client = await getSupabaseClient();
      const workspaceId = await ensureSupabaseWorkspace();
      if (!workspaceId) throw new Error("No hay espacios de trabajo disponibles.");
      ensureRecurringInstances();
      syncCompletionState();
      repairAllDistantGoalPositions();
      const payload = buildPersistableState();
      const { error } = await client
        .from(SUPABASE_WORKSPACES_TABLE)
        .update({
          state: payload,
          updated_at: nowISO()
        })
        .eq("id", workspaceId);
      if (error) throw error;
      await refreshSupabaseWorkspaces();
      setSupabaseStatus({
        connected: true,
        state: "connected",
        message: `Sincronizado en ${activeWorkspaceName()}.`,
        updatedAt: nowISO()
      }, !silent);
      if (!silent) showToast("Datos subidos a Supabase");
    }

    async function signOutSupabase() {
      try {
        if (supabaseClient) await supabaseClient.auth.signOut();
      } catch (error) {
        console.warn("No se pudo cerrar sesion en Supabase", error);
      }
      supabaseSession = null;
      setSupabaseStatus({ connected: false, state: "idle", message: "Sesion cerrada. La app sigue en modo local." });
      showToast("Sesion de Supabase cerrada");
    }

    function shadeColor(hex, percent) {
      const raw = hex.replace("#", "");
      const num = parseInt(raw.length === 3 ? raw.split("").map((c) => c + c).join("") : raw, 16);
      const amt = Math.round(2.55 * percent);
      const r = Math.max(0, Math.min(255, (num >> 16) + amt));
      const g = Math.max(0, Math.min(255, ((num >> 8) & 0x00ff) + amt));
      const b = Math.max(0, Math.min(255, (num & 0x0000ff) + amt));
      return `#${(0x1000000 + r * 0x10000 + g * 0x100 + b).toString(16).slice(1)}`;
    }

    function autoPosition(index) {
      return layoutForSlot(index).label;
    }

    function initialGoalPosition(projects, projectId, index, projectMapSlots = null) {
      const projectIndex = Math.max(0, projects.findIndex((project) => project.id === projectId));
      const slot = projectMapSlots?.get(projectId) ?? normalizeMapSlot(projects[projectIndex]?.mapSlot, projectIndex);
      return goalPositionForSlot(slot, index);
    }

    function projectIndex(projectId) {
      return Math.max(0, sortedProjects().findIndex((project) => project.id === projectId));
    }

    function projectMapIndex(projectId) {
      const fallback = projectIndex(projectId);
      const project = state.projects.find((item) => item.id === projectId);
      return normalizeMapSlot(project?.mapSlot, fallback);
    }

    function projectLayout(projectId) {
      return layoutForSlot(projectMapIndex(projectId));
    }

    function goalPositionFor(projectId, index) {
      return goalPositionForSlot(projectMapIndex(projectId), index);
    }

    function repairDistantGoalPositions(projectId) {
      const mapSlot = projectMapIndex(projectId);
      sortedSections(projectId).forEach((goal, index) => {
        if (isLikelyMapOrderDrift(goal.posicion, mapSlot)) {
          goal.posicion = goalPositionForSlot(mapSlot, index);
        }
      });
    }

    function repairAllDistantGoalPositions() {
      state.projects.forEach((project) => repairDistantGoalPositions(project.id));
    }

    function goalKey(projectId, sectionId) {
      return sectionId || `${projectId}__meta_general`;
    }

    function goalsForProject(projectId) {
      return sortedSections(projectId);
    }

    function sortedProjects() {
      return [...state.projects].sort((a, b) => a.orden - b.orden || a.nombre.localeCompare(b.nombre));
    }

    function sortedSections(projectId) {
      return state.sections
        .filter((section) => section.projectId === projectId)
        .sort((a, b) => a.orden - b.orden || a.nombre.localeCompare(b.nombre));
    }

    function sortedTasks(projectId, sectionId = undefined) {
      return state.tasks
        .filter((task) => task.projectId === projectId && (sectionId === undefined || task.sectionId === sectionId))
        .sort((a, b) => a.orden - b.orden || a.createdAt.localeCompare(b.createdAt));
    }

    function sortedSubtasks(taskId) {
      return (state.subtasks || [])
        .filter((subtask) => subtask.taskId === taskId)
        .sort((a, b) => a.orden - b.orden || a.createdAt.localeCompare(b.createdAt));
    }

    function sortedSubtaskChildren(taskId, parentSubtaskId = null) {
      return (state.subtasks || [])
        .filter((subtask) => subtask.taskId === taskId && (subtask.parentSubtaskId || null) === (parentSubtaskId || null))
        .sort((a, b) => a.orden - b.orden || a.createdAt.localeCompare(b.createdAt));
    }

    function subtaskDepth(subtaskId) {
      let depth = 0;
      let current = state.subtasks.find((subtask) => subtask.id === subtaskId);
      const seen = new Set();
      while (current && !seen.has(current.id) && depth < MAX_SUBTASK_DEPTH + 2) {
        seen.add(current.id);
        depth += 1;
        current = current.parentSubtaskId ? state.subtasks.find((subtask) => subtask.id === current.parentSubtaskId) : null;
      }
      return Math.max(1, Math.min(MAX_SUBTASK_DEPTH, depth || 1));
    }

    function subtaskDescendantIds(subtaskId) {
      const result = new Set([subtaskId]);
      const visit = (parentId) => {
        (state.subtasks || [])
          .filter((subtask) => subtask.parentSubtaskId === parentId)
          .forEach((child) => {
            if (result.has(child.id)) return;
            result.add(child.id);
            visit(child.id);
          });
      };
      visit(subtaskId);
      return result;
    }

    function statsForTask(taskId) {
      const subtasks = sortedSubtasks(taskId);
      const completed = subtasks.filter((subtask) => subtask.completada).length;
      return {
        total: subtasks.length,
        completed,
        pending: subtasks.length - completed,
        progress: subtasks.length ? completed / subtasks.length : 0
      };
    }

    function statsForSubtask(subtaskId) {
      const subtask = state.subtasks.find((item) => item.id === subtaskId);
      const children = subtask ? sortedSubtaskChildren(subtask.taskId, subtaskId) : [];
      const completed = children.filter((item) => item.completada).length;
      return {
        total: children.length,
        completed,
        pending: children.length - completed,
        progress: children.length ? completed / children.length : (subtask?.completada ? 1 : 0)
      };
    }

    function percentForTask(task) {
      const stats = statsForTask(task.id);
      return Math.round((stats.total ? stats.progress : task.completada ? 1 : 0) * 100);
    }

    function percentForSubtask(subtask) {
      const stats = statsForSubtask(subtask.id);
      return Math.round(stats.progress * 100);
    }

    function priorityRank(priority) {
      const index = priorities.indexOf(priority);
      return index === -1 ? priorities.length : index;
    }

    function inferredGoalPriority(sectionId, tasks = state.tasks) {
      const found = priorities.find((priority) => tasks.some((task) => task.sectionId === sectionId && task.prioridad === priority));
      return found || "";
    }

    function goalPriority(goal) {
      return normalizePriority(goal?.prioridad);
    }

    function goalPriorityColor(goal) {
      const priority = goalPriority(goal);
      return priority ? priorityGoalColor[priority] : "transparent";
    }

    function dueRank(task) {
      if (!task.fechaVencimiento) return Number.POSITIVE_INFINITY;
      const time = new Date(`${task.fechaVencimiento}T12:00:00`).getTime();
      return Number.isFinite(time) ? time : Number.POSITIVE_INFINITY;
    }

    function pendingTasksForPopup(projectId, sectionId) {
      return sortedTasks(projectId, sectionId)
        .sort((a, b) => dueRank(a) - dueRank(b)
          || priorityRank(a.prioridad) - priorityRank(b.prioridad)
          || a.orden - b.orden
          || a.nombre.localeCompare(b.nombre));
    }

    function projectStats(projectId) {
      const tasks = state.tasks.filter((task) => task.projectId === projectId);
      const completed = tasks.filter((task) => task.completada).length;
      const pending = tasks.length - completed;
      return {
        total: tasks.length,
        completed,
        pending,
        progress: tasks.length ? completed / tasks.length : 0
      };
    }

    function globalStats() {
      const total = state.tasks.length;
      const completed = state.tasks.filter((task) => task.completada).length;
      return { total, completed, pending: total - completed };
    }

    function completionKey(itemType, itemId) {
      return `${itemType}:${itemId}`;
    }

    function projectById(projectId) {
      return state.projects.find((project) => project.id === projectId) || null;
    }

    function goalById(goalId) {
      return state.sections.find((goal) => goal.id === goalId) || null;
    }

    function taskById(taskId) {
      return state.tasks.find((task) => task.id === taskId) || null;
    }

    function latestCompletedAt(items) {
      const dates = items
        .map((item) => item.completedAt)
        .filter(Boolean)
        .sort((a, b) => new Date(a).getTime() - new Date(b).getTime());
      return dates[dates.length - 1] || nowISO();
    }

    function completionBaseRecord(itemType, item, extra = {}) {
      const project = projectById(extra.projectId || item.projectId);
      const goal = goalById(extra.goalId || item.sectionId || item.goalId);
      const task = taskById(extra.taskId || item.taskId);
      return {
        itemType,
        itemId: item.id,
        projectId: extra.projectId || item.projectId || task?.projectId || null,
        goalId: extra.goalId || item.sectionId || item.goalId || task?.sectionId || null,
        taskId: extra.taskId || (itemType === "task" ? item.id : item.taskId) || null,
        nombre: item.nombre || "Elemento construido",
        descripcion: item.descripcion || "",
        prioridad: normalizePriority(item.prioridad),
        fechaVencimiento: item.fechaVencimiento || null,
        completedAt: extra.completedAt || item.completedAt || nowISO(),
        currentStatus: true,
        reopenedAt: null,
        snapshot: {
          projectName: project?.nombre || "",
          goalName: goal?.nombre || "",
          taskName: task?.nombre || "",
          ...extra.snapshot
        }
      };
    }

    function completionRecordForGoal(goal) {
      const goalTasks = state.tasks.filter((task) => task.sectionId === goal.id);
      const stats = statsForGoal(goal.projectId, goal.id);
      return completionBaseRecord("goal", goal, {
        projectId: goal.projectId,
        goalId: goal.id,
        completedAt: goal.completedAt || latestCompletedAt(goalTasks.filter((task) => task.completada)),
        snapshot: {
          progressText: `${stats.completed}/${stats.total} tareas logradas`
        }
      });
    }

    function completionRecordForTask(task) {
      return completionBaseRecord("task", task, {
        projectId: task.projectId,
        goalId: task.sectionId || null,
        taskId: task.id
      });
    }

    function completionRecordForSubtask(subtask) {
      const task = taskById(subtask.taskId);
      return completionBaseRecord("subtask", subtask, {
        projectId: task?.projectId || null,
        goalId: task?.sectionId || null,
        taskId: subtask.taskId
      });
    }

    function syncCompletionState() {
      if (!state || !Array.isArray(state.completedLog)) state.completedLog = [];
      const records = new Map(state.completedLog.map((entry) => [completionKey(entry.itemType, entry.itemId), { ...entry }]));

      const activate = (record) => {
        const key = completionKey(record.itemType, record.itemId);
        const previous = records.get(key) || {};
        records.set(key, {
          ...previous,
          ...record,
          id: previous.id || record.id || uid("completion"),
          completedAt: previous.completedAt || record.completedAt || nowISO(),
          currentStatus: true,
          reopenedAt: null,
          snapshot: {
            ...(previous.snapshot || {}),
            ...(record.snapshot || {})
          }
        });
      };

      const deactivate = (itemType, itemId) => {
        const key = completionKey(itemType, itemId);
        const previous = records.get(key);
        if (previous && previous.currentStatus !== false) {
          records.set(key, { ...previous, currentStatus: false, reopenedAt: nowISO() });
        }
      };

      state.tasks.forEach((task) => {
        if (task.completada) activate(completionRecordForTask(task));
        else deactivate("task", task.id);
      });

      state.subtasks.forEach((subtask) => {
        if (subtask.completada) activate(completionRecordForSubtask(subtask));
        else deactivate("subtask", subtask.id);
      });

      state.sections.forEach((goal) => {
        const stats = statsForGoal(goal.projectId, goal.id);
        const achieved = Boolean(goal.completada) || (stats.total > 0 && stats.pending === 0);
        if (achieved) {
          if (!goal.completedAt) {
            goal.completedAt = goal.completada
              ? nowISO()
              : latestCompletedAt(state.tasks.filter((task) => task.sectionId === goal.id && task.completada)) || nowISO();
          }
          activate(completionRecordForGoal(goal));
        } else {
          deactivate("goal", goal.id);
        }
      });

      const liveGoalIds = new Set(state.sections.map((goal) => goal.id));
      const liveTaskIds = new Set(state.tasks.map((task) => task.id));
      const liveSubtaskIds = new Set(state.subtasks.map((subtask) => subtask.id));
      records.forEach((record) => {
        const exists = record.itemType === "goal"
          ? liveGoalIds.has(record.itemId)
          : record.itemType === "subtask"
            ? liveSubtaskIds.has(record.itemId)
            : liveTaskIds.has(record.itemId);
        if (!exists && record.currentStatus !== false) {
          records.set(completionKey(record.itemType, record.itemId), { ...record, currentStatus: false, reopenedAt: record.reopenedAt || nowISO() });
        }
      });

      state.completedLog = Array.from(records.values())
        .sort((a, b) => new Date(b.completedAt || 0).getTime() - new Date(a.completedAt || 0).getTime());
    }

    function builtRecords({ includeReopened = true } = {}) {
      const records = Array.isArray(state.completedLog) ? state.completedLog : [];
      return records
        .filter((record) => includeReopened || record.currentStatus !== false)
        .slice()
        .sort((a, b) => new Date(b.completedAt || 0).getTime() - new Date(a.completedAt || 0).getTime());
    }

    function builtTypeLabel(type) {
      if (type === "goal") return "Meta";
      if (type === "subtask") return "Subtarea";
      return "Tarea";
    }

    function builtTypeColor(type) {
      if (type === "goal") return "#d8b66e";
      if (type === "subtask") return "#c36b64";
      return "#78ad85";
    }

    function builtContext(record) {
      const parts = [
        record.snapshot?.projectName || projectById(record.projectId)?.nombre,
        record.snapshot?.goalName || goalById(record.goalId)?.nombre,
        record.itemType === "subtask" ? (record.snapshot?.taskName || taskById(record.taskId)?.nombre) : ""
      ].filter(Boolean);
      return parts.join(" - ");
    }

    function formatDateTime(value) {
      if (!value) return "";
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return "";
      return new Intl.DateTimeFormat("es-CL", {
        day: "2-digit",
        month: "short",
        year: "numeric",
        hour: "2-digit",
        minute: "2-digit"
      }).format(date);
    }

    function dateStringFromDate(date) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const day = String(date.getDate()).padStart(2, "0");
      return `${year}-${month}-${day}`;
    }

    function todayString() {
      return dateStringFromDate(new Date());
    }

    function parseDateString(value) {
      const source = value || todayString();
      const date = new Date(`${source}T12:00:00`);
      return Number.isNaN(date.getTime()) ? new Date(`${todayString()}T12:00:00`) : date;
    }

    function addRecurrenceInterval(date, recurrence) {
      const next = new Date(date.getTime());
      const interval = Math.max(1, Number(recurrence?.intervalo) || 1);
      if (recurrence?.frecuencia === "daily") next.setDate(next.getDate() + interval);
      if (recurrence?.frecuencia === "weekly") next.setDate(next.getDate() + interval * 7);
      if (recurrence?.frecuencia === "monthly") next.setMonth(next.getMonth() + interval);
      return next;
    }

    function nextRecurrenceDate(baseDate, recurrence) {
      const normalized = normalizeRecurrence(recurrence);
      if (!normalized) return null;
      return dateStringFromDate(addRecurrenceInterval(parseDateString(baseDate), normalized));
    }

    function recurrenceOccurrenceDate(task) {
      return task.recurrenceGeneratedFor || task.fechaVencimiento || (task.completedAt ? task.completedAt.slice(0, 10) : "") || (task.createdAt ? task.createdAt.slice(0, 10) : "");
    }

    function compareRecurringTasks(a, b) {
      return recurrenceOccurrenceDate(a).localeCompare(recurrenceOccurrenceDate(b))
        || String(a.createdAt || "").localeCompare(String(b.createdAt || ""))
        || a.nombre.localeCompare(b.nombre);
    }

    function buildRecurringTaskFrom(baseTask, recurrence, nextDate) {
      const nextOrder = state.tasks.filter((task) => task.projectId === baseTask.projectId && task.sectionId === baseTask.sectionId).length;
      return {
        ...baseTask,
        id: uid("task"),
        nombre: baseTask.nombre,
        descripcion: baseTask.descripcion || "",
        completada: false,
        completedAt: null,
        fechaVencimiento: nextDate,
        createdAt: nowISO(),
        orden: nextOrder,
        comentarios: [],
        recurrenceSeriesId: recurrence.serieId,
        recurrenceGeneratedFor: nextDate,
        generatedFromTaskId: baseTask.id,
        recurrencia: { ...recurrence, lastGeneratedDate: nextDate }
      };
    }

    function ensureRecurringInstances() {
      if (!state || !Array.isArray(state.tasks)) return 0;
      const groups = new Map();
      state.tasks.forEach((task) => {
        const recurrence = normalizeRecurrence(task.recurrencia, task);
        if (!recurrence) return;
        task.recurrencia = recurrence;
        task.recurrenceSeriesId = recurrence.serieId;
        if (!groups.has(recurrence.serieId)) groups.set(recurrence.serieId, []);
        groups.get(recurrence.serieId).push(task);
      });

      let created = 0;
      groups.forEach((tasks, seriesId) => {
        const ordered = tasks.slice().sort(compareRecurringTasks);
        const hasPendingInstance = ordered.some((task) => !task.completada);
        if (hasPendingInstance) return;
        const baseTask = ordered[ordered.length - 1];
        if (!baseTask || !baseTask.completada) return;
        const recurrence = normalizeRecurrence(baseTask.recurrencia, baseTask);
        if (!recurrence) return;
        const baseDate = recurrenceOccurrenceDate(baseTask) || todayString();
        const nextDate = nextRecurrenceDate(baseDate, recurrence);
        if (!nextDate) return;
        if (recurrence.fechaFin && nextDate > recurrence.fechaFin) return;
        const alreadyExists = state.tasks.some((task) => task.recurrenceSeriesId === seriesId && recurrenceOccurrenceDate(task) === nextDate);
        if (alreadyExists) return;
        state.tasks.push(buildRecurringTaskFrom(baseTask, recurrence, nextDate));
        baseTask.recurrencia = { ...recurrence, lastGeneratedDate: nextDate };
        created += 1;
      });
      return created;
    }

    function getSelectedProject() {
      return state.projects.find((project) => project.id === state.selectedProjectId) || state.projects[0] || null;
    }

    function getSelectedTask() {
      return state.tasks.find((task) => task.id === state.selectedTaskId) || null;
    }

    function setState(patch, persist = true) {
      state = normalizeState({ ...state, ...patch });
      ensureRecurringInstances();
      syncCompletionState();
      repairAllDistantGoalPositions();
      if (persist) saveState();
      render();
    }

    function mutate(mutator, options = {}) {
      mutator();
      state = normalizeState(state);
      ensureRecurringInstances();
      syncCompletionState();
      repairAllDistantGoalPositions();
      if (options.persist !== false) saveState();
      render();
    }

    function showToast(message) {
      const stack = document.getElementById("toast-stack");
      const toast = document.createElement("div");
      toast.className = "toast";
      toast.textContent = message;
      stack.appendChild(toast);
      setTimeout(() => toast.remove(), 2600);
    }

    function render() {
      document.getElementById("app").innerHTML = `
        <div class="app">
          <header class="topbar">
            <div class="brand">
              <div class="brand-copy">
                <h1>${escapeHtml(state.kingdomName)}</h1>
                <small><em>&quot;Narau yori narero&quot; (&quot;La pr&aacute;ctica hace al maestro&quot;)</em></small>
              </div>
              ${renderUserBadge()}
            </div>
            <nav class="view-toggle" aria-label="Alternar vista">
              <button type="button" data-action="set-view" data-view="map" class="${state.view === "map" ? "is-active" : ""}">🗺️ Mapa</button>
              <button type="button" data-action="set-view" data-view="list" class="${state.view === "list" ? "is-active" : ""}">📋 Lista</button>
            </nav>
            <div class="global-actions">
              <div class="counter" aria-label="Contadores globales">
                <span>🔨 ${stats.pending} pendientes</span>
                <span>${stats.completed}/${stats.total} completadas</span>
              </div>
              <button type="button" class="icon-btn" data-action="open-settings" title="Configuración" aria-label="Configuración">⚙</button>
            </div>
          </header>
          <main class="main">
            ${state.view === "map" ? renderMapView() : renderListView()}
          </main>
          ${renderModal()}
        </div>
      `;
      bindEvents();
    }

    function renderMapView() {
      const panelWidth = Math.max(340, Math.min(900, Number(state.mapPanelWidth) || 620));
      const project = getSelectedProject();
      const selectedTask = getSelectedTask();
      const showProjectPanel = Boolean(project && state.listProjectOpen);
      const showGoalTasks = Boolean(showProjectPanel && selectedGoalForProject(project.id));
      const showTaskDetail = Boolean(showProjectPanel && selectedTask && selectedTask.projectId === project.id);
      return `
        <section class="map-view ${showProjectPanel ? "has-project" : "no-project"} ${showTaskDetail ? "has-task" : "no-task"}" style="--map-panel-width:${panelWidth}px">
          <div class="map-column">
          <div class="map-shell">
            ${renderMapSvg()}
          </div>
          ${showProjectPanel ? renderMapContextPanel(project) : ""}
          </div>
          ${showProjectPanel ? renderProjectTreePanel(project) : ""}
        </section>
      `;
    }

    function renderMapSvg() {
      const projects = sortedProjects();
      const castles = [...projects].sort((a, b) => a.posicion.y - b.posicion.y).map(renderCastle).join("");
      const workers = projects.map(renderProjectWorkers).join("");
      const labels = projects.map(renderCastleLabel).join("");
      const celebration = state.celebratingProjectId ? renderFullCelebration(state.projects.find((p) => p.id === state.celebratingProjectId)) : "";
      return `
        <svg class="kingdom-map" viewBox="0 0 900 800" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Mapa de proyectos, metas y tareas">

    function renderCastle(project) {
      const stats = projectStats(project.id);
      const progress = stats.progress;
      const scale = 0.4 + progress * 0.8;
      const pct = progress * 100;
      const selected = project.id === state.selectedProjectId;
      return `
        <g class="castle-node" data-project-id="${project.id}" transform="translate(${project.posicion.x} ${project.posicion.y}) scale(${scale})">
          <ellipse cx="0" cy="70" rx="82" ry="15" fill="rgba(0,0,0,0.18)"/>
          ${stats.total >= 4 ? renderScaffold() : ""}
          ${renderFoundation()}
          ${pct >= 0 ? renderCentralTower(project, pct) : ""}
          ${pct >= 20 ? renderWalls(project) : ""}
          ${pct >= 40 ? renderSideTowers(project) : ""}
          ${pct >= 60 ? renderWindows() : ""}
          ${pct >= 80 ? renderGoldenFlag() : ""}
          <rect class="castle-hit" x="-125" y="-105" width="250" height="190" fill="transparent"/>
          ${selected ? `<rect x="-132" y="-112" width="264" height="202" rx="18" fill="none" stroke="${project.color}" stroke-width="4" stroke-dasharray="8 7" opacity="0.85"/>` : ""}

    function renderProjectWorkers(project) {
      const pending = sortedTasks(project.id).filter((task) => !task.completada);
      const done = sortedTasks(project.id).filter((task) => task.completada);
      const pendingWorkers = pending.map((task, index) => {
        const pos = workingPositions[index % workingPositions.length];
        return renderWorker(task, project, pos, false, index);
      }).join("");
      const doneWorkers = done.map((task, index) => {
        const pos = celebratingPositions[index % celebratingPositions.length];
        return renderWorker(task, project, pos, true, index);
      }).join("");
      return pendingWorkers + doneWorkers;
    }

    function renderWorker(task, project, pos, complete, index) {
      const scale = 1.6 * (workerScale[normalizePriority(task.prioridad)] || workerScale.p4);
      const x = project.posicion.x + pos.dx;
      const y = project.posicion.y + pos.dy;
      const mirror = pos.mirror ? " scale(-1 1)" : "";
      const pop = task.id === state.recentlyCompletedTaskId ? "worker-pop" : "";
      return `
        <g class="${pop}" data-task-id="${task.id}" transform="translate(${x} ${y}) scale(${scale})${mirror}">
            ${renderWorkerShape(complete, pos.type || (index % 2 ? "saw" : "hammer"), normalizePriority(task.prioridad) || "p4", task.id === state.recentlyCompletedTaskId)}
        </g>
      `;
    }

    function renderWorkerShape(complete, type, priority, highlighted) {
      const overalls = complete ? "#10b981" : "#dc2626";
      const eye = complete
        ? `<path d="M-7 -29 Q-4 -32 -1 -29 M7 -29 Q10 -32 13 -29" stroke="#111827" stroke-width="2" fill="none"/>`

      if (complete) {
        return `
          <g>

              </path>
              <path d="M20 -17 L35 -36" stroke="#fcd34d" stroke-width="6">
                <animateTransform attributeName="transform" type="rotate" dur="0.7s" repeatCount="indefinite" values="8 20 -17;-12 20 -17;8 20 -17"/>
              </path>
              <rect x="-12" y="8" width="31" height="5" fill="#3f2b1d"/>

          </g>
        `;

      return `

    function renderCastleLabel(project) {
      const stats = projectStats(project.id);
      const selected = project.id === state.selectedProjectId;
      return `
        <g class="castle-label" data-project-id="${project.id}" transform="translate(${project.posicion.x - 80} ${project.posicion.y + 85})">
          <rect class="castle-label-box" x="0" y="0" width="160" height="34" rx="9" fill="rgba(0,0,0,0.92)" stroke="${project.color}" stroke-width="${selected ? 4 : 2.5}"/>
          <text x="80" y="15" text-anchor="middle" fill="#f8f3e8" font-size="16" font-family="Cinzel, Georgia" font-weight="700">${escapeHtml(project.nombre.slice(0, 18))}</text>
          <text x="80" y="29" text-anchor="middle" fill="#d9c8ad" font-size="11" font-family="Inter, sans-serif">${stats.completed}/${stats.total} tareas · 🔨${stats.pending} obreros</text>
          <rect class="label-hit" x="0" y="0" width="160" height="34" fill="transparent"/>
        </g>

    function renderFullCelebration(project) {
      if (!project) return "";
      const pieces = Array.from({ length: 28 }, (_, index) => {
        const x = project.posicion.x - 120 + (index * 37) % 240;
        const y = project.posicion.y - 140 - (index % 5) * 16;
        const colors = ["#ef4444", "#60a5fa", "#fde047", "#10b981", "#f97316"];
        return `
          <rect x="${x}" y="${y}" width="6" height="10" rx="2" fill="${colors[index % colors.length]}">
            <animate attributeName="y" dur="${1.1 + (index % 6) * 0.14}s" repeatCount="1" values="${y};${project.posicion.y + 110}"/>
            <animate attributeName="opacity" dur="${1.1 + (index % 6) * 0.14}s" repeatCount="1" values="1;0"/>
          </rect>

      }).join("");
      return `<g class="full-celebration">${pieces}</g>`;

    function renderProjectPanel() {
      const project = getSelectedProject();
      if (!project) {
        return `
          <aside class="project-panel">
            <div class="empty-state">Crea un proyecto para organizar tus metas.</div>
          </aside>
        `;
      }
      const stats = projectStats(project.id);
      const tasks = sortedTasks(project.id);
      return `
        <aside class="project-panel">
          <div class="panel-section">
            <div class="panel-head">
              <div>
                <h2 class="panel-title">${escapeHtml(project.nombre)}</h2>
                <div class="muted">${stats.pending} pendientes · ${stats.completed}/${stats.total} completadas</div>
              </div>
              <button type="button" class="icon-btn" data-action="open-project" data-project-id="${project.id}" title="Editar proyecto">✎</button>
            </div>
            <div class="progress-wrap"><div class="progress-bar" style="width:${Math.round(stats.progress * 100)}%"></div></div>
          </div>
          <div class="panel-section">
            ${renderQuickAdd(project.id, null, "Nueva tarea para este proyecto")}
          </div>
          <div class="task-list">
            ${tasks.length ? tasks.map((task) => renderTaskRow(task, true)).join("") : `<div class="empty-state">Este proyecto aun no tiene tareas.</div>`}

    function renderListView() {
      const project = getSelectedProject();
      return `
        <section class="list-view">
          ${renderSidebar()}
          <div class="content">
            ${project ? renderProjectTasks(project) : `<div class="empty-state">Crea un proyecto para empezar a construir.</div>`}
          </div>
          ${renderTaskDetail()}
        </section>
      `;
    }

    function renderListView() {
      const project = getSelectedProject();
      const selectedTask = getSelectedTask();
      const showProject = Boolean(project && state.listProjectOpen);
      const showTaskDetail = Boolean(showProject && selectedTask && selectedTask.projectId === project.id);
      return `
        <section class="list-view ${showProject ? "has-project" : "no-project"} ${showTaskDetail ? "has-task" : "no-task"}">
          ${renderSidebar()}
          ${showProject ? `<div class="content">${renderProjectTasks(project)}</div>` : ""}
          ${showTaskDetail ? renderTaskDetail() : ""}
        </section>
      `;
    }

    function renderCalendarView() {
      const filters = state.calendarFilters || { projectId: "all", type: "all", tagId: "all" };
      const entries = calendarEntries().filter((entry) => calendarEntryMatches(entry, filters));
      const mode = state.calendarMode || "agenda";
      return `
        <section class="workspace-view">
          <div class="workspace-inner">
            <div class="workspace-head">
              <div>
                <h2>Calendario</h2>
                <p>Fechas limite de metas, tareas y subtareas, filtradas por proyecto y etiqueta.</p>
              </div>
              <div class="calendar-mode-toggle" aria-label="Modo de calendario">
                <button type="button" data-action="set-calendar-mode" data-mode="agenda" class="${mode === "agenda" ? "is-active" : ""}">Lista</button>
                <button type="button" data-action="set-calendar-mode" data-mode="week" class="${mode === "week" ? "is-active" : ""}">Calendario</button>
              </div>
            </div>
            <div class="filter-bar">
              <label>Proyecto
                <select name="projectId" data-action="calendar-filter">
                  <option value="all" ${filters.projectId === "all" ? "selected" : ""}>Todos</option>
                  ${sortedProjects().map((project) => `<option value="${project.id}" ${filters.projectId === project.id ? "selected" : ""}>${escapeHtml(project.nombre)}</option>`).join("")}
                </select>
              </label>
              <label>Tipo
                <select name="type" data-action="calendar-filter">
                  <option value="all" ${filters.type === "all" ? "selected" : ""}>Metas, tareas y subtareas</option>
                  <option value="goal" ${filters.type === "goal" ? "selected" : ""}>Solo metas</option>
                  <option value="task" ${filters.type === "task" ? "selected" : ""}>Solo tareas</option>
                  <option value="subtask" ${filters.type === "subtask" ? "selected" : ""}>Solo subtareas</option>
                </select>
              </label>
              <label>Etiqueta
                <select name="tagId" data-action="calendar-filter">
                  <option value="all" ${filters.tagId === "all" ? "selected" : ""}>Todas</option>
                  ${(state.tags || []).map((tag) => `<option value="${tag.id}" ${filters.tagId === tag.id ? "selected" : ""}>${escapeHtml(tag.nombre)}</option>`).join("")}
                </select>
              </label>
            </div>
            ${mode === "week" ? renderCalendarWeek(entries, filters) : renderCalendarAgenda(entries)}
          </div>
        </section>
      `;
    }

    function calendarProjectMeta(primaryId, secondaryId) {
      const primary = state.projects.find((project) => project.id === primaryId);
      const secondary = secondaryId ? state.projects.find((project) => project.id === secondaryId) : null;
      const projectIds = [primary?.id, secondary?.id].filter(Boolean);
      return {
        projectIds,
        projectName: secondary ? `${primary?.nombre || "Sin proyecto"} + ${secondary.nombre}` : primary?.nombre || "Sin proyecto",
        projectColor: primary?.color || "#8da2b5",
        secondaryProjectColor: secondary?.color || primary?.color || "#8da2b5"
      };
    }

    function calendarEntryColorStyle(entry) {
      return `--entry-accent:${entry.projectColor || "#8da2b5"}; --entry-accent-2:${entry.secondaryProjectColor || entry.projectColor || "#8da2b5"}`;
    }

    function isCalendarGoalPending(goal) {
      return Boolean(goal) && !isGoalComplete(goal);
    }

    function isCalendarTaskPending(task) {
      if (!task || task.completada) return false;
      const goal = state.sections.find((item) => item.id === task.sectionId);
      return !goal || isCalendarGoalPending(goal);
    }

    function isCalendarSubtaskPending(subtask) {
      if (!subtask || subtask.completada) return false;
      const task = state.tasks.find((item) => item.id === subtask.taskId);
      return Boolean(task) && isCalendarTaskPending(task);
    }

    function calendarEntries() {
      const goalEntries = state.sections
        .filter((goal) => goal.fechaVencimiento && isCalendarGoalPending(goal))
        .map((goal) => {
          const projectMeta = calendarProjectMeta(goal.projectId, goal.secondaryProjectId);
          return {
            type: "goal",
            id: goal.id,
            projectId: goal.projectId,
            secondaryProjectId: goal.secondaryProjectId || null,
            projectIds: projectMeta.projectIds,
            sectionId: goal.id,
            name: goal.nombre,
            date: goal.fechaVencimiento,
            priority: goalPriority(goal),
            tags: goal.tags || [],
            projectName: projectMeta.projectName,
            projectColor: projectMeta.projectColor,
            secondaryProjectColor: projectMeta.secondaryProjectColor,
            goalName: goal.nombre,
            complete: statsForGoal(goal.projectId, goal.id).pending === 0 && statsForGoal(goal.projectId, goal.id).total > 0
          };
        });
      const taskEntries = state.tasks
        .filter((task) => task.fechaVencimiento && isCalendarTaskPending(task))
        .map((task) => {
          const projectMeta = calendarProjectMeta(task.projectId, task.secondaryProjectId);
          const goal = state.sections.find((item) => item.id === task.sectionId);
          return {
            type: "task",
            id: task.id,
            projectId: task.projectId,
            secondaryProjectId: task.secondaryProjectId || null,
            projectIds: projectMeta.projectIds,
            sectionId: task.sectionId,
            name: task.nombre,
            date: task.fechaVencimiento,
            priority: task.prioridad,
            tags: task.tags || [],
            projectName: projectMeta.projectName,
            projectColor: projectMeta.projectColor,
            secondaryProjectColor: projectMeta.secondaryProjectColor,
            goalName: goal?.nombre || "Tareas por clasificar",
            complete: task.completada
          };
        });
      const subtaskEntries = (state.subtasks || [])
        .filter((subtask) => subtask.fechaVencimiento && isCalendarSubtaskPending(subtask))
        .map((subtask) => {
          const task = state.tasks.find((item) => item.id === subtask.taskId);
          if (!task) return null;
          const projectMeta = calendarProjectMeta(task.projectId, task.secondaryProjectId);
          const goal = state.sections.find((item) => item.id === task.sectionId);
          return {
            type: "subtask",
            id: subtask.id,
            projectId: task.projectId,
            secondaryProjectId: task.secondaryProjectId || null,
            projectIds: projectMeta.projectIds,
            sectionId: task.sectionId,
            taskId: task.id,
            name: subtask.nombre,
            date: subtask.fechaVencimiento,
            priority: subtask.prioridad,
            tags: subtask.tags || [],
            projectName: projectMeta.projectName,
            projectColor: projectMeta.projectColor,
            secondaryProjectColor: projectMeta.secondaryProjectColor,
            goalName: goal?.nombre || "Tareas por clasificar",
            taskName: task.nombre,
            complete: subtask.completada
          };
        })
        .filter(Boolean);
      return goalEntries.concat(taskEntries, subtaskEntries).sort((a, b) => a.date.localeCompare(b.date) || priorityRank(a.priority) - priorityRank(b.priority) || a.name.localeCompare(b.name));
    }

    function calendarEntryMatches(entry, filters) {
      if (filters.projectId !== "all" && !(entry.projectIds || [entry.projectId]).includes(filters.projectId)) return false;
      if (filters.type !== "all" && entry.type !== filters.type) return false;
      if (filters.tagId !== "all" && !(entry.tags || []).includes(filters.tagId)) return false;
      return true;
    }

    function groupCalendarEntries(entries) {
      const groups = new Map();
      entries.forEach((entry) => {
        const key = entry.date || "sin-fecha";
        if (!groups.has(key)) groups.set(key, []);
        groups.get(key).push(entry);
      });
      return Array.from(groups.entries());
    }

    function calendarAgendaDays(entries) {
      const start = calendarWeekStart(entries);
      return Array.from({ length: 7 }, (_, index) => addCalendarDays(start, index));
    }

    function renderCalendarAgenda(entries) {
      const byDate = new Map();
      entries.forEach((entry) => {
        if (!byDate.has(entry.date)) byDate.set(entry.date, []);
        byDate.get(entry.date).push(entry);
      });
      const days = calendarAgendaDays(entries);
      const dayModels = days.map((day) => {
        const key = calendarDateKey(day);
        return { key, items: byDate.get(key) || [] };
      });
      const minColumnWidths = dayModels.map((day) => day.items.length ? 320 : 118);
      const minGridWidth = minColumnWidths.reduce((total, width) => total + width, 0) + Math.max(0, dayModels.length - 1) * 8;
      const gridTemplate = dayModels
        .map((day) => day.items.length ? "minmax(320px, 2fr)" : "minmax(118px, .55fr)")
        .join(" ");
      return `
        <div class="calendar-grid is-week-list" style="grid-template-columns:${gridTemplate}; min-width:${minGridWidth}px">
          ${dayModels.map(({ key, items }) => {
            return `
              <article class="calendar-day ${items.length ? "" : "is-empty"}">
                <h3>${escapeHtml(formatCalendarGroup(key))}</h3>
                <div class="calendar-items">
                  ${items.length ? items.map(renderCalendarItem).join("") : `<div class="calendar-day-empty">No hay pendientes para este d&iacute;a.</div>`}
                </div>
              </article>
            `;
          }).join("")}
        </div>
      `;
    }

    function renderCalendarItem(entry) {
      const kindLabel = entry.type === "goal" ? "Meta" : entry.type === "subtask" ? "Subtarea" : "Tarea";
      const context = entry.type === "subtask"
        ? `${entry.projectName} - ${entry.goalName} - ${entry.taskName}`
        : `${entry.projectName} - ${entry.goalName}`;
      return `
        <button type="button" class="calendar-item ${entry.secondaryProjectId ? "has-gradient" : ""}" style="${calendarEntryColorStyle(entry)}" data-action="open-calendar-item" data-item-type="${entry.type}" data-item-id="${entry.id}">
          <span class="item-kind">${kindLabel}</span>
          <span>
            <strong>${escapeHtml(entry.name)}</strong>
            <small>${escapeHtml(context)}</small>
          </span>
          ${renderPriorityChip(entry.priority)}
        </button>
      `;
    }

    function renderCalendarWeek(entries, filters) {
      const weekStart = calendarWeekStart(entries);
      const days = Array.from({ length: 7 }, (_, index) => addCalendarDays(weekStart, index));
      const byDate = new Map();
      entries.forEach((entry) => {
        if (!byDate.has(entry.date)) byDate.set(entry.date, []);
        byDate.get(entry.date).push(entry);
      });
      const hours = Array.from({ length: 11 }, (_, index) => 6 + index);
      const undatedCount = calendarUndatedEntries().filter((entry) => calendarEntryMatches(entry, filters)).length;
      const monthLabel = new Intl.DateTimeFormat("es-CL", { month: "long", year: "numeric" }).format(weekStart);
      return `
        <section class="calendar-week" aria-label="Calendario semanal">
          <div class="calendar-week-top">
            <div>
              <h3>${escapeHtml(projectNameForCalendar(filters))}</h3>
              <small>${escapeHtml(monthLabel)}</small>
            </div>
            <div class="calendar-week-tools">
              <span>Hoy</span>
              <span>Sin fecha: ${undatedCount}</span>
            </div>
          </div>
          <div class="calendar-week-grid">
            <div class="week-corner"></div>
            ${days.map((day) => `<div class="week-day-head">${escapeHtml(formatWeekDay(day))}</div>`).join("")}
            <div class="week-all-day-label">Todo el dia</div>
            ${days.map((day) => {
              const key = calendarDateKey(day);
              const items = byDate.get(key) || [];
              return `<div class="week-all-day-cell">${items.map(renderWeekEvent).join("")}</div>`;
            }).join("")}
            ${hours.map((hour) => `
              <div class="week-hour-label">${formatCalendarHour(hour)}</div>
              ${days.map(() => `<div class="week-cell"></div>`).join("")}
            `).join("")}
          </div>
        </section>
      `;
    }

    function renderWeekEvent(entry) {
      const priorityClass = normalizePriority(entry.priority) ? `priority-${entry.priority}` : "";
      const icon = entry.type === "goal" ? "Meta" : entry.type === "subtask" ? "Subtarea" : "Tarea";
      return `
        <button type="button" class="week-event ${priorityClass} ${entry.secondaryProjectId ? "has-gradient" : ""}" style="${calendarEntryColorStyle(entry)}" data-action="open-calendar-item" data-item-type="${entry.type}" data-item-id="${entry.id}" title="${escapeHtml(entry.name)}">
          <span>${escapeHtml(icon)}: ${escapeHtml(entry.name)}</span>
        </button>
      `;
    }

    function calendarUndatedEntries() {
      const goalEntries = state.sections
        .filter((goal) => !goal.fechaVencimiento && isCalendarGoalPending(goal))
        .map((goal) => {
          const projectMeta = calendarProjectMeta(goal.projectId, goal.secondaryProjectId);
          return {
            type: "goal",
            id: goal.id,
            projectId: goal.projectId,
            secondaryProjectId: goal.secondaryProjectId || null,
            projectIds: projectMeta.projectIds,
            sectionId: goal.id,
            name: goal.nombre,
            date: "",
            priority: goalPriority(goal),
            tags: goal.tags || [],
            projectName: projectMeta.projectName,
            projectColor: projectMeta.projectColor,
            secondaryProjectColor: projectMeta.secondaryProjectColor,
            goalName: goal.nombre,
            complete: statsForGoal(goal.projectId, goal.id).pending === 0 && statsForGoal(goal.projectId, goal.id).total > 0
          };
        });
      const taskEntries = state.tasks
        .filter((task) => !task.fechaVencimiento && isCalendarTaskPending(task))
        .map((task) => {
          const projectMeta = calendarProjectMeta(task.projectId, task.secondaryProjectId);
          const goal = state.sections.find((item) => item.id === task.sectionId);
          return {
            type: "task",
            id: task.id,
            projectId: task.projectId,
            secondaryProjectId: task.secondaryProjectId || null,
            projectIds: projectMeta.projectIds,
            sectionId: task.sectionId,
            name: task.nombre,
            date: "",
            priority: task.prioridad,
            tags: task.tags || [],
            projectName: projectMeta.projectName,
            projectColor: projectMeta.projectColor,
            secondaryProjectColor: projectMeta.secondaryProjectColor,
            goalName: goal?.nombre || "Tareas por clasificar",
            complete: task.completada
          };
        });
      const subtaskEntries = (state.subtasks || [])
        .filter((subtask) => !subtask.fechaVencimiento && isCalendarSubtaskPending(subtask))
        .map((subtask) => {
          const task = state.tasks.find((item) => item.id === subtask.taskId);
          if (!task) return null;
          const projectMeta = calendarProjectMeta(task.projectId, task.secondaryProjectId);
          const goal = state.sections.find((item) => item.id === task.sectionId);
          return {
            type: "subtask",
            id: subtask.id,
            projectId: task.projectId,
            secondaryProjectId: task.secondaryProjectId || null,
            projectIds: projectMeta.projectIds,
            sectionId: task.sectionId,
            taskId: task.id,
            name: subtask.nombre,
            date: "",
            priority: subtask.prioridad,
            tags: subtask.tags || [],
            projectName: projectMeta.projectName,
            projectColor: projectMeta.projectColor,
            secondaryProjectColor: projectMeta.secondaryProjectColor,
            goalName: goal?.nombre || "Tareas por clasificar",
            taskName: task.nombre,
            complete: subtask.completada
          };
        })
        .filter(Boolean);
      return goalEntries.concat(taskEntries, subtaskEntries);
    }

    function projectNameForCalendar(filters) {
      if (filters.projectId && filters.projectId !== "all") {
        return state.projects.find((project) => project.id === filters.projectId)?.nombre || "Calendario";
      }
      return "Calendario";
    }

    function calendarWeekStart(entries) {
      const firstDate = entries.find((entry) => entry.date)?.date || new Date().toISOString().slice(0, 10);
      const date = parseCalendarDate(firstDate);
      const mondayOffset = (date.getDay() + 6) % 7;
      date.setDate(date.getDate() - mondayOffset);
      return date;
    }

    function parseCalendarDate(value) {
      return new Date(`${value}T12:00:00`);
    }

    function addCalendarDays(date, days) {
      const next = new Date(date);
      next.setDate(next.getDate() + days);
      return next;
    }

    function calendarDateKey(date) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const day = String(date.getDate()).padStart(2, "0");
      return `${year}-${month}-${day}`;
    }

    function formatWeekDay(date) {
      return new Intl.DateTimeFormat("es-CL", { weekday: "short", day: "2-digit" }).format(date);
    }

    function formatCalendarHour(hour) {
      if (hour === 12) return "12 PM";
      if (hour > 12) return `${hour - 12} PM`;
      return `${hour} AM`;
    }

    function formatCalendarGroup(dateKey) {
      if (!dateKey || dateKey === "sin-fecha") return "Sin fecha";
      const date = new Date(`${dateKey}T12:00:00`);
      return new Intl.DateTimeFormat("es-CL", { weekday: "short", day: "2-digit", month: "short", year: "numeric" }).format(date);
    }

    function openCalendarItem(button) {
      const type = button.dataset.itemType;
      const id = button.dataset.itemId;
      if (type === "goal") {
        const goal = state.sections.find((item) => item.id === id);
        if (!goal) return;
        setState({ view: "list", selectedProjectId: goal.projectId, selectedGoalId: goalKey(goal.projectId, goal.id), selectedTaskId: null, selectedSubtaskId: null, listProjectOpen: true });
        return;
      }
      if (type === "subtask") {
        const subtask = state.subtasks.find((item) => item.id === id);
        const task = subtask ? state.tasks.find((item) => item.id === subtask.taskId) : null;
        if (!task) return;
        setState({ view: "list", selectedProjectId: task.projectId, selectedGoalId: goalKey(task.projectId, task.sectionId), selectedTaskId: task.id, selectedSubtaskId: subtask.id, listProjectOpen: true });
        return;
      }
      const task = state.tasks.find((item) => item.id === id);
      if (!task) return;

    function bindEvents() {
      document.querySelectorAll("[data-action]:not(form)").forEach((element) => {
        element.addEventListener("click", handleActionClick);
      });
      document.querySelectorAll("form[data-action]").forEach((form) => {

      });
      document.querySelectorAll("[data-overview-dbl]").forEach((element) => {
