    function renderContinentLabels(projects) {
      return projects.map((project, index) => {
        const mapIndex = projectMapIndex(project.id);
        const coast = continentPathForProject(project, mapIndex);
        const bounds = pathBounds(coast);
        const x = (bounds.minX + bounds.maxX) / 2;
        const y = bounds.minY + Math.min(72, Math.max(44, (bounds.maxY - bounds.minY) * 0.18));
        const title = String(project.nombre || "");
        const box = clampMapBox(state.mapViewBox || { x: 0, y: 0, w: 900, h: 800 });
        const screenScale = clampNumber(box.w / 900, 0.42, 1.06);
        const labelScale = (title.length > 48 ? 0.74 : title.length > 32 ? 0.86 : 0.98) * screenScale;
        const labelLines = wrapSvgLines(title, title.length > 48 ? 19 : 23).slice(0, 2);
        const plateWidth = Math.min(286, Math.max(126, Math.max(...labelLines.map((line) => line.length)) * 10.4 + 40));
        const plateHeight = 34 + (labelLines.length - 1) * 18;
        return `
          <g class="continent-title-group" data-project-id="${project.id}">
            <rect x="${roundViewBox(x - plateWidth / 2 - 18)}" y="${roundViewBox(y - 28)}" width="${plateWidth + 36}" height="${plateHeight + 22}" rx="16" fill="transparent"/>
            <g transform="translate(${roundViewBox(x)} ${roundViewBox(y)}) scale(${roundViewBox(labelScale)})">
              <rect class="continent-title-plate" x="${-plateWidth / 2}" y="-24" width="${plateWidth}" height="${plateHeight}" rx="12"/>
              <rect x="${-plateWidth / 2 + 12}" y="${-23}" width="${plateWidth - 24}" height="2.4" rx="1.2" fill="${project.color}" opacity="0.46"/>
              ${labelLines.map((line, lineIndex) => `<text class="continent-title-text" x="0" y="${lineIndex * 18}" text-anchor="middle">${escapeHtml(line)}</text>`).join("")}

    function renderLandTexture(project, layout, index, clipId, coast) {
      const cx = layout.label.x;
      const cy = layout.label.y;
      const visualScale = layout.visualScale || 1;
      const palettes = [
        [
          { dx: -62, dy: 18, color: "#7f925e", opacity: 0.34, size: 1.1 },
          { dx: 58, dy: 56, color: "#c79c5a", opacity: 0.26, size: 0.9 },
          { dx: 10, dy: 108, color: "#a7b07b", opacity: 0.3, size: 0.8 }
        ],
        [
          { dx: -40, dy: 28, color: "#8d8666", opacity: 0.34, size: 0.9 },
          { dx: 42, dy: 54, color: "#6f875b", opacity: 0.26, size: 0.75 }
        ],
        [
          { dx: -72, dy: 40, color: "#7f925e", opacity: 0.3, size: 0.95 },
          { dx: 62, dy: 64, color: "#b99155", opacity: 0.28, size: 0.85 },
          { dx: 8, dy: 94, color: "#93a46c", opacity: 0.26, size: 0.8 }
        ],
        [
          { dx: -64, dy: 54, color: "#748d5b", opacity: 0.3, size: 0.9 },
          { dx: 58, dy: 70, color: "#b99155", opacity: 0.22, size: 0.9 },
          { dx: 0, dy: 118, color: "#7d9a70", opacity: 0.22, size: 0.75 }
        ],
        [
          { dx: -58, dy: 44, color: "#6f8b69", opacity: 0.3, size: 0.85 },
          { dx: 42, dy: 74, color: "#bba15e", opacity: 0.24, size: 0.9 }
        ],
        [
          { dx: -64, dy: 64, color: "#b78e50", opacity: 0.28, size: 1.0 },
          { dx: 54, dy: 78, color: "#748d5b", opacity: 0.25, size: 0.8 }
        ],
        [
          { dx: -46, dy: 54, color: "#708a5b", opacity: 0.3, size: 0.8 },
          { dx: 42, dy: 74, color: "#b99b5b", opacity: 0.24, size: 0.8 }
        ]
      ][index % 7];
      return `
        <g clip-path="url(#${clipId})">
          ${palettes.map((patch) => renderTerrainPatch(
            cx + patch.dx * visualScale,
            cy + patch.dy * visualScale,
            patch.color,
            patch.opacity,
            patch.size * visualScale
          )).join("")}
          ${renderCartographicTexture(coast, index)}
          ${renderExpansionTerrain(project, index)}
          ${renderMicroTerrain(cx, cy, index, visualScale)}
        </g>
      `;
    }

    function renderExpansionTerrain(project, index) {
      const anchors = expandedGoalPositions(project, index);
      if (!anchors.length) return "";
      return anchors.map((pos, anchorIndex) => {
        const terrain = anchorIndex % 3 === 0 ? "#8fa36c" : anchorIndex % 3 === 1 ? "#b99255" : "#789068";
        const markType = anchorIndex % 3 === 0 ? "forest" : anchorIndex % 3 === 1 ? "tree" : "mountain";
        const dx = (seededValue(index * 177 + anchorIndex * 31) - 0.5) * 34;
        const dy = 38 + (seededValue(index * 211 + anchorIndex * 43) - 0.5) * 28;
        return `
          <g opacity="0.78">
            ${renderTerrainPatch(pos.x + dx, pos.y + dy, terrain, 0.26, 0.72)}
            <path d="M${pos.x - 44} ${pos.y + 28} C${pos.x - 18} ${pos.y + 10} ${pos.x + 16} ${pos.y + 45} ${pos.x + 50} ${pos.y + 24}" fill="none" stroke="#8a7a58" stroke-width="1.1" opacity="0.22" stroke-linecap="round"/>
            ${renderMapMark(markType, pos.x + dx * 0.45, pos.y + dy * 0.75)}
          </g>
        `;
      }).join("");
    }

    function renderTerrainPatch(cx, cy, color, opacity, size) {
      const pts = [
        [-46, -24], [-12, -36], [28, -26], [48, 2], [30, 28], [-8, 36], [-40, 18]
      ].map(([x, y]) => [cx + x * size, cy + y * size]);
      return `<path d="M${pts.map(([x, y]) => `${x} ${y}`).join(" L")} Z" fill="${color}" opacity="${opacity}"/>`;
    }

    function renderMicroTerrain(cx, cy, index, visualScale = 1) {
      const marks = Array.from({ length: 18 }, (_, i) => {
        const angle = (i * 137 + index * 29) * Math.PI / 180;
        const radiusX = (38 + (i % 4) * 19) * visualScale;
        const radiusY = (28 + (i % 5) * 16) * visualScale;
        const x = cx + Math.cos(angle) * radiusX;
        const y = cy + 44 * visualScale + Math.sin(angle) * radiusY;
        const color = i % 3 === 0 ? "#6f7f4f" : i % 3 === 1 ? "#9b7f4c" : "#8d7c61";
        const markScale = Math.max(0.55, visualScale);
        if (i % 3 === 2) {
          return `<path d="M${x - 8 * markScale} ${y + 2 * markScale} C${x - 2 * markScale} ${y - 5 * markScale} ${x + 3 * markScale} ${y - 5 * markScale} ${x + 9 * markScale} ${y + 1 * markScale}" fill="none" stroke="${color}" stroke-width="${1.2 * markScale}" opacity="0.24" stroke-linecap="round"/>`;
        }
        return `<g opacity="0.3" transform="translate(${x} ${y}) scale(${markScale})"><path d="M-4 2 C-8 -4 -1 -9 3 -4 C7 -5 7 2 1 3 Z" fill="${color}"/><path d="M0 2 L0 8" stroke="#6b5635" stroke-width="0.8"/></g>`;
      }).join("");
      return `<g>${marks}</g>`;
    }

    function seededValue(seed) {
      const raw = Math.sin(seed * 12.9898) * 43758.5453;
      return raw - Math.floor(raw);
    }

    function renderCartographicTexture(coast, index) {
      const bounds = pathBounds(coast);
      const width = bounds.maxX - bounds.minX;
      const height = bounds.maxY - bounds.minY;
      const seed = (index + 1) * 113;
      const ridges = Array.from({ length: 11 }, (_, i) => {
        const x = bounds.minX + width * (0.16 + seededValue(seed + i * 19) * 0.68);
        const y = bounds.minY + height * (0.16 + seededValue(seed + i * 23) * 0.66);
        const s = 0.55 + seededValue(seed + i * 29) * 0.55;
        return `<g transform="translate(${x} ${y}) scale(${s})" opacity="0.28"><path d="M-16 9 C-11 1 -8 -9 -2 -14 C4 -8 7 0 13 9 Z" fill="#827759"/><path d="M-2 -14 C4 -8 7 0 13 9 H0 C2 2 0 -5 -2 -14 Z" fill="#5f5744" opacity="0.38"/><path d="M-7 -4 C-5 -9 -3 -12 -2 -14 C1 -10 3 -6 5 -3 C1 -5 -2 -4 -7 -4 Z" fill="#eadfc4" opacity="0.66"/><path d="M-16 10 C-8 13 3 12 14 9" fill="none" stroke="#62523b" stroke-width="1" opacity="0.42"/></g>`;
      }).join("");
      const woods = Array.from({ length: 24 }, (_, i) => {
        const x = bounds.minX + width * (0.08 + seededValue(seed + i * 31) * 0.84);
        const y = bounds.minY + height * (0.1 + seededValue(seed + i * 37) * 0.78);
        const tone = i % 3 === 0 ? "#556c43" : i % 3 === 1 ? "#6f8150" : "#435a3c";
        return `<g opacity="0.34"><path d="M${x - 4} ${y + 2} C${x - 8} ${y - 4} ${x - 2} ${y - 9} ${x + 2} ${y - 5} C${x + 7} ${y - 7} ${x + 8} ${y} ${x + 3} ${y + 3} Z" fill="${tone}"/><path d="M${x} ${y + 1} L${x} ${y + 7}" stroke="#6b5635" stroke-width="0.9"/></g>`;
      }).join("");
      const lakeX = bounds.minX + width * (0.32 + seededValue(seed + 3) * 0.34);
      const lakeY = bounds.minY + height * (0.34 + seededValue(seed + 5) * 0.32);
      const lakeW = 11 + seededValue(seed + 9) * 10;
      const lakeH = 5 + seededValue(seed + 15) * 7;
      const lake = `<path d="M${lakeX - lakeW} ${lakeY} C${lakeX - lakeW * 0.5} ${lakeY - lakeH} ${lakeX + lakeW * 0.2} ${lakeY - lakeH * 0.8} ${lakeX + lakeW} ${lakeY - lakeH * 0.15} C${lakeX + lakeW * 0.5} ${lakeY + lakeH} ${lakeX - lakeW * 0.35} ${lakeY + lakeH * 0.8} ${lakeX - lakeW} ${lakeY} Z" fill="#5e93a0" opacity="0.25" stroke="#d7eadf" stroke-width="0.7" stroke-opacity="0.34"/>`;
      return `
        <g>
          ${lake}
          ${ridges}
          ${woods}
        </g>
      `;
    }

    function renderContinentMarks(layout, index) {
      const visualScale = Math.max(0.54, layout.visualScale || 1);
      const marks = [
        [
          ["forest", -56, 40], ["mountain", 54, 14], ["ruin", -18, 82], ["tree", 24, 72]
        ],
        [
          ["mountain", -42, 26], ["forest", 26, 24], ["tower", 2, 62]
        ],
        [
          ["forest", -62, 48], ["mountain", 42, 30], ["tree", 88, 74], ["ruin", 8, 92]
        ],
        [
          ["forest", -64, 42], ["tower", 20, 54], ["mountain", 78, 38], ["tree", -10, 96]
        ],
        [
          ["tree", -52, 40], ["forest", 32, 46], ["ruin", 4, 84]
        ],
        [
          ["mountain", -54, 50], ["forest", 42, 54], ["tree", 12, 102]
        ],
        [
          ["forest", -42, 44], ["tower", 28, 54], ["tree", 6, 86]
        ]
      ][index % 7];
      return marks

    }

    function renderMapMark(type, x, y) {
      if (type === "mountain") {
        return `<g transform="translate(${x} ${y})" opacity="0.68">
          <path d="M-26 17 C-20 4 -15 -9 -7 -19 C0 -7 5 6 12 17 Z" fill="#9d8b66" stroke="#6b5635" stroke-width="1"/>
          <path d="M-4 17 C2 2 8 -13 18 -25 C25 -9 32 5 38 17 Z" fill="#8c7d5b" stroke="#6b5635" stroke-width="1"/>
          <path d="M18 -25 C25 -9 32 5 38 17 H18 C22 5 20 -9 18 -25 Z" fill="#62583f" opacity="0.28"/>
          <path d="M-13 -7 C-10 -14 -8 -18 -7 -19 C-3 -13 0 -7 2 -1 C-3 -4 -8 -3 -13 -7 Z" fill="#eee4c9" opacity="0.78"/>
          <path d="M11 -9 C14 -18 17 -23 18 -25 C22 -17 25 -10 28 -4 C22 -8 17 -6 11 -9 Z" fill="#eee4c9" opacity="0.76"/>
          <path d="M-28 18 C-10 22 12 21 40 17" fill="none" stroke="#5d4a2f" stroke-width="1.1" opacity="0.38"/>
        </g>`;
      }
      if (type === "forest") {
        return `<g transform="translate(${x} ${y})" opacity="0.68">
          <ellipse cx="-12" cy="1" rx="8" ry="14" fill="#6b7d4e"/>
          <ellipse cx="2" cy="-4" rx="10" ry="17" fill="#526a43"/>
          <ellipse cx="15" cy="3" rx="8" ry="13" fill="#738553"/>
          <path d="M-12 12 V22 M2 11 V24 M15 13 V22" stroke="#6b5635" stroke-width="2" stroke-linecap="round"/>
          <path d="M-22 24 C-8 28 7 27 24 23" stroke="#5d4a2f" stroke-width="1.3" opacity="0.38"/>
        </g>`;
      }
      if (type === "tower") {
        return `<g transform="translate(${x} ${y})" opacity="0.72"><rect x="-7" y="-18" width="14" height="28" fill="#a88e61" stroke="#6b5635" stroke-width="1.2"/><path d="M-11 -18 H11 L7 -28 H-7 Z" fill="#7f704f"/><path d="M-3 -2 V10 H3 V-2 Z" fill="#5b4630"/></g>`;
      }
      return `<g transform="translate(${x} ${y})" opacity="0.68"><path d="M0 -18 C-14 -10 -16 3 -8 8 C-3 13 8 12 12 5 C18 -4 12 -14 0 -18 Z" fill="#71804f"/><path d="M-7 -3 C0 -8 7 -6 12 2" fill="none" stroke="#8c9a63" stroke-width="1" opacity="0.6"/><rect x="-2" y="6" width="4" height="13" fill="#6b5635"/></g>`;
    }

    function renderCastle(project, goal, index) {
      const stats = statsForGoal(project.id, goal.id);
      const pos = goalPosition(goal, project, index);

      return `
        <g class="castle-node" data-project-id="${project.id}" data-section-id="${goal.id || ""}" data-goal-key="${goalKey(project.id, goal.id)}" transform="translate(${pos.x} ${pos.y}) scale(${cityScale})">

    function renderGoalHoverPopup(project, goal, stats, x, y, scale = 1, options = {}) {
      const maxTasks = options.maxTasks || 3;
      const width = options.width || 250;
      const lineHeight = 15;
      const taskLines = goalPopupTaskLines(project.id, goal.id, maxTasks, 45);
      const height = 50 + taskLines.length * lineHeight;
      return `
        <g class="map-hover-popup" transform="translate(${x} ${y}) scale(${scale})">
          <rect width="${width}" height="${height}" rx="7" fill="rgba(242,230,199,0.97)" stroke="${project.color}" stroke-width="1.15"/>

      `;

    function cityScaleForGoal(stats) {
      const taskCount = Math.max(0, Number(stats?.total) || 0);
      const box = clampMapBox(state.mapViewBox || { x: 0, y: 0, w: 900, h: 800 });
      const overviewFactor = box.w > 650 ? 0.68 : box.w > 460 ? 0.82 : 1;
      return (0.24 + Math.min(taskCount, 20) * 0.0035) * overviewFactor;
    }

    function renderGoalSequencePaths(projects) {
      const box = clampMapBox(state.mapViewBox || { x: 0, y: 0, w: 900, h: 800 });
      const showNearbyProjects = box.w <= 430;
      return projects.map((project) => {
        if (!showNearbyProjects && project.id !== state.selectedProjectId) return "";
        const goals = goalsForProject(project.id);
        if (goals.length < 2) return "";
        const projectGoals = goals.map((goal, index) => ({
          goal,
          index,
          pos: goalPosition(goal, project, index),
          stats: statsForGoal(project.id, goal.id)
        }));
        const goalById = new Map(projectGoals.map((item) => [item.goal.id, item]));
        const seenPairs = new Set();
        const linkedPairs = projectGoals.flatMap((item) => {
          const links = Array.isArray(item.goal.linkedGoalIds) ? item.goal.linkedGoalIds : [];
          return links
            .filter((linkedId) => goalById.has(linkedId) && linkedId !== item.goal.id)
            .map((linkedId) => {
              const pairKey = [item.goal.id, linkedId].sort().join("::");
              if (seenPairs.has(pairKey)) return null;
              seenPairs.add(pairKey);
              return { item, next: goalById.get(linkedId), pairKey };
            })
            .filter(Boolean);
        });
        if (!linkedPairs.length) return "";
        const segments = linkedPairs.map(({ item, next }, index) => {
          const dx = next.pos.x - item.pos.x;
          const dy = next.pos.y - item.pos.y;
          const length = Math.hypot(dx, dy) || 1;
          const startTrim = 34 * cityScaleForGoal(item.stats);
          const endTrim = 34 * cityScaleForGoal(next.stats);
          const start = {
            x: item.pos.x + dx / length * startTrim,
            y: item.pos.y + dy / length * startTrim
          };
          const end = {
            x: next.pos.x - dx / length * endTrim,
            y: next.pos.y - dy / length * endTrim
          };
          const midX = (start.x + end.x) / 2;
          const midY = (start.y + end.y) / 2;
          const bend = (index % 2 === 0 ? 1 : -1) * Math.min(24, length * 0.14);
          const cx = midX - dy / length * bend;
          const cy = midY + dx / length * bend;
          const d = `M${start.x.toFixed(1)} ${start.y.toFixed(1)} Q${cx.toFixed(1)} ${cy.toFixed(1)} ${end.x.toFixed(1)} ${end.y.toFixed(1)}`;
          const completed = item.stats.progress >= 1 && next.stats.progress >= 1;
          const active = item.stats.progress > 0 || next.stats.progress > 0;
          const accent = completed ? "#5ba878" : active ? "#c5a46d" : "#8a7a58";
          return `
            <path d="${d}" fill="none" stroke="rgba(54,43,29,0.34)" stroke-width="7" stroke-linecap="round"/>
            <path d="${d}" fill="none" stroke="#eadfc4" stroke-width="4.6" stroke-linecap="round" opacity="0.58"/>
            <path d="${d}" fill="none" stroke="${accent}" stroke-width="2.1" stroke-linecap="round" stroke-dasharray="${completed ? "" : active ? "8 7" : "3 8"}" opacity="${completed ? 0.82 : active ? 0.74 : 0.58}"/>
          `;
        }).join("");
        return `<g class="goal-sequence-path" data-project-id="${project.id}" pointer-events="none">${segments}</g>`;
      }).join("");
    }

    function renderCityWall(project, progress) {
      const built = Math.max(0.18, progress);
      return `
        <g opacity="${0.14 + built * 0.1}">
          <path d="M-44 39 C-18 30 20 30 47 39" fill="none" stroke="#d7c99f" stroke-width="0.75" opacity="0.3" stroke-linecap="round"/>
          <path d="M-35 48 C-10 53 18 52 39 47" fill="none" stroke="#7f704f" stroke-width="0.65" opacity="0.16" stroke-linecap="round"/>
        </g>
      `;
    }

    function renderProjectWorkers(project, goal, index) {
      const tasks = sortedTasks(project.id, goal.id);
      const pos = goalPosition(goal, project, index);
      const cityScale = cityScaleForGoal(statsForGoal(project.id, goal.id));
      const layout = taskPlotLayoutForGoal(project, goal, index, tasks.length, cityScale);
      const constructions = tasks
        .map((task, taskIndex) => ({ task, taskIndex, plot: layout[taskIndex] }))
        .sort((a, b) => (a.plot.dy - b.plot.dy) || (a.plot.dx - b.plot.dx))
        .map(({ task, taskIndex, plot }) => renderTaskConstruction(task, pos, plot, taskIndex, cityScale))
        .join("");
      return constructions;
    }

    function taskPlotPoint(cityPos, taskIndex, cityScale, layout = null) {
      const plot = Array.isArray(layout)
        ? layout[taskIndex] || taskPlotLayout(taskIndex + 1)[taskIndex]
        : taskPlotLayout(Math.max(taskIndex + 1, Number(layout) || 0))[taskIndex];
      return {
        x: cityPos.x + plot.dx * cityScale,
        y: cityPos.y + plot.dy * cityScale,
        scale: plot.scale * cityScale
      };
    }

    function renderTaskSequencePath(tasks, cityPos, cityScale, layout = taskPlotLayout(tasks.length)) {
      return "";
      if (tasks.length < 2) return "";
      const ringCount = tasks.length > 14 ? 3 : tasks.length > 7 ? 2 : 1;
      const rings = Array.from({ length: ringCount }, (_, ring) => {
        const rx = (104 + ring * 58) * cityScale;
        const ry = (58 + ring * 34) * cityScale;
        const cy = cityPos.y + (28 + ring * 7) * cityScale;
        return `
          <ellipse cx="${cityPos.x.toFixed(1)}" cy="${cy.toFixed(1)}" rx="${rx.toFixed(1)}" ry="${ry.toFixed(1)}" fill="none" stroke="rgba(54,43,29,0.22)" stroke-width="${(3.2 - ring * 0.35).toFixed(1)}"/>
          <ellipse cx="${cityPos.x.toFixed(1)}" cy="${cy.toFixed(1)}" rx="${rx.toFixed(1)}" ry="${ry.toFixed(1)}" fill="none" stroke="#eadfc4" stroke-width="${(1.25 - ring * 0.1).toFixed(1)}" opacity="0.34"/>
        `;
      }).join("");
      const lanes = tasks.slice(0, Math.min(tasks.length, 18)).map((task, index) => {
        const plot = layout[index];
        const point = taskPlotPoint(cityPos, index, cityScale, layout);
        const length = Math.hypot(plot.dx, plot.dy - 28) || 1;
        const inner = {
          x: cityPos.x + (plot.dx / length) * 96 * cityScale,
          y: cityPos.y + 28 * cityScale + ((plot.dy - 28) / length) * 56 * cityScale
        };
        const complete = task.completada;
        const stroke = complete ? "#5ba878" : "#8a7a58";
        return `<path d="M${inner.x.toFixed(1)} ${inner.y.toFixed(1)} Q${((inner.x + point.x) / 2).toFixed(1)} ${(inner.y + point.y + 8 * cityScale).toFixed(1)} ${point.x.toFixed(1)} ${point.y.toFixed(1)}" fill="none" stroke="${stroke}" stroke-width="1.2" stroke-linecap="round" stroke-dasharray="${complete ? "" : "4 5"}" opacity="${complete ? 0.5 : 0.26}"/>`;
      }).join("");
      const segments = `${rings}${lanes}`;
      return `<g class="task-sequence-path" pointer-events="none">${segments}</g>`;
    }

    function renderTaskConstruction(task, cityPos, plot, index, cityScale) {
      const point = {
        x: cityPos.x + plot.dx * cityScale,
        y: cityPos.y + plot.dy * cityScale,
        scale: plot.scale * cityScale
      };
      const x = point.x;
      const y = point.y;
      const pop = task.id === state.recentlyCompletedTaskId ? "worker-pop" : "";
      const complete = task.completada;
      return `
        <g class="task-construction ${pop}" data-task-id="${task.id}" transform="translate(${x} ${y}) scale(${point.scale})">
          <title>${escapeHtml(task.nombre)}</title>
          ${renderTaskHouse(task, index)}
          ${renderSubtaskGarden(task)}
          ${renderPriorityCrew(task, complete, index)}
        </g>
      `;
    }

    function renderSubtaskGarden(task) {
      const subtasks = sortedSubtasks(task.id).slice(0, 8);
      if (!subtasks.length) return "";
      const positions = [
        { x: -35, y: 31 }, { x: -21, y: 38 }, { x: -7, y: 34 }, { x: 8, y: 38 },
        { x: 23, y: 31 }, { x: 36, y: 23 }, { x: -38, y: 18 }, { x: 38, y: 12 }
      ];
      return `
        <g class="subtask-garden" aria-label="Subtareas">
          ${subtasks.map((subtask, index) => {
            const pos = positions[index % positions.length];
            const color = subtask.completada ? "#5ba878" : priorityAccent[normalizePriority(subtask.prioridad)] || "#9a7f52";
            const bloom = subtask.completada
              ? `<circle cx="${pos.x}" cy="${pos.y - 8}" r="3.2" fill="#f2d184"/><circle cx="${pos.x - 3}" cy="${pos.y - 7}" r="2.2" fill="${color}"/><circle cx="${pos.x + 3}" cy="${pos.y - 7}" r="2.2" fill="${color}"/>`
              : `<path d="M${pos.x} ${pos.y - 1} C${pos.x - 2} ${pos.y - 7} ${pos.x - 7} ${pos.y - 8} ${pos.x - 6} ${pos.y - 3} M${pos.x} ${pos.y - 1} C${pos.x + 2} ${pos.y - 8} ${pos.x + 7} ${pos.y - 8} ${pos.x + 6} ${pos.y - 3}" fill="none" stroke="${color}" stroke-width="1.4" stroke-linecap="round"/>`;
            return `
              <g opacity="${subtask.completada ? 0.95 : 0.76}">
                <ellipse cx="${pos.x}" cy="${pos.y}" rx="8" ry="3.6" fill="#6b5635" opacity="0.34"/>
                <path d="M${pos.x} ${pos.y} L${pos.x} ${pos.y - 10}" stroke="#557046" stroke-width="1.5" stroke-linecap="round"/>
                ${bloom}
              </g>
            `;
          }).join("")}
          ${sortedSubtasks(task.id).length > subtasks.length ? `<text x="0" y="48" text-anchor="middle" fill="#4f4632" font-size="8" font-weight="800">+${sortedSubtasks(task.id).length - subtasks.length}</text>` : ""}
        </g>
      `;
    }

    function renderTaskHoverPopup(task, x, y, scale = 1, options = {}) {
      const goal = state.sections.find((item) => item.id === task.sectionId);
      const project = state.projects.find((item) => item.id === task.projectId);
      const width = options.width || 330;
      const lines = taskPopupLines(task, goal, width, { titleChars: 34, metaChars: 38 });
      const height = taskPopupHeight(lines);
      const accent = project?.color || priorityAccent[normalizePriority(task.prioridad)] || neutralBuildColor;
      return `
        <g class="map-hover-popup" transform="translate(${x} ${y}) scale(${scale})">
          <rect width="${width}" height="${height}" rx="7" fill="rgba(242,230,199,0.97)" stroke="${accent}" stroke-width="1.15"/>
          <rect width="5" height="${height}" rx="2.5" fill="${accent}" opacity="0.82"/>
          ${lines.title.map((line, lineIndex) => `<text x="18" y="${23 + lineIndex * 16}" fill="#2f281e" font-size="13.6" font-weight="760">${escapeHtml(line)}</text>`).join("")}
          ${lines.meta.map((line, lineIndex) => `<text x="18" y="${42 + lines.title.length * 16 + lineIndex * 13}" fill="#5f5746" font-size="10.8">${escapeHtml(line)}</text>`).join("")}

    function renderTaskHouse(task, index) {
      const complete = task.completada;
      const roof = complete ? "#5ba878" : priorityAccent[normalizePriority(task.prioridad)] || neutralBuildColor;
      const wall = complete ? "#d9cba3" : "#cbb783";

          <path d="M-19 -8 V17 M20 -9 V17"/>

      `;
      const sparkle = complete ? `<path d="M18 -28 L21 -20 L29 -18 L22 -14 L20 -6 L16 -14 L8 -17 L16 -21 Z" fill="#f1d58a" opacity="0.72"/>` : "";

        <g>
          <ellipse cx="0" cy="20" rx="22" ry="5.2" fill="rgba(45,34,20,0.13)"/>

          <rect x="-15" y="9" width="7" height="7" rx="1" fill="#8fb0bd" opacity="0.72"/>

    }

    function renderPriorityCrew(task, complete, index) {
      const priority = normalizePriority(task.prioridad);
      if (!priority) return "";
      const count = priorityCrewSize[priority] || 1;
      const offsets = [
        { dx: -18, dy: 26, mirror: false, type: "hammer" },
        { dx: 18, dy: 26, mirror: true, type: "hammer" },
        { dx: -4, dy: 31, mirror: false, type: "saw" },
        { dx: 5, dy: 20, mirror: true, type: "hammer" }
      ];
      return Array.from({ length: count }, (_, crewIndex) => {
        const offset = offsets[crewIndex];
        const mirror = offset.mirror ? " scale(-1 1)" : "";
        return `
          <g transform="translate(${offset.dx} ${offset.dy}) scale(0.28)${mirror}">
            ${renderWorkerShape(complete, offset.type || (crewIndex % 2 ? "saw" : "hammer"), priority, task.id === state.recentlyCompletedTaskId && crewIndex === 0)}
          </g>

      }).join("");
    }

    function renderWorker(task, castlePos, pos, complete, index) {
      const priority = normalizePriority(task.prioridad) || "p4";
      const scale = workerScale[priority] || workerScale.p4;
      const x = castlePos.x + pos.dx;
      const y = castlePos.y + pos.dy;
      const mirror = pos.mirror ? " scale(-1 1)" : "";
      const pop = task.id === state.recentlyCompletedTaskId ? "worker-pop" : "";
      return `
        <g class="${pop}" data-task-id="${task.id}" transform="translate(${x} ${y}) scale(${scale})${mirror}">
          ${renderWorkerShape(complete, pos.type || (index % 2 ? "saw" : "hammer"), priority, task.id === state.recentlyCompletedTaskId)}

    function renderWorkerShape(complete, type, priority, highlighted) {

        : `<g transform="translate(12 -9)"><animateTransform attributeName="transform" type="rotate" dur="1.1s" repeatCount="indefinite" values="-42 0 0;22 0 0;-42 0 0"/><path d="M0 0 L12 -17" stroke="#73502e" stroke-width="3"/><rect x="7" y="-24" width="17" height="8" rx="2" fill="#6c7780"/></g>`;
      return `
        <g>
          ${complete ? `<animateTransform attributeName="transform" type="translate" dur="0.85s" repeatCount="indefinite" values="0 -2;0 1;0 -2"/>` : ""}
          <ellipse cx="0" cy="19" rx="12" ry="4" fill="rgba(0,0,0,0.34)"/>
          ${type === "saw" && !complete ? `<path d="M-18 17 H30" stroke="#8a5d37" stroke-width="5" stroke-linecap="round"/>` : ""}
          <path d="M-5 6 L-7 18 M7 6 L9 18" stroke="#3d2d22" stroke-width="4" stroke-linecap="round"/>
          <path d="M-10 20 H-1 M5 20 H14" stroke="#10151b" stroke-width="4" stroke-linecap="round"/>
          <rect x="-10" y="-8" width="22" height="22" rx="6" fill="${suit}"/>
          <path d="M-9 -5 L-16 8 M11 -5 L18 8" stroke="#d8b47a" stroke-width="4" stroke-linecap="round"/>
          ${complete ? `<path d="M-14 -4 L-23 -18 M16 -4 L25 -18" stroke="#d8b47a" stroke-width="4" stroke-linecap="round"/>` : tool}
          <circle cx="1" cy="-19" r="10" fill="#d8b47a"/>
          <path d="M-8 -24 Q1 -35 11 -24 Z" fill="${accent}"/>
          <rect x="-10" y="-26" width="23" height="5" rx="3" fill="#5a4630"/>
          <path d="M-3 -17 H5" stroke="#17202a" stroke-width="1.8" stroke-linecap="round"/>
          <rect x="-8" y="4" width="22" height="4" fill="#2e2520"/>
          ${complete ? renderConfetti() : ""}
          ${highlighted ? renderConfetti() : ""}
        </g>
      `;
    }

    function renderCastleLabel(project, goal, index) {
      const selected = goalKey(project.id, goal.id) === state.mapGoalPopupId;
      if (!selected) return "";
      const stats = statsForGoal(project.id, goal.id);
      const pos = goalPosition(goal, project, index);
      const taskLines = goalPopupTaskLines(project.id, goal.id, 5, 48);
      const width = 330;
      const lineHeight = 13;
      const height = 49 + taskLines.length * lineHeight;
      const popup = mapPopupPlacement(pos.x, pos.y, width, height, { offsetX: 34, offsetY: 50 });
      return `
        <g class="castle-label castle-detail-popup is-selected is-open" data-project-id="${project.id}" data-section-id="${goal.id || ""}" data-goal-key="${goalKey(project.id, goal.id)}" transform="translate(${popup.x} ${popup.y}) scale(${popup.scale})">
          <rect class="castle-label-box" x="0" y="0" width="${width}" height="${height}" rx="8" fill="rgba(242,230,199,0.98)" stroke="${project.color}" stroke-width="1.2"/>
          <rect width="6" height="${height}" rx="3" fill="${project.color}" opacity="0.82"/>
          <g class="map-popup-close" data-action="close-goal-popup" data-project-id="${project.id}" data-section-id="${goal.id || ""}" transform="translate(${width - 28} 8)">
            <rect width="20" height="20" rx="5" fill="rgba(47,40,30,0.14)" stroke="rgba(47,40,30,0.28)"/>
            <text x="10" y="10" dominant-baseline="middle" text-anchor="middle" fill="#3a2f22" font-size="10.5" font-weight="800">x</text>
          </g>
          <text x="16" y="20" fill="#2f281e" font-size="11.2" font-weight="800">${stats.completed}/${stats.total} tareas logradas</text>
          <text x="16" y="35" fill="#6d4f25" font-size="9.6" font-weight="800">Tareas asociadas</text>
          ${taskLines.map((line, lineIndex) => `<text x="16" y="${50 + lineIndex * lineHeight}" fill="#332b20" font-size="9">${escapeHtml(line)}</text>`).join("")}
        </g>
      `;
    }

    function splitLongSvgWord(word, maxChars) {
      if (word.length <= maxChars) return [word];
      const hyphenParts = word.split(/(-|–|—)/).filter(Boolean);
      if (hyphenParts.length > 1) {
        const chunks = [];
        let current = "";
        hyphenParts.forEach((part) => {
          const next = `${current}${part}`;
          if (current && next.length > maxChars) {
            chunks.push(current);
            current = part.replace(/^[-–—]/, "");
          } else {
            current = next;
          }
        });
        if (current) chunks.push(current);
        return chunks.flatMap((chunk) => splitLongSvgWord(chunk, maxChars));
      }
      const chunks = [];
      for (let index = 0; index < word.length; index += maxChars) {
        chunks.push(word.slice(index, index + maxChars));
      }
      return chunks;
    }

    function wrapSvgLines(text, maxChars = 34) {
      const words = String(text || "").trim().split(/\s+/).filter(Boolean);
      const lines = [];
      words.flatMap((word) => splitLongSvgWord(word, maxChars)).forEach((word) => {
        const last = lines[lines.length - 1] || "";
        if (!last || `${last} ${word}`.length > maxChars) lines.push(word);
        else lines[lines.length - 1] = `${last} ${word}`;
      });
      return lines.length ? lines : ["Sin nombre"];
    }

    function goalPopupTaskLines(projectId, goalId, maxTasks = 3, maxChars = 45) {
      const tasks = pendingTasksForPopup(projectId, goalId);
      const shownTasks = tasks.slice(0, maxTasks);
      const rawLines = shownTasks.length
        ? shownTasks.map((task) => [task.fechaVencimiento ? formatDate(task.fechaVencimiento) : "", priorityLabel(task.prioridad), task.nombre].filter(Boolean).join(" - "))
        : ["Sin tareas asociadas"];
      if (tasks.length > shownTasks.length) rawLines.push(`+ ${tasks.length - shownTasks.length} mas`);
      return rawLines.flatMap((line) => wrapSvgLines(line, maxChars));
    }

    function taskPopupLines(task, goal, width = 330, options = {}) {
      const metaText = [task.fechaVencimiento ? formatDate(task.fechaVencimiento) : "", priorityLabel(task.prioridad)].filter(Boolean).join(" - ");
      const titleChars = options.titleChars || Math.max(28, Math.floor((width - 44) / 9));
      const metaChars = options.metaChars || Math.max(34, Math.floor((width - 44) / 7.7));
      return {
        title: wrapSvgLines(task.nombre, titleChars),
        meta: metaText ? wrapSvgLines(metaText, metaChars) : []
      };
    }

    function taskPopupHeight(lines) {
      return 34 + lines.title.length * 16 + lines.meta.length * 13;
    }

    function renderTaskMapPopup(projects) {
      const task = state.tasks.find((item) => item.id === state.mapTaskPopupId);
      if (!task) return "";
      const project = projects.find((item) => item.id === task.projectId);
      const goal = state.sections.find((item) => item.id === task.sectionId);
      if (!project || !goal) return "";

      const tasks = sortedTasks(project.id, goal.id);
      const taskIndex = Math.max(0, tasks.findIndex((item) => item.id === task.id));
      const cityScale = cityScaleForGoal(statsForGoal(project.id, goal.id));
      const layout = taskPlotLayoutForGoal(project, goal, goalIndex, tasks.length, cityScale);
      const point = taskPlotPoint(goalPosition(goal, project, goalIndex), taskIndex, cityScale, layout);
      const width = 315;
      const lines = taskPopupLines(task, goal, width, { titleChars: 34, metaChars: 39 });
      const height = taskPopupHeight(lines) + 4;
      const popup = mapPopupPlacement(point.x, point.y, width, height, { offsetX: 22, offsetY: 28 });
      return `
        <g class="task-map-popup is-open" data-task-id="${task.id}" transform="translate(${popup.x} ${popup.y}) scale(${popup.scale})">

          <g class="map-popup-close" data-action="close-task-popup" data-task-id="${task.id}" transform="translate(${width - 29} 8)">

          </g>
          ${lines.title.map((line, lineIndex) => `<text x="18" y="${22 + lineIndex * 15}" fill="#2f281e" font-size="11.2" font-weight="760">${escapeHtml(line)}</text>`).join("")}
          ${lines.meta.map((line, lineIndex) => `<text x="18" y="${40 + lines.title.length * 15 + lineIndex * 12}" fill="#5f5746" font-size="9.4">${escapeHtml(line)}</text>`).join("")}
        </g>
      `;
    }

    function renderFullCelebration(item) {

      const pos = goalPosition(item.goal, item.project, item.index || 0);
      const pieces = Array.from({ length: 18 }, (_, index) => {

        const y = pos.y - 90 - (index % 4) * 12;
        const colors = ["#b64a4a", "#5e85aa", "#c5a46d", "#5ba878"];
        return `<rect x="${x}" y="${y}" width="4" height="8" rx="1" fill="${colors[index % colors.length]}"><animate attributeName="y" dur="${1 + (index % 5) * 0.12}s" repeatCount="1" values="${y};${pos.y + 78}"/><animate attributeName="opacity" dur="${1 + (index % 5) * 0.12}s" repeatCount="1" values="1;0"/></rect>`;

    function renderMapContextPanel(project) {

    function renderProjectPanel() {

      const goals = goalsForProject(project.id);
      const goal = selectedGoalForPanel(project.id);
      return `
