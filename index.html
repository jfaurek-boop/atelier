      });
      document.querySelectorAll(".map-panel-resizer").forEach((resizer) => {
        resizer.addEventListener("pointerdown", handleMapPanelResizeStart);
      });
      document.querySelectorAll(".task-row[draggable='true']").forEach((row) => {
        row.addEventListener("dragstart", handleTaskDragStart);
        row.addEventListener("dragover", handleDragOver);
        row.addEventListener("dragleave", handleDragLeave);
        row.addEventListener("drop", handleTaskDrop);
      });
      document.querySelectorAll("[data-drop-section]").forEach((drop) => {
        drop.addEventListener("dragover", handleDragOver);
        drop.addEventListener("dragleave", handleDragLeave);
        drop.addEventListener("drop", handleSectionTaskDrop);
      });
      document.querySelectorAll(".project-chip[draggable='true']").forEach((chip) => {
        chip.addEventListener("dragstart", handleProjectDragStart);
        chip.addEventListener("dragover", handleDragOver);
        chip.addEventListener("dragleave", handleDragLeave);
        chip.addEventListener("drop", handleProjectDrop);
      });
      document.querySelectorAll(".section-block[draggable='true']").forEach((block) => {
        block.addEventListener("dragstart", handleSectionDragStart);
        block.addEventListener("dragover", handleDragOver);
        block.addEventListener("dragleave", handleDragLeave);
        block.addEventListener("drop", handleSectionDrop);
      });
      document.querySelectorAll(".tree-row[draggable='true']").forEach((row) => {
        row.addEventListener("dragstart", handleTreeDragStart);
        row.addEventListener("dragover", handleTreeDragOver);
        row.addEventListener("dragleave", handleTreeDragLeave);
        row.addEventListener("drop", handleTreeDrop);
        row.addEventListener("dragend", handleTreeDragEnd);
      });
      const modalInput = document.querySelector(".modal input[autofocus], .modal textarea[autofocus]");
      if (modalInput) setTimeout(() => modalInput.focus(), 0);
      window.onpointermove = (event) => {
        handleCastlePointerMove(event);
        handleMapPointerMove(event);
        handleMapPanelResizeMove(event);
      };
      window.onpointerup = (event) => {
        handleCastlePointerUp(event);
        handleMapPointerUp(event);
        handleMapPanelResizeEnd();
      };

    function handleOverviewDoubleClick(event) {
      const element = event.currentTarget;
      if (!element || event.target.closest(".tree-actions, .check-btn, .icon-btn, select, input")) return;
      event.preventDefault();
      event.stopPropagation();
      openOverviewTarget(element);
    }

    function overviewAnchorSelector(element) {
      if (!element?.dataset) return "";
      const action = element.dataset.action;
      if (element.dataset.scrollAnchorId) return `[data-scroll-anchor-id="${element.dataset.scrollAnchorId}"]`;
      const pairs = [
        ["toggle-overview-project", "projectId", "project-id"],
        ["toggle-overview-goal", "sectionId", "section-id"],
        ["toggle-overview-task", "taskId", "task-id"],
        ["toggle-overview-subtask", "subtaskId", "subtask-id"],
        ["toggle-goal", "sectionId", "section-id"],
        ["toggle-task", "taskId", "task-id"],
        ["toggle-subtask", "subtaskId", "subtask-id"]
      ];
      const match = pairs.find(([name]) => name === action);
      if (!match) return "";
      const [, datasetKey, attribute] = match;
      const value = element.dataset[datasetKey];
      if (!value) return "";
      const safeValue = window.CSS?.escape ? CSS.escape(value) : String(value).replace(/"/g, '\\"');
      return `[data-action="${action}"][data-${attribute}="${safeValue}"]`;
    }

    function overviewAnchorElement(element) {
      if (!element) return null;
      return element.closest(".tree-row, .overview-project-head") || element;
    }

    function markOverviewAnchor(element) {
      if (!element?.dataset) return "";
      const id = `anchor-${Date.now()}-${Math.random().toString(36).slice(2)}`;
      element.dataset.scrollAnchorId = id;
      return id;
    }

    function scrollContainerSelectorFor(element) {
      const container = element?.closest?.(".workspace-view");
      if (!container) return "";
      if (container.classList.contains("overview-view")) return ".overview-view";
      return ".workspace-view";
    }

    function preserveViewportAfterRender(callback, anchorElement = null) {
      const scrollX = window.scrollX || window.pageXOffset || 0;
      const scrollY = window.scrollY || window.pageYOffset || 0;
      const visualAnchor = overviewAnchorElement(anchorElement);
      const scrollContainer = visualAnchor?.closest?.(".workspace-view") || null;
      const scrollContainerSelector = scrollContainerSelectorFor(visualAnchor);
      const containerScrollTop = scrollContainer ? scrollContainer.scrollTop : 0;
      const containerScrollLeft = scrollContainer ? scrollContainer.scrollLeft : 0;
      const anchorTopInContainer = visualAnchor && scrollContainer
        ? visualAnchor.getBoundingClientRect().top - scrollContainer.getBoundingClientRect().top
        : null;
      const visualSelector = overviewAnchorSelector(visualAnchor);
      const anchorId = markOverviewAnchor(anchorElement);
      const anchorSelector = anchorId ? `[data-scroll-anchor-id="${anchorId}"]` : overviewAnchorSelector(anchorElement);
      const anchorTop = visualAnchor ? visualAnchor.getBoundingClientRect().top : null;
      if (anchorElement?.blur) anchorElement.blur();
      callback();
      const restore = () => {
        const nextActionAnchor = anchorSelector ? document.querySelector(anchorSelector) : null;
        const nextAnchor = overviewAnchorElement(nextActionAnchor) || (visualSelector ? document.querySelector(visualSelector) : null);
        const nextScrollContainer = scrollContainerSelector ? document.querySelector(scrollContainerSelector) : null;
        if (nextAnchor && nextScrollContainer && anchorTopInContainer !== null) {
          const nextAnchorTopInContent = nextAnchor.getBoundingClientRect().top - nextScrollContainer.getBoundingClientRect().top + nextScrollContainer.scrollTop;
          nextScrollContainer.scrollTop = Math.max(0, nextAnchorTopInContent - anchorTopInContainer);
          nextScrollContainer.scrollLeft = containerScrollLeft;
          window.scrollTo(scrollX, scrollY);
        } else if (nextScrollContainer) {
          nextScrollContainer.scrollTop = containerScrollTop;
          nextScrollContainer.scrollLeft = containerScrollLeft;
          window.scrollTo(scrollX, scrollY);
        } else if (nextAnchor && anchorTop !== null) {
          window.scrollBy(0, nextAnchor.getBoundingClientRect().top - anchorTop);
          window.scrollTo(scrollX, window.scrollY || window.pageYOffset || 0);
        } else {
          window.scrollTo(scrollX, scrollY);
        }
      };
      requestAnimationFrame(() => {
        restore();
        requestAnimationFrame(restore);
      });
      setTimeout(restore, 90);
    }

    function runOverviewAction(callback, anchorElement = null) {
      if (state.view === "overview") preserveViewportAfterRender(callback, anchorElement);
      else callback();
    }

    function handleActionClick(event) {
      const actionTarget = event.target.closest("[data-action]:not(form)");
      if (!actionTarget) return;
      if (event.currentTarget && event.currentTarget !== actionTarget) return;
      const action = actionTarget.dataset.action;
      if (action === "close-modal" && event.target !== actionTarget && actionTarget.classList.contains("modal-backdrop")) return;
      if (!["quick-add", "task-project-select", "calendar-filter", "overview-filter"].includes(action)) event.preventDefault();
      if (!["toggle-combo", "choose-combo"].includes(action)) closeTaskCombos();
      if (suppressNextMapClick) {
        suppressNextMapClick = false;
        if (action === "select-project" || action === "select-map-project") return;
      }
      const projectId = actionTarget.dataset.projectId;
      const taskId = actionTarget.dataset.taskId;
      const sectionId = actionTarget.dataset.sectionId;
      if (action === "set-view") {
        const nextView = actionTarget.dataset.view;
        setState({
          view: nextView,
          ...(nextView === "overview" ? overviewOpenAllPatch() : {}),
          ...(nextView === "list" ? { listProjectOpen: false, selectedTaskId: null, selectedSubtaskId: null } : {}),
          ...(nextView === "calendar" && state.view !== "calendar" ? { calendarMode: "agenda" } : {})
        });
      }
      if (action === "set-tree-mode") {
        const nextMode = actionTarget.dataset.treeMode || "all";
        if (["goals", "tasks", "all"].includes(nextMode)) setState({ treeMode: nextMode });
      }
      if (action === "toggle-tree-completed") {
        setState({ treeHideCompleted: !state.treeHideCompleted });
      }
      if (action === "overview-clear-filters") {
        setState({
          overviewFilters: {
            projectId: "all",
            type: "all",
            status: "pending",
            priority: "all",
            tagId: "all",
            sortBy: "project"
          },
          ...overviewOpenAllPatch()
        });
      }
      if (action === "toggle-overview-project") {
        preserveViewportAfterRender(() => toggleOverviewOpen("overviewOpenProjectIds", projectId), actionTarget);
        return;
      }
      if (action === "toggle-overview-goal") {
        preserveViewportAfterRender(() => toggleOverviewOpen("overviewOpenGoalIds", sectionId), actionTarget);
        return;
      }
      if (action === "toggle-overview-task") {
        preserveViewportAfterRender(() => toggleOverviewOpen("overviewOpenTaskIds", taskId), actionTarget);
        return;
      }
      if (action === "toggle-overview-subtask") {
        preserveViewportAfterRender(() => toggleOverviewOpen("overviewOpenSubtaskIds", actionTarget.dataset.subtaskId), actionTarget);
        return;
      }
      if (action === "map-reset") resetMapView();
      if (action === "map-zoom-in") zoomMapAtCenter(0.78);
      if (action === "map-zoom-out") zoomMapAtCenter(1.24);
      if (action === "map-full") {
        setState({
          view: "list",
          listProjectOpen: false,
          selectedGoalId: null,
          selectedTaskId: null,
          selectedSubtaskId: null,
          mapGoalPopupId: null,
          mapTaskPopupId: null,
          continentPopupId: null,
          mapViewBox: { x: 0, y: 0, w: 900, h: 800 }
        });
      }
      if (action === "focus-project-map") {
        setState({
          view: "list",
          selectedProjectId: projectId,
          selectedGoalId: null,
          selectedTaskId: null,
          selectedSubtaskId: null,
          mapGoalPopupId: null,
          mapTaskPopupId: null,
          continentPopupId: null,
          listProjectOpen: false,
          mapViewBox: mapBoxForContinent(projectId)
        });
      }
      if (action === "back-to-continent") setState({ selectedGoalId: null, selectedTaskId: null, selectedSubtaskId: null, listProjectOpen: true }, false);
      if (action === "close-task-detail") setState({ selectedTaskId: null, selectedSubtaskId: null, listProjectOpen: true }, false);
      if (action === "select-map-project") {
        setState({
          view: "list",
          selectedProjectId: projectId,
          selectedGoalId: null,
          selectedTaskId: null,
          selectedSubtaskId: null,
          mapGoalPopupId: null,
          mapTaskPopupId: null,
          continentPopupId: null,
          listProjectOpen: true,
          mapViewBox: mapBoxForContinent(projectId)
        });
      }
      if (action === "map-project-select") {
        setState({
          view: "list",
          selectedProjectId: projectId,
          selectedGoalId: null,
          selectedTaskId: null,
          selectedSubtaskId: null,
          mapGoalPopupId: null,
          mapTaskPopupId: null,
          continentPopupId: null,
          listProjectOpen: true,
          mapViewBox: mapBoxForContinent(projectId)
        });
      }
      if (action === "select-project") {
        const closeCurrentProject = state.view === "list" && state.listProjectOpen && state.selectedProjectId === projectId;
        setState({
          selectedProjectId: projectId,
          selectedGoalId: null,
          selectedTaskId: null,
          selectedSubtaskId: null,
          mapGoalPopupId: null,
          mapTaskPopupId: null,
          continentPopupId: null,
          ...(state.view === "list" ? { listProjectOpen: !closeCurrentProject, mapViewBox: mapBoxForContinent(projectId) } : {})
        });
      }
      if (action === "toggle-continent-popup") {
        setState({
          selectedProjectId: projectId,
          selectedGoalId: null,
          selectedTaskId: null,
          selectedSubtaskId: null,
          mapGoalPopupId: null,
          mapTaskPopupId: null,
          continentPopupId: state.continentPopupId === projectId ? null : projectId
        }, false);
      }
      if (action === "close-continent-popup") setState({ continentPopupId: null }, false);
      if (action === "close-goal-popup") setState({ mapGoalPopupId: null }, false);
      if (action === "close-task-popup") setState({ mapTaskPopupId: null }, false);
      if (action === "show-task-popup") {
        const task = state.tasks.find((item) => item.id === taskId);
        if (task) {
          setState({
            selectedTaskId: null,
            selectedSubtaskId: null,
            mapGoalPopupId: null,
            mapTaskPopupId: task.id,
            continentPopupId: null
          }, false);
        }
      }
      if (action === "move-project") moveProject(projectId, actionTarget.dataset.direction);
      if (action === "move-goal") moveGoal(sectionId, actionTarget.dataset.direction);
      if (action === "open-project-pending") {
        setState({
          view: "list",
          selectedProjectId: projectId,
          selectedGoalId: null,
          selectedTaskId: null,
          selectedSubtaskId: null,
          mapGoalPopupId: null,
          mapTaskPopupId: null,
          listProjectOpen: true,
          continentPopupId: null,
          mapViewBox: mapBoxForContinent(projectId)
        });
      }
      if (action === "select-goal") {
        const nextGoalId = goalKey(projectId, sectionId || null);
        const closeAccordion = Boolean(actionTarget.closest(".project-tree-panel")) && state.selectedProjectId === projectId && state.selectedGoalId === nextGoalId;
        setState({
          view: "list",
          selectedProjectId: projectId,
          selectedGoalId: closeAccordion ? null : nextGoalId,
          selectedTaskId: null,
          selectedSubtaskId: null,
          mapGoalPopupId: null,
          mapTaskPopupId: null,
          continentPopupId: null,
          listProjectOpen: true
        });
      }
      if (action === "set-calendar-mode") setState({ calendarMode: actionTarget.dataset.mode || "agenda" });
      if (action === "open-calendar-item") openCalendarItem(actionTarget);
      if (action === "open-project") {
        editingColor = projectId ? state.projects.find((p) => p.id === projectId)?.color || palette[0] : palette[state.projects.length % palette.length];
        editingIcon = projectId ? state.projects.find((p) => p.id === projectId)?.icono || projectIcons[0] : projectIcons[state.projects.length % projectIcons.length];
        setState({ modal: { type: "project", id: projectId || null } }, false);
      }
      if (action === "open-section") setState({ modal: { type: "section", id: sectionId || null, projectId: projectId || state.selectedProjectId } }, false);
      if (action === "open-task") {
        const task = state.tasks.find((item) => item.id === taskId);
        setState({
          ...(state.view === "overview" ? {} : { view: "list", listProjectOpen: true }),
          selectedProjectId: task?.projectId || state.selectedProjectId,
          selectedGoalId: task ? goalKey(task.projectId, task.sectionId) : state.selectedGoalId,
          selectedTaskId: taskId,
          selectedSubtaskId: null,
          mapGoalPopupId: null,
          mapTaskPopupId: null,
          modal: { type: "task", id: taskId }
        }, false);
      }
      if (action === "select-task") {
        const task = state.tasks.find((item) => item.id === taskId);
        const closeAccordion = Boolean(actionTarget.closest(".project-tree-panel")) && state.selectedTaskId === taskId;
        setState({
          selectedProjectId: task?.projectId || state.selectedProjectId,
          selectedGoalId: task ? goalKey(task.projectId, task.sectionId) : state.selectedGoalId,
          selectedTaskId: closeAccordion ? null : taskId,
          selectedSubtaskId: null,
          mapGoalPopupId: null,
          mapTaskPopupId: null,
          listProjectOpen: true,
          modal: null
        }, false);
      }
      if (action === "close-subtask-panel") setState({ selectedTaskId: null, selectedSubtaskId: null }, false);
      if (action === "toggle-goal") {
        runOverviewAction(() => toggleGoal(sectionId), actionTarget);
        return;
      }
      if (action === "toggle-task") {
        runOverviewAction(() => toggleTask(taskId), actionTarget);
        return;
      }
      if (action === "toggle-combo") toggleTaskCombo(actionTarget);
      if (action === "choose-combo") chooseTaskCombo(actionTarget);
      if (action === "open-date-picker") openTaskDatePicker(actionTarget);
      if (action === "quick-add-card") {
        const form = actionTarget.closest("form");
        if (form?.dataset.action === "quick-add-goal") saveQuickGoalCard(form);
        else if (form?.dataset.action === "quick-add-subtask") saveQuickSubtaskCard(form);
        else if (form) saveQuickTaskCard(form);
      }
      if (action === "open-subtask") {
        const subtaskId = actionTarget.dataset.subtaskId || null;
        const subtask = state.subtasks.find((item) => item.id === subtaskId);
        const parentTask = subtask ? state.tasks.find((item) => item.id === subtask.taskId) : null;
        setState({
          selectedProjectId: parentTask?.projectId || state.selectedProjectId,
          selectedGoalId: parentTask ? goalKey(parentTask.projectId, parentTask.sectionId) : state.selectedGoalId,
          selectedTaskId: parentTask?.id || taskId || state.selectedTaskId,
          selectedSubtaskId: subtaskId,
          modal: { type: "subtask", id: subtaskId, taskId: parentTask?.id || taskId || state.selectedTaskId }
        }, false);
      }
      if (action === "select-subtask") {
        const subtaskId = actionTarget.dataset.subtaskId || null;
        const subtask = state.subtasks.find((item) => item.id === subtaskId);
        const task = subtask ? state.tasks.find((item) => item.id === subtask.taskId) : null;
        if (subtask && task) {
          const closeAccordion = Boolean(actionTarget.closest(".project-tree-panel")) && state.selectedSubtaskId === subtask.id;
          setState({
            selectedProjectId: task.projectId,
            selectedGoalId: goalKey(task.projectId, task.sectionId),
            selectedTaskId: task.id,
            selectedSubtaskId: closeAccordion ? null : subtask.id,
            modal: null
          }, false);
        }
      }
      if (action === "set-priority") setPriorityInForm(actionTarget);
      if (action === "set-task-status") setTaskStatusInForm(actionTarget);
      if (action === "add-comment") addLogComment(actionTarget.dataset.itemType || "task", actionTarget.dataset.itemId || taskId);
      if (action === "delete-tag") deleteTag(actionTarget.dataset.tagId);
      if (action === "delete-task") deleteTask(taskId);
      if (action === "toggle-subtask") {
        runOverviewAction(() => toggleSubtask(actionTarget.dataset.subtaskId), actionTarget);
        return;
      }
      if (action === "delete-subtask") deleteSubtask(actionTarget.dataset.subtaskId);
      if (action === "delete-project") deleteProject(projectId);
      if (action === "delete-section") deleteSection(sectionId);
      if (action === "open-settings") setState({ modal: { type: "settings" } }, false);
      if (action === "close-modal") setState({ modal: null }, false);
      if (action === "supabase-pull" || action === "supabase-push") {
        const form = actionTarget.closest("form");
        if (form) {
          saveSupabaseConfigFromForm(form);
          initSupabaseFromConfig({
            password: form.elements.supabasePassword?.value || "",
            mode: action === "supabase-push" ? "push" : "pull"
          });
        }
      }
      if (action === "supabase-signup") {
        const form = actionTarget.closest("form");
        if (form) signUpSupabaseFromForm(form);
      }
      if (action === "supabase-workspace-create") {
        const form = actionTarget.closest("form");
        if (form) createSupabaseWorkspaceFromForm(form);
      }
      if (action === "supabase-workspace-switch") {
        const form = actionTarget.closest("form");
        if (form) switchSupabaseWorkspaceFromForm(form);
      }
      if (action === "supabase-invite") {
        const form = actionTarget.closest("form");
        if (form) inviteSupabaseMemberFromForm(form);
      }
      if (action === "supabase-signout") signOutSupabase();
      if (action === "pick-color") {
        editingColor = actionTarget.dataset.color;
        const form = actionTarget.closest("form");
        form.elements.color.value = editingColor;
        form.querySelectorAll(".color-choice").forEach((button) => button.classList.toggle("is-active", button.dataset.color === editingColor));
      }
      if (action === "pick-project-icon") {
        editingIcon = actionTarget.dataset.icon;
        const form = actionTarget.closest("form");
        form.elements.icono.value = editingIcon;
        form.querySelectorAll(".icon-choice").forEach((button) => button.classList.toggle("is-active", button.dataset.icon === editingIcon));
      }
      if (action === "clear-all") {
        if (confirm("Limpiar todos los proyectos, metas y tareas?")) {
          state = normalizeState({ kingdomName: state.kingdomName, userName: state.userName, userPhoto: state.userPhoto, view: "list", projects: [], sections: [], tasks: [], subtasks: [] });
          saveState();
          showToast("Datos limpiados");
          render();
        }
      }
    }

    function handleSubmit(event) {
      event.preventDefault();
      const form = event.currentTarget;
      const action = form.dataset.action;
      if (["quick-add", "quick-add-goal", "quick-add-subtask"].includes(action)) {
        submitQuickAddForm(form, event);
        return;
      }
      if (action === "save-project") saveProject(form);
      if (action === "save-section") saveSection(form);
      if (action === "save-task") saveTask(form);
      if (action === "save-subtask") saveSubtask(form);
      if (action === "save-tag") saveTag(form);
      if (action === "save-settings") saveSettings(form);
    }

    function submitQuickAddForm(form, event) {
      const action = form?.dataset.action;
      if (action === "quick-add") saveQuickTask(form, event);
      if (action === "quick-add-goal") saveQuickGoal(form, event);
      if (action === "quick-add-subtask") saveQuickSubtask(form, event);
    }

    function handleQuickAddKeydown(event) {
      if (event.key !== "Enter" || event.isComposing) return;
      event.preventDefault();
      const form = event.currentTarget.closest("form");
      submitQuickAddForm(form, event);
    }

    function handleCommentKeydown(event) {
      if (event.key !== "Enter" || event.shiftKey) return;
      event.preventDefault();
      addLogComment(event.currentTarget.dataset.commentType || "task", event.currentTarget.dataset.commentInput);
    }

    function closeTaskCombos(except = null) {
      document.querySelectorAll(".task-combo.is-open").forEach((combo) => {
        if (combo !== except) combo.classList.remove("is-open");
      });
    }

    function positionTaskComboMenu(combo) {
      const button = combo?.querySelector(".task-combo-button");
      const menu = combo?.querySelector(".task-combo-menu");
      if (!button || !menu) return;
      const rect = button.getBoundingClientRect();
      const gap = 6;
      const margin = 12;
      const desiredHeight = Math.min(180, menu.scrollHeight || 180);
      const spaceBelow = window.innerHeight - rect.bottom - margin;
      const spaceAbove = rect.top - margin;
      const opensUp = spaceBelow < desiredHeight && spaceAbove > spaceBelow;
      const availableHeight = Math.max(96, (opensUp ? spaceAbove : spaceBelow) - gap);
      const menuHeight = Math.min(desiredHeight, availableHeight);
      const left = Math.min(Math.max(margin, rect.left), Math.max(margin, window.innerWidth - rect.width - margin));
      const top = opensUp
        ? Math.max(margin, rect.top - menuHeight - gap)
        : Math.min(window.innerHeight - margin - menuHeight, rect.bottom + gap);
      combo.style.setProperty("--combo-menu-left", `${left}px`);
      combo.style.setProperty("--combo-menu-top", `${top}px`);
      combo.style.setProperty("--combo-menu-width", `${rect.width}px`);
      menu.style.maxHeight = `${menuHeight}px`;
    }

    function toggleTaskCombo(button) {
      const combo = button.closest(".task-combo");
      if (!combo) return;
      const shouldOpen = !combo.classList.contains("is-open");
      closeTaskCombos(combo);
      combo.classList.toggle("is-open", shouldOpen);
      if (shouldOpen) positionTaskComboMenu(combo);
    }

    function chooseTaskCombo(button) {
      const combo = button.closest(".task-combo");
      const form = button.closest("form");
      if (!combo || !form) return;
      const name = button.dataset.comboName;
      const value = button.dataset.value || "";
      const label = button.dataset.label || button.textContent.trim();
      const input = combo.querySelector(`input[name="${name}"]`);
      if (input) input.value = value;
      const labelNode = combo.querySelector(".task-combo-label");
      if (labelNode) labelNode.textContent = label;
      combo.querySelectorAll(".task-combo-option").forEach((option) => option.classList.toggle("is-selected", option === button));
      combo.classList.remove("is-open");
      if (name === "projectId") updateGoalComboForProject(form, value);
    }

    function updateGoalComboForProject(form, projectId) {
      const combo = form.querySelector('.task-combo[data-combo-name="sectionId"]');
      if (!combo) return;
      const hidden = combo.querySelector('input[name="sectionId"]');
      const label = combo.querySelector(".task-combo-label");
      const menu = combo.querySelector(".task-combo-menu");
      if (hidden) hidden.value = "";
      if (label) label.textContent = "Tareas por clasificar";
      if (menu) {
        const options = [{ value: "", label: "Tareas por clasificar" }]
          .concat(sortedSections(projectId).map((section) => ({ value: section.id, label: section.nombre })));
        menu.innerHTML = options.map((option) => `
          <button type="button" class="task-combo-option ${option.value === "" ? "is-selected" : ""}" data-action="choose-combo" data-combo-name="sectionId" data-value="${option.value}" data-label="${escapeHtml(option.label)}">${escapeHtml(option.label)}</button>
        `).join("");
        menu.querySelectorAll("[data-action]").forEach((element) => element.addEventListener("click", handleActionClick));
      }
    }

    function openTaskDatePicker(button) {
      const input = button.closest(".task-select-shell")?.querySelector('input[type="date"]');
      if (!input) return;
      input.focus();
      if (typeof input.showPicker === "function") input.showPicker();
    }

    function setPriorityInForm(button) {
      const form = button.closest("form");
      if (!form) return;
      const input = form.elements.prioridad;
      if (input) input.value = button.dataset.priority;
      form.querySelectorAll(".priority-button").forEach((item) => item.classList.toggle("is-active", item === button));
    }

    function setTaskStatusInForm(button) {
      const form = button.closest("form");
      if (!form) return;
      const input = form.elements.completada;
      if (input) input.value = button.dataset.completed;
      form.querySelectorAll(".task-status-option").forEach((item) => item.classList.toggle("is-active", item.dataset.completed === button.dataset.completed));
      const completeButton = form.querySelector(".task-complete-toggle");
      const done = button.dataset.completed === "true";
      if (completeButton) {
        completeButton.classList.toggle("is-done", done);
        completeButton.textContent = done ? "\u2713" : "";
        completeButton.dataset.completed = done ? "false" : "true";
      }
    }

    function addTaskComment(taskId) {
      addLogComment("task", taskId);
    }

    function logTarget(type, itemId) {
      if (type === "goal") return state.sections.find((item) => item.id === itemId);
      if (type === "subtask") return state.subtasks.find((item) => item.id === itemId);
      return state.tasks.find((item) => item.id === itemId);
    }

    function addLogComment(type, itemId) {
      const safeType = ["goal", "task", "subtask"].includes(type) ? type : "task";
      const input = document.querySelector(`[data-comment-input="${itemId}"][data-comment-type="${safeType}"]`);
      const text = input?.value.trim();
      if (!itemId || !text) return;
      mutate(() => {
        const item = logTarget(safeType, itemId);
        if (!item) return;
        item.comentarios = Array.isArray(item.comentarios) ? item.comentarios : [];
        item.comentarios.push({
          id: uid("comment"),
          text,
          author: state.userName || "Usuario",
          createdAt: nowISO()
        });
        if (safeType === "goal") {
          state.selectedProjectId = item.projectId;
          state.selectedGoalId = goalKey(item.projectId, item.id);
        } else if (safeType === "task") {
          state.selectedProjectId = item.projectId;
          state.selectedGoalId = goalKey(item.projectId, item.sectionId);
          state.selectedTaskId = item.id;
        } else {
          const parentTask = state.tasks.find((task) => task.id === item.taskId);
          if (parentTask) {
            state.selectedProjectId = parentTask.projectId;
            state.selectedGoalId = goalKey(parentTask.projectId, parentTask.sectionId);
            state.selectedTaskId = parentTask.id;
          }
          state.selectedSubtaskId = item.id;
        }
      }, { persist: true });
      showToast("Registro publicado");
    }

    function saveQuickTask(form, event) {
      const name = form.elements.nombre.value.trim();
      if (!name) return;
      const projectId = form.dataset.projectId;
      const sectionId = form.dataset.sectionId || null;
      const descripcion = form.elements.descripcion?.value.trim() || "";
      mutate(() => {
        state.tasks.push({
          id: uid("task"),
          projectId,
          sectionId,
          nombre: name,
          descripcion,
          prioridad: normalizePriority(form.elements.prioridad.value),
          completada: false,
          fechaVencimiento: form.elements.fechaVencimiento?.value || null,
          orden: state.tasks.filter((task) => task.projectId === projectId && task.sectionId === sectionId).length,
          createdAt: nowISO(),
          comentarios: [],
          completedAt: null
        });
        state.selectedProjectId = projectId;
        state.selectedGoalId = goalKey(projectId, sectionId);
      });
      showToast("✓ Tarea creada");

    function syncGoalLinks(sectionId, projectId, linkedGoalIds) {
      const selected = new Set(linkedGoalIds.filter((id) => id && id !== sectionId));

        .forEach((section) => {
          const existing = new Set(Array.isArray(section.linkedGoalIds) ? section.linkedGoalIds : []);

          if (section.id === sectionId) {
            section.linkedGoalIds = Array.from(selected);
          } else {
            if (selected.has(section.id)) existing.add(sectionId);
            section.linkedGoalIds = Array.from(existing).filter((id) => id !== section.id);
          }
        });
